istrator to see exactly what the user sees and experience the system through their specific profile, role, and sharing permissions22. This is vital for identifying issues related to Validation Rules, Field-Level Security, or Record-Triggered Flows that might only trigger under specific user contexts. Logging in as a system administrator (Option A) is ineffective because administrators often bypass certain restrictions that apply to standard users4. Asking for a password (Option D) is a major security violation and is never required in Salesforce5. By using the \"Login as\" feature, the admin can pinpoint whether the error is caused by the user's data input or a specific permission conflict assigned to their profile."}, {"id": "q3", "module": "sales_marketing", "question": "Northern Trail Outfitters (NTO) wants to ensure new Contacts are validated before they can be saved. If a user selects that the LeadSource picklist value is Other, NTO also wants to populate a custom text field called Source__c. Which validation rule should a Platform Administrator configure to meet this requirement?", "options": [{"key": "A", "text": "AND(LeadSource = 'Other', Source__c = '')"}, {"key": "B", "text": "AND(NOT(LeadSource = 'Other'), NOT(Source__c = ''))"}, {"key": "C", "text": "AND(ISPICKVAL(LeadSource,'Other'), ISBLANK(Source__c))"}, {"key": "D", "text": "AND(NOT(ISPICKVAL(LeadSource,'Other'))), NOT(ISBLANK(Source__c)) IT Certification Guaranteed, The Easy Way! 2 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid Plat-Admn-201 Exam's Question and Answers from Freecram.net. 1 https://www.freecram.net/exam/Plat-Admn-201-salesforce-certified-platform-administrator-e17444.html"}], "answer": ["C"], "explanation": "In Salesforce, validation rules use formulas to verify if the data entered by a user meets specific criteria before saving the record1. To check the value of a picklist field like LeadSource, the ISPICKVAL() function must be used, as picklist fields do not support standard text operators like \"=\" in validation formulas2. The requirement is to block the save if LeadSource is \"Other\" but the Source__c text field is empty3. The ISBLANK() function effectively checks if a text field contains no data4. Therefore, the correct logic uses AND() to trigger the error message only when both conditions are met: the picklist is set to \"Other\" AND the text field is blank5. Option A is incorrect because it treats a picklist like a text field6. Option B and D use NOT() logic, which would trigger errors in the wrong scenarios."}, {"id": "q4", "module": "sales_marketing", "question": "Sales managers would like to know what could be implemented to surface important values based on the stage of the opportunity? Which tool should a Platform Administrator use to meet this requirement?", "options": [{"key": "A", "text": "Workflow Rules"}, {"key": "B", "text": "Path Key Fields"}, {"key": "C", "text": "Opportunity Processes"}, {"key": "D", "text": "Dynamic Forms"}], "answer": ["B"], "explanation": "The Opportunity Path is a visual tool that guides sales reps through the stages of a sales cycle. One of its most powerful features for administrators is the ability to define Key Fields for each individual stage. For example, when an opportunity is in the \"Discovery\" stage, the administrator can choose to display fields like \"Budget\" and \"Decision Maker.\" When the deal moves to \"Negotiation,\" the Path can be configured to surface \"Contract Terms\" and \"Discount Percentage.\" This ensures that reps are prompted to enter and review the most relevant data at exactly the right time in the process. While Dynamic Forms (Option D) can show or hide fields on the main record page, the Path specifically organizes this information at the top of the record in a way that is directly tied to the sales methodology. Workflow Rules (Option A) are a legacy automation tool that cannot modify the user interface. Path Key Fields empower sales teams to maintain focus and data accuracy throughout the deal lifecycle."}, {"id": "q5", "module": "productivity", "question": "The Activity Timeline is missing from the Account record page. What should a Platform Administrator do to correct this?", "options": [{"key": "A", "text": "Add the standard Activities component to the Account Lightning record page."}, {"key": "B", "text": "Update the user's permission to allow Edit access to the Activity Timeline."}, {"key": "C", "text": "Run a report to verify whether any activities have been logged for that Account."}, {"key": "D", "text": "Add a button for the Activity Timeline in the Object Manager for the Account object."}], "answer": ["A"], "explanation": "The Activity Timeline is a standard Lightning component that displays open tasks, upcoming events, and past activities (like logged calls or sent emails) in a chronological view. If this timeline is missing from an Account page, it is usually because the component has been removed from the Lightning Record Page layout. To fix this, the Platform Administrator should open the Account record in the - Best Exam Practice Materials Lightning App Builder. From the list of standard components on the left, the admin must drag the Activities component onto the page canvas-typically in the right-hand column or a dedicated tab. Once the page is saved and activated, the timeline will be visible to users. Visibility of the timeline is a layout configuration, not a specific \"Edit access\" permission (Option B). Running a report (Option C) might confirm if data exists, but it won't fix the UI issue. There is no \"button\" for the Activity Timeline in the Object Manager (Option D); it is managed strictly as a component within the App Builder."}, {"id": "q6", "module": "object_manager", "question": "What are three characteristics of a master-detail relationship?", "options": [{"key": "A", "text": "Permissions for the detail record are set independently of the master."}, {"key": "B", "text": "The master object can be a standard or custom object."}, {"key": "C", "text": "Roll-up summaries are supported in master-detail relationships."}, {"key": "D", "text": "The owner field on the detail records is the owner of the master record."}, {"key": "E", "text": "Each object can have up to five master-detail relationships."}], "answer": ["B", "C", "D"], "explanation": "A Master-Detail Relationship is a tight coupling between two objects that provides several unique functionalities: Master Object Types: The master can be either a standard object (like Account) or a custom object (Option B). Roll-up Summaries: This relationship type is the only one that natively supports Roll-up Summary fields, allowing the master record to calculate counts, sums, or averages of fields on the detail records (Option C). Ownership and Security: The detail record inherits its owner and its security/sharing settings from the master record. Consequently, there is no \"Owner\" field on a detail record; it is always owned by the owner of the master (Option D). Option A is incorrect because detail records cannot have independent permissions. Option E is incorrect because an object can only have a maximum of two master-detail relationships. This relationship is ideal for parent-child scenarios where the child's existence is entirely dependent on the parent."}, {"id": "q7", "module": "service_support", "question": "In an approval process, what happens when a queue is selected as the approver?", "options": [{"key": "A", "text": "The queue requires unanimous approval from all of its members before the record is approved."}, {"key": "B", "text": "Any member of the queue can approve or reject the record and the queue is treated as a single entity."}, {"key": "C", "text": "Only the queue owner is notified about the approval request, not its members."}, {"key": "D", "text": "The queue can only be used for objects that do not support individual user approvals."}], "answer": ["B"], "explanation": "Salesforce allows Queues to be designated as assigned approvers in an approval process. When a record is submitted for approval and routed to a queue, an email notification is sent to all queue members (depending on queue settings). The core behavior is that any member of the queue can \"claim\" the request and either approve or reject it. Once one member takes action, the step is considered complete, and the queue is treated as a single decision-making entity. Unanimous approval (Option A) is a specific setting for multiple individual assigned approvers, but it does not apply to queues in this way. Option C is incorrect because the purpose of a queue is to notify all - Best Exam Practice Materials members to ensure a timely response. Queues are supported for most standard and all custom objects (negating Option D)."}, {"id": "q8", "module": "service_support", "question": "Ursa Major Solar classifies its accounts as Silver, Gold, or Platinum Level. When a new case is created for a Silver or Gold partner, it should go to the Regular Support Queue. When an account is Platinum Level, it should automatically go to the Priority Support Queue. What should a Platform Administrator use to achieve this?", "options": [{"key": "A", "text": "Escalation Rules"}, {"key": "B", "text": "Assignment Rules"}, {"key": "C", "text": "Case Rules"}, {"key": "D", "text": "Workflow Rules"}], "answer": ["B"], "explanation": "Case Assignment Rules are the standard Salesforce tool for automatically routing cases to specific users or queues based on record criteria. A single assignment rule can contain multiple \"Rule Entries\" processed in a specific order. To meet this requirement, the Platform Administrator would create a rule with two entries: one that checks if the Account's \"Level\" field equals \"Platinum\" and routes it to the Priority Support Queue, and another that checks if the level is \"Silver\" or \"Gold\" and routes it to the Regular Support Queue. This automation happens the moment the case is created, ensuring that high-value customers receive immediate attention from the appropriate team. Escalation Rules (Option A) are used to move a case after it has been sitting for a period of time, not for initial routing. Workflow Rules (Option D) are a legacy tool that cannot natively assign cases to queues in the same direct manner as Assignment Rules."}, {"id": "q9", "module": "automation", "question": "Which component of an approval process defines the chain of approval, determines which records can advance, and specifies where to assign approval requests? 1717", "options": [{"key": "A", "text": "Process Definition Detail"}, {"key": "B", "text": "Approval Steps"}, {"key": "C", "text": "Entry Criteria"}, {"key": "D", "text": "Approval Actions"}], "answer": ["B"], "explanation": "The core logic of any approval process is contained within its Approval Steps18. While the overall process defines the \"Entry Criteria\" for which records can start the process, the individual Approval Steps are what define the actual \"chain of approval\"19191919. Each step can have its own specific criteria to determine if a record should enter that particular step or skip to the next one. Furthermore, the Approval Step is where the administrator specifies the Assigned Approver, whether it be a specific user, a manager, or a queue. This granularity allows for complex routing, such as sending small discounts to a manager but large discounts to a VP. Process Definition Detail (Option A) provides a high-level overview of the process settings. Entry Criteria (Option C) only act as the initial gatekeeper. Approval Actions (Option D) are the automated results (like email alerts or field updates) that happen once a step is decided."}, {"id": "q10", "module": "agentforce", "question": "A Platform Administrator is creating a new action instruction for an agent. This action, named createCase, is designed to generate a new Salesforce Case record based on the user's conversation IT Certification Guaranteed, The Easy Way! 5 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid Plat-Admn-201 Exam's Question and Answers from Freecram.net. 4 https://www.freecram.net/exam/Plat-Admn-201-salesforce-certified-platform-administrator-e17444.html with the agent. Which set of Action Instructions should the administrator use for the createCase action, according to best practices for action instructions?", "options": [{"key": "A", "text": "\"This action provides the ability to create a new case record in the Salesforce system. Its function is to simply save customer information as a record. Use this when the user wants to create a case.\""}, {"key": "B", "text": "\"Use this action to create a new Salesforce Case record. The goal is to document a customer's issue in the system. Use this when the user's intent is to create a formal record of their problem or question.\""}, {"key": "C", "text": "\"Creates a new case record in the system for any type of customer inquiry. The purpose of this is to ensure a record of the interaction is saved.\""}, {"key": "D", "text": "\"The createCase code snippet is configured to create a case. It runs in the background to handle the user's request to log a new issue. Its purpose is to solve the customer's issue.\""}], "answer": ["B"], "explanation": "Best practices for Agentforce Action Instructions emphasize clarity, intent, and specific usage scenarios to help the LLM (Large Language Model) understand exactly when and why to trigger an action13. Option B is the best choice because it explicitly defines the Action (create a Case), the Goal (document a customer's issue), and the User Intent (formal record of a problem or question)14. High\u0002quality instructions act as a guide for the agent's reasoning process15. Vague instructions, like those in Option A or C, may lead to the agent triggering the action at inappropriate times, such as during a simple inquiry that doesn't require a formal case. Instructions that focus on \"code snippets\" (Option D) are less effective because the LLM needs to understand the functional business context rather than the technical implementation details to interact naturally with the user17."}, {"id": "q11", "module": "config_setup", "question": "Ursa Major Solar has its business hours set from 9:00 AM to 5:00 PM for the reps that are on Pacific Time. The reps on Eastern Time need business hours set to start 3 hours earlier to cover for support. How should a Platform Administrator solve for this issue?", "options": [{"key": "A", "text": "Adjust the current business hours to accommodate the Eastern time zone."}, {"key": "B", "text": "Allow the reps to set business hours manually."}, {"key": "C", "text": "Set temporary business hours for each time zone."}, {"key": "D", "text": "Create one set of business hours per time zone."}], "answer": ["D"], "explanation": "Salesforce allows for the creation of multiple Business Hours records to support global teams working in different time zones. To solve the requirement for Ursa Major Solar, the Platform Administrator should create two distinct sets of business hours: one for \"Pacific Support\" (9 AM - 5 PM PT) and one for \"Eastern Support\" (9 AM - 5 PM ET). This is essential because Business Hours are used by the system to calculate escalation rules and milestones correctly. For example, an escalation rule for an Eastern-based case 1should start counting at 9 AM ET, not 9 AM PT. Adjusting the current record to \"accommodate\" both (Option A) would result in a 12-hour window that doesn't accurately reflect either team's true availability. Users cannot manually set their own business hours (Option B) in a way that affects system automation. Creating one set per time zone ensures that the support team's performance metrics and automated routing are accurate and localized."}, {"id": "q12", "module": "productivity", "question": "A salesperson complains that the Log a Call button is missing from the highlights panel of an Opportunity page. What is the reason for this? IT Certification Guaranteed, The Easy Way! 6 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid Plat-Admn-201 Exam's Question and Answers from Freecram.net. 5 https://www.freecram.net/exam/Plat-Admn-201-salesforce-certified-platform-administrator-e17444.html", "options": [{"key": "A", "text": "The Log a Call action will appear within the Activity Component as a standard behavior rather than the highlights panel."}, {"key": "B", "text": "The Log a Call action has not been added to the Salesforce Mobile and Lightning Experience Actions section of the page layout."}, {"key": "C", "text": "The custom Log a Call permission is missing from the user's profile and assigned permission sets."}, {"key": "D", "text": "The custom Log a Call permission has been disabled at the org level in Setup."}], "answer": ["B"], "explanation": "In the Salesforce Lightning Experience, the buttons and actions that appear in the header (Highlights Panel) of a record are controlled by the Salesforce Mobile and Lightning Experience Actions section of the Page Layout. If a specific action like \"Log a Call\" is missing, it is usually because it has not been dragged into this specific section in the Page Layout editor. While standard actions sometimes appear in the Activity component (Option A), they are explicitly configured for the header via the Page Layout. There is no specific \"Log a Call permission\" (Options C and D) that would hide only that button; if a user has permission to create Tasks, they generally have the ability to use the Log a Call feature if it is present on the layout."}, {"id": "q13", "module": "agentforce", "question": "A Platform Administrator needs to create a new prompt template to automatically summarize customer cases for a sales team. The administrator wants to dynamically populate the response with data from the case record. What should the administrator use to display real Salesforce data in an agent response from a prompt template?", "options": [{"key": "A", "text": "Flow"}, {"key": "B", "text": "Picklists"}, {"key": "C", "text": "Agent Instructions"}, {"key": "D", "text": "Merge Fields"}], "answer": ["D"], "explanation": "When building prompt templates within the Prompt Builder, the most direct way to inject specific record data into the AI's instructions is through Merge Fields. Much like an email template or a mail merge, merge fields allow the administrator to reference specific fields from the object in context-in this case, the Case object. For example, an administrator might use {!$Input:Case.Subject} or {!$Input:Case.Description} within the prompt template. When the agent runs, it replaces these placeholders with the actual data from the specific case record being viewed. This ensures that the AI has the \"grounding\" information it needs to generate an accurate and relevant summary. While Flows (Option A) can be used for more complex data retrieval, Merge Fields are the standard, low\u0002code tool for simple record-to-prompt data population. Agent Instructions (Option C) provide the \"how-to\" logic for the AI but do not themselves represent the dynamic data points from the Salesforce database."}, {"id": "q14", "module": "config_setup", "question": "Service reps in a call center do not have assigned desks. They sit at any available desk and use the computer on that desk to access Salesforce. A Platform Administrator has been asked to streamline the login process so the reps do not have to authenticate each time they log in at a different computer. Which function should the administrator use to implement this request?", "options": [{"key": "A", "text": "Custom Profile"}, {"key": "B", "text": "Trusted IP Ranges IT Certification Guaranteed, The Easy Way! 7 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid Plat-Admn-201 Exam's Question and Answers from Freecram.net. 6 https://www.freecram.net/exam/Plat-Admn-201-salesforce-certified-platform-administrator-e17444.html"}, {"key": "C", "text": "Multi-factor Authentication"}, {"key": "D", "text": "Permission Set"}], "answer": ["B"], "explanation": "In Salesforce, Trusted IP Ranges (configured under Network Access in Setup) define a set of IP addresses from which users can log in without being prompted for a verification code (identity confirmation). In a call center environment where reps use different machines but are all within the same corporate network (sharing a common external IP or range), adding those corporate IPs to the Trusted IP Ranges list \"streamlines\" the login process. This prevents the system from seeing each new machine as an \"unrecognized device\". Multi-factor Authentication (Option C) actually adds an extra step to the login process, which is the opposite of streamlining28. Profiles (Option A) and Permission Sets (Option D) can manage \"Login IP Ranges\" (which restrict access to specific IPs), but Trusted IP Ranges are the primary tool for bypassing identity verification within a known network."}, {"id": "q15", "module": "object_manager", "question": "Cloud Kicks uses the standard Account Type field to indicate different account tiers. Users find this confusing, so management has asked that the field be changed to read \"Tier\" on the page layouts. How should a Platform Administrator implement this change?", "options": [{"key": "A", "text": "Edit the Type field and change the name."}, {"key": "B", "text": "Use Rename Tabs and Labels."}, {"key": "C", "text": "Build a custom field called Tier and delete Type."}, {"key": "D", "text": "Create a global picklist value set."}], "answer": ["B"], "explanation": "To change the display name of a standard field (like \"Account Type\") globally across the entire organization, the correct tool is Rename Tabs and Labels in the Setup menu. This tool allows an administrator to modify the singular and plural labels for standard objects and the field labels for their standard fields. By renaming \"Type\" to \"Tier,\" the change will be reflected on page layouts, in report column headers, and in list views. This is the preferred method because it preserves the underlying data and logic associated with the standard field. Option A is incorrect because standard field names cannot be edited in the \"Fields and Relationships\" menu. Option C is a destructive and complex process that would require data migration and could break existing reports or integrations. Option D does not address the label of the field itself. - Best Exam Practice Materials"}, {"id": "q16", "module": "agentforce", "question": "A Platform Administrator is building an agent to help an ecommerce support team. The agent needs to call an action, named updateShippingAddress, that modifies a customer ' s shipping address in the system. Which set of Action Instructions should the administrator use for the updateShippingAddress action, according to best practices?", "options": [{"key": "A", "text": "\" Use this to update shipping information. It ' s used for any changes to a customer ' s address in the system. \""}, {"key": "B", "text": "\" This action updates the customer ' s shipping address. It is to be used when a user wants to change their address. Only use this when a customer does not have an active order in the system. \""}, {"key": "C", "text": "\" This action allows for the changing of a shipping address, and the goal is to make sure the address is current and accurate. \""}, {"key": "D", "text": "\" Updates the shipping address for a customer order. The goal of the action is to modify the address on a customer ' s record. The agent should only use this action when the user explicitly requests to change their address. \""}], "answer": ["D"], "explanation": "According to Agentforce best practices, action instructions must be highly specific regarding the action ' s purpose, the expected goal, and the conditions under which it should be triggered. Option D is the strongest set of instructions because it defines the Action (Update shipping address), the Goal (Modify address on a record), and a clear Constraint/Guardrail (Only use when the user explicitly requests it). This prevents the AI from accidentally triggering a data change based on a vague inquiry. Option B is also good but more restrictive than necessary unless the business logic specifically forbids updates during active orders. Option D provides the best balance of context and intent, ensuring the Large Language Model (LLM) understands the \" why \" and \" when \" of the action."}, {"id": "q17", "module": "productivity", "question": "Ursa Major Solar (UMS) wants a place within Salesforce to discuss sensitive records. UMS would like to be able to add new members but does not want non-members to be able to see any information about the forum. What should a Platform Administrator configure to achieve this?", "options": [{"key": "A", "text": "Chatter Unlisted Group"}, {"key": "B", "text": "Chatter Public Group"}, {"key": "C", "text": "Chatter Private Group"}, {"key": "D", "text": "Private Chatter Channel"}], "answer": ["A"], "explanation": "A Chatter Unlisted Group is the most restrictive group type: its existence is hidden from non-members entirely (it will not appear in search or group lists), yet an owner or manager can still add new members directly. A Public Group is visible and open to join by anyone, and a Private Group is discoverable even though its content is hidden — neither satisfies the requirement that non-members cannot even see that the group exists. \"Private Chatter Channel\" is not a real Salesforce feature."}, {"id": "q18", "module": "productivity", "question": "Cloud Kicks has hired a new sales executive who wants to implement a document merge solution in Salesforce. How should a Platform Administrator implement this solution?", "options": [{"key": "A", "text": "Configure the package from Salesforce Setup."}, {"key": "B", "text": "Install a package from the Partner Portal."}, {"key": "C", "text": "Create a managed package in AppExchange."}, {"key": "D", "text": "Download the solution from AppExchange."}], "answer": ["D"], "explanation": "Document merge is not a native declarative Salesforce feature, so the correct approach is to download and install a ready-made solution from AppExchange, Salesforce's marketplace of third-party apps. \"Configuring a package from Setup\" and \"installing from the Partner Portal\" are not valid installation paths, and building a new managed package is a task for ISV developers/publishers, not for an admin solving a business requirement."}, {"id": "q19", "module": "automation", "question": "Northern Trail Outfitters uses a custom Invoice object to collect customer payment information from an external billing system. The Billing System field needs to be filled in on every Invoice record. How should a Platform Administrator ensure this requirement?", "options": [{"key": "A", "text": "Make the field universally required."}, {"key": "B", "text": "Define an approval process for the field."}, {"key": "C", "text": "Create a flow to update the field."}, {"key": "D", "text": "Require the field on the record type."}], "answer": ["A"], "explanation": "Making a field universally required enforces that it must contain a value on every record of that type, regardless of how the record is created (manually, via API, or through an integration) — which matches the requirement that the field be filled in on every record. Requiring a field only \"on the record type\" (Option D) enforces it solely through the page layout for users creating records manually, and would not catch records inserted through an integration or the API. An approval process or a flow could supplement this but are not the direct, simplest way to guarantee the field is always populated."}, {"id": "q20", "module": "agentforce", "question": "A Platform Administrator is designing a prompt template for a new agent. The agent's purpose is to help service reps troubleshoot technical issues by providing concise, step-by-step instructions. Based on best practices for creating effective prompts, which approach should the administrator use when writing this prompt? 16", "options": [{"key": "A", "text": "Write a detailed prompt with multiple nested conditions to cover all the major troubleshooting scenarios."}, {"key": "B", "text": "Use specific technical terms and abbreviations to ensure the AI understands the specialised domain."}, {"key": "C", "text": "Focus on providing high-level, theoretical concepts so the AI has the flexibility to respond creatively."}, {"key": "D", "text": "Use natural, easy-to understand language and clear, concise instructions to guide the AI's behavior."}], "answer": ["D"], "explanation": "Creating effective Agentforce prompts requires a focus on clarity and simplicity to ensure the Large Language Model (LLM) follows instructions accurately. According to Salesforce best practices, administrators should use natural, easy-to-understand language and provide clear, concise instructions1919. This approach helps the AI accurately reason through the task without becoming confused by overly complex or nested logic (Option A). While technical accuracy is important, relying heavily on jargon or abbreviations (Option B) can sometimes lead to unexpected results if the LLM interprets those terms differently in various contextsFurthermore, providing high-level theoretical concepts (Option C) often results in vague or \" creative \" answers that may not be helpful for technical troubleshooting, which requires specific and actionable steps22. Using direct instructions like \" Summarize the issue in three bullet points \" is more effective than broad guidelines."}, {"id": "q21", "module": "config_setup", "question": "Universal Containers has two sales teams, sales team A and sales team B. Each team has their own role in the role hierarchy. Both roles are subordinates of the same Manager role. How should a Platform Administrator share records owned by sales team A with sales team B?", "options": [{"key": "A", "text": "Criteria-based sharing"}, {"key": "B", "text": "Owner-based sharing"}, {"key": "C", "text": "Hierarchical sharing"}, {"key": "D", "text": "Manual sharing"}], "answer": ["B"], "explanation": "In this scenario, the two teams are \" peers \" in the role hierarchy (both reporting to the same manager). In a private sharing model, peers cannot see each other ' s records by default. To grant - Best Exam Practice Materials lateral access between these specific groups, an Owner-based Sharing Rule is the most effective solution. The administrator can create a rule stating that any records owned by members of \" Role: Sales Team A \" should be shared with members of \" Role: Sales Team B \" with specific access levels (e.g., Read/Write). Hierarchical sharing (Option C) only grants upward visibility to the Manager role, not across to the other team34. Manual sharing (Option D) is inefficient for an entire team35. Criteria-based sharing (Option A) is used when record field values determine access, whereas this requirement is based specifically on who owns the records36."}, {"id": "q22", "module": "object_manager", "question": "The Cloud Kicks sales team has asked that two of the fields that appear on the Opportunity cards in Kanban view be changed to make the cards more meaningful. Which feature should a Platform Administrator access to make this change?", "options": [{"key": "A", "text": "Record Type"}, {"key": "B", "text": "Compact Layout"}, {"key": "C", "text": "Page Layout"}, {"key": "D", "text": "Kanban Settings"}], "answer": ["B"], "explanation": "In the Salesforce Lightning Experience, the fields displayed in the \" header \" of a record and on the cards in the Kanban view are controlled by the Compact Layout. Each object has a System Default compact layout, but a Platform Administrator can create custom ones to prioritize the most important information, such as \" Account Name \" and \" Close Date. \" By editing the primary compact layout for the Opportunity object, the admin directly controls which fields the sales team sees as they drag and drop deals through the Kanban stages. While Page Layouts (Option C) control the main record detail page and Kanban Settings (Option D) control which field is used for columns and summaries, the individual \" card \" content is always driven by the Compact Layout. This ensures that users can quickly gather key context without needing to open every individual record."}, {"id": "q23", "module": "data_analytics", "question": "A sales rep has a list of 300 accounts with contacts that they want to load at one time. Which tool should a Platform Administrator utilize to import the records to Salesforce?", "options": [{"key": "A", "text": "Manual Import"}, {"key": "B", "text": "Data Import Wizard"}, {"key": "C", "text": "Dataloader.io"}, {"key": "D", "text": "Data Loader"}], "answer": ["B"], "explanation": "The Data Import Wizard is the most efficient and user-friendly tool for importing a relatively small number of records (up to 50,000) when those records involve standard objects like Accounts and Contacts simultaneously. A key advantage of this tool is its built-in capability to handle \" Account and Contact \" imports in a single pass, which includes automatic matching to prevent duplicates based on name or email. For a volume of 300 records, the browser-based wizard is much faster to set up than the Data Loader, as it does not require a separate installation or complex CSV mapping for simple standard objects. While the Data Loader (Option D) and Dataloader.io (Option C) can handle this volume, they are typically preferred for much larger datasets (up to 5 million records) or more complex custom - Best Exam Practice Materials objects. The \" Wizard \" provides a guided experience that is ideal for sales reps or administrators performing routine data entry tasks."}, {"id": "q24", "module": "automation", "question": "Cloud Kicks ' management team is hoping to increase user productivity by switching to consoles instead of the current traditional Salesforce user interface. What should a Platform Administrator use to implement this request?", "options": [{"key": "A", "text": "App Builder"}, {"key": "B", "text": "Screen Flow"}, {"key": "C", "text": "App Manager"}, {"key": "D", "text": "Omni-Channel"}], "answer": ["C"], "explanation": "To transition users from a standard \" tab-based \" application to a Lightning Console app, the Platform Administrator must use the App Manager in Setup. The App Manager is where all Lightning apps are created, edited, and assigned to user profiles. Within the App Manager, the admin can create a new app and select \" Console Navigation \" as the navigation style39. Console apps allow users to work on multiple records simultaneously in a workspace tab-based layout, which is highly effective for productivity in fast-paced environments like sales or support40. The Lightning App Builder (Option A) is used to design the pages within the app, but the app ' s overall structure and navigation style are defined in the App Manager41. Screen Flow (Option B) and Omni-Channel (Option D) are specialized tools that can be used within a console but do not create the console app itself."}, {"id": "q25", "module": "object_manager", "question": "A user is unable to relate a task to the Course custom object. What should a Platform Administrator do to allow tasks to be related to courses?", "options": [{"key": "A", "text": "Create a sharing rule for the Course object to grant the user Read/Write access."}, {"key": "B", "text": "Select Allow Activities on the Course object in Object Manager."}, {"key": "C", "text": "Add the Open Activities related list to the Course page layout."}, {"key": "D", "text": "Update the user's profile to grant them Edit access to the Task object."}], "answer": ["B"], "explanation": "For a custom object to support Tasks and Events, the \" Allow Activities \" setting must be enabled in the object ' s properties. When a Platform Administrator creates a custom object, this checkbox is often left unchecked by default35. Enabling this feature allows the \" Related To \" (WhatId) field on a Task or Event to be linked to records of that custom object type36. While adding the related list to the page layout (Option C) is a necessary step for visibility, it will not work if the underlying feature isn ' t enabled first37. Sharing rules (Option A) and profile permissions (Option D) manage access to existing records but do not control whether the object is technically capable of having activities associated with it."}, {"id": "q26", "module": "sales_marketing", "question": "Cloud Kicks wants users to only be able to choose the opportunity stage Closed Won if the Lead source has been selected. How should a Platform Administrator accomplish this goal?", "options": [{"key": "A", "text": "Make Lead source a dependent picklist to the Opportunity Stage field."}, {"key": "B", "text": "Change the Opportunity Stage field to Read Only on the page layout."}, {"key": "C", "text": "Configure a validation rule requiring Lead source when the stage is set to Closed Won."}, {"key": "D", "text": "Make the opportunity stage a dependent picklist to the Lead source. IT Certification Guaranteed, The Easy Way! 5 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid ADM-201 Exam's Question and Answers from Freecram.net. 4 https://www.freecram.net/exam/ADM-201-salesforce-certified-administrator-e7036.html"}], "answer": ["C"], "explanation": "A Validation Rule is the correct tool for enforcing conditional data entry requirements. When a business rule dictates that a field (Lead Source) must be populated only when another field (Stage) reaches a specific value (Closed Won), a validation rule can evaluate this logic every time a record is saved. The formula would check if the Stage is \" Closed Won \" and simultaneously check if the Lead Source field is blank. If both conditions are true, the system displays an error message and prevents the user from saving the record. This ensures 100% data compliance. Dependent picklists (Options A and D) are used to filter available options in one list based on the selection of another, but they cannot \" require \" a value to be present based on a stage change in the same way a validation rule can. Making the stage \" Read Only \" (Option B) would prevent users from ever winning a deal. Validation rules are the standard method for maintaining data quality during critical transitions in the sales lifecycle."}, {"id": "q27", "module": "service_support", "question": "Universal Containers (UC) customers have provided feedback that their support cases are not being responded to quickly enough. UC wants to send all unassigned cases that have been open for more than 2 hours to an urgent Case queue and alert the support manager. Which feature should a Platform Administrator configure to meet this requirement?", "options": [{"key": "A", "text": "Case Scheduled Reports"}, {"key": "B", "text": "Case Dashboard Refreshes"}, {"key": "C", "text": "Case Escalation Rules"}, {"key": "D", "text": "Case Assignment Rules"}], "answer": ["C"], "explanation": "Case Escalation Rules are specifically designed to automate actions when a case has remained in a certain state for a defined period of time. In this scenario, the requirement involves two specific time-based triggers: moving the case after 2 hours and alerting a manager. Escalation rules allow the administrator to define \" Escalation Actions \" that execute when the time threshold is reached, such as \" Reassign to Queue \" and \" Notify Manager \" . Case Assignment Rules (Option D) only fire when a case is first created or manually triggered, not after a time delay 63 . Reports (Option A) and Dashboards (Option B) provide information but do not physically move records or perform automated reassignments."}, {"id": "q28", "module": "config_setup", "question": "A Platform Administrator at Universal Containers is asked to restrict login access for users to specific hours and specific IP addresses to help minimize the risk of bad actors getting into the org. Which setting should the administrator update to accomplish this?", "options": [{"key": "A", "text": "Company Settings"}, {"key": "B", "text": "The user's role"}, {"key": "C", "text": "The user's profile"}, {"key": "D", "text": "Custom permission sets"}], "answer": ["C"], "explanation": "In Salesforce, security restrictions like Login Hours and Login IP Ranges are managed at the Profile level. When these are configured on a profile, they are strictly enforced; if a user attempts to log in outside of the allowed hours or from an unauthorized IP address, the system will deny access entirely. This is one of the most robust ways to secure an organization against unauthorized access. Company Settings (Option A) can set \" Trusted IP Ranges \" for the whole org, but these only bypass multi-factor authentication; they do not restrict login. Roles (Option B) control record visibility, not system access. While Permission Sets (Option D) can grant many permissions, Login Hours and IP Ranges remain a core profile-level security setting."}, {"id": "q29", "module": "sales_marketing", "question": "A manager wants the sales team to update their opportunities on a regular basis. Which feature should a Platform Administrator implement to help with this?", "options": [{"key": "A", "text": "Similar Opportunities"}, {"key": "B", "text": "Opportunity Update Reminders"}, {"key": "C", "text": "Big Deal Alerts"}, {"key": "D", "text": "Scheduled Reports"}], "answer": ["B"], "explanation": "Opportunity Update Reminders is a specific, automated feature in Salesforce designed exactly for this purpose. When enabled, it allows managers to automatically send an email to their direct reports with a list of their open opportunities. The email serves as a prompt for the reps to review their deals and ensure close dates, amounts, and stages are current. This is more effective than a general Scheduled Report (Option D) because it is a purpose-built notification system that can be configured by the manager. Big Deal Alerts (Option C) are for high-value deal notifications, not general pipeline hygiene. Similar Opportunities (Option A) helps with sales strategy but does not encourage record updates. - Best Exam Practice Materials - Best Exam Practice Materials"}, {"id": "q30", "module": "object_manager", "question": "Sales Users at Cloud Kicks are requesting that the data in the industry field on the Account object displays on the Opportunity page layout. Which type of the field should an administrator create to accomplish this?", "options": [{"key": "A", "text": "Custom Account Field"}, {"key": "B", "text": "Standard Account Field."}, {"key": "C", "text": "Cross Object Formula Field"}, {"key": "D", "text": "Master detail relationship Field"}], "answer": ["C"], "explanation": "A cross object formula field is a type of formula field that references fields from related objects using relationships such as lookup or master-detail. It can be used to display data from one object on another object without creating another relationship or copying data. A cross object formula field can be created on opportunity object to display data from industry field on account object using account ID lookup relationship. A custom account field, a standard account field, or a master-detail relationship field are not types of fields that can display data from industry field on account object on opportunity page layout; they either do not exist or do not reference related objects. Reference:"}, {"id": "q31", "module": "service_support", "question": "Cloud Kicks wants to allow customers to create their own cases while visiting its public homepage. What should the administrator recommend?", "options": [{"key": "A", "text": "SMS Response"}, {"key": "B", "text": "Web-to-Case"}, {"key": "C", "text": "Email-to-Case"}, {"key": "D", "text": "Omni-Channel"}], "answer": ["B"], "explanation": "Web-to-Case allows you to create cases from a form on your website."}, {"id": "q32", "module": "config_setup", "question": "Which tool should an administrator use to identify and fix potential session vulnerabilities?", "options": [{"key": "A", "text": "Field History Tracking"}, {"key": "B", "text": "Setup Audit Trail"}, {"key": "C", "text": "Security Health Check"}, {"key": "D", "text": "Organization-Wide Defaults"}], "answer": ["C"], "explanation": "Security Health Check is a tool that can be used to identify and fix potential session vulnerabilities. Security Health Check scans the security settings in an org and compares them to a baseline set of standards, such as the Salesforce Baseline Standard or the Salesforce Optimized Standard. Security Health Check provides a health check score and a list of issues and recommendations for improving the security settings. Reference:"}, {"id": "q33", "module": "sales_marketing", "question": "The VP of sales at Universal Containers wants to prevent members of the sales team from IT Certification Guaranteed, The Easy Way! 2 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid CRT-101 Exam's Question and Answers from Freecram.net. 1 https://www.freecram.net/exam/CRT-101-certification-preparation-for-administrator-exam-e12002.html changing an opportunity to a date in the past. What should an administrator configure to meet this requirement?", "options": [{"key": "A", "text": "Assignment Rule"}, {"key": "B", "text": "Validation Rule"}, {"key": "C", "text": "Field-Level Security"}, {"key": "D", "text": "Approval Process"}], "answer": ["B"], "explanation": "Validation rules allow you to prevent users from changing an opportunity close date to a date in the past."}, {"id": "q34", "module": "config_setup", "question": "Clod Kicks has the organization wide defaults for Opportunity set to private. which two features should the administrator use to open up access to Opportunity records for sales users working on collaborative deals? Choose 2 answers", "options": [{"key": "A", "text": "Sharing set"}, {"key": "B", "text": "Role hierarchy"}, {"key": "C", "text": "Profiles"}, {"key": "D", "text": "Sharing rules"}], "answer": ["B", "D"], "explanation": "Role hierarchy and sharing rules are two features that should be used to open up access to Opportunity records for sales users working on collaborative deals. Role hierarchy can be used to grant access to records owned by or shared with users who are below them in the hierarchy. Sharing rules can be used to extend sharing access to users in public groups, roles, or territories based on certain criteria, such as record owner or field value. Reference:"}, {"id": "q35", "module": "service_support", "question": "The Administrator at Cloud Kicks need to automatically route support cases, regardless of how they are created, to a queue based on case priority. What tool should the administrator use?", "options": [{"key": "A", "text": "Email-to-Case"}, {"key": "B", "text": "Assignment Rules"}, {"key": "C", "text": "Auto-Response Rules"}, {"key": "D", "text": "Web-to-case"}], "answer": ["B"], "explanation": "Assignment rules are tools that allow administrators to automatically route records to users or queues based on certain criteria. For example, an assignment rule can assign cases to different queues based on case priority, origin, type, or other fields. Assignment rules can be triggered when records are created manually, via email, web, or API. Assignment rules consist of multiple rule entries that define the criteria and actions for each assignment scenario. Reference: - Best Exam Practice Materials"}, {"id": "q36", "module": "service_support", "question": "Which two actions should an administrator perform with Case escalation rules? Choose 2 answers", "options": [{"key": "A", "text": "Re-open the Case."}, {"key": "B", "text": "Send email notifications."}, {"key": "C", "text": "Change the Case Priority."}, {"key": "D", "text": "Re-assign the Case."}], "answer": ["B", "D"], "explanation": "Case escalation rules are used to escalate cases that have not been resolved within a certain time frame by changing the case owner, sending email notifications, or triggering workflow actions. You can use these actions to alert the appropriate users or groups when a case needs urgent attention or escalation. Reference:"}, {"id": "q37", "module": "object_manager", "question": "What are three characteristics of a master-detail relationship? Choose 3 answers", "options": [{"key": "A", "text": "The master object can be a standard or custom object."}, {"key": "B", "text": "Permissions for the detail record are set independently of the master."}, {"key": "C", "text": "Each object can have up to five master-detail relationships."}, {"key": "D", "text": "Roll-up summaries are supported in master-detail relationships."}, {"key": "E", "text": "The owner field on the detail records is the owner of the master record."}], "answer": ["A", "D", "E"], "explanation": "A master-detail relationship is a parent-child relationship in which the master object controls certain behaviors of the detail object. The master object can be a standard or custom object, but not all standard objects support being a master. Roll-up summaries are fields that calculate the sum, count, min, or max of child records. The owner field on the detail records is not available and is automatically set to the owner of the master record."}, {"id": "q38", "module": "data_analytics", "question": "Users have noticed that when they click on a report in a dashboard to view the report details, the values in the report are different from the values displayed on the dashboard. What are the two reasons this is likely to occur? Choose 2 answers", "options": [{"key": "A", "text": "The report needs to be refreshed."}, {"key": "B", "text": "The dashboard needs to be refreshed."}, {"key": "C", "text": "The current user does not have access to the report folder."}, {"key": "D", "text": "The running dashboard user and viewer have different permissions."}], "answer": ["B", "D"], "explanation": "Dashboards show data from source reports as visual components that provide a snapshot of key metrics and performance indicators. Dashboards need to be refreshed manually or scheduled to run on a regular basis to reflect the most recent data from the reports. The running user of a dashboard determines whose security settings are applied when the dashboard is run. If the running user is - Best Exam Practice Materials different from the viewer of the dashboard, they may see different data based on their permissions and sharing settings. Reference: eports/dashboards"}, {"id": "q39", "module": "data_analytics", "question": "Aw computing wants to prevent user from updating the Account Annual Revenue field to be a negative value or an amount more than $100 billion. How should an administrator accomplish this request?", "options": [{"key": "A", "text": "Create a validation rule that displays an error if Account revenue is below 0 or greater than 100 billion."}, {"key": "B", "text": "Build a scheduled report displaying Account with Account revenue that is negative or greater than 100 billion."}, {"key": "C", "text": "Make the Account Revenue field required on the page layout."}, {"key": "D", "text": "Enable the Account Revenue limits in setup, with 0 as minimum and 100 billion as maximum"}], "answer": ["A"], "explanation": "A validation rule is a tool that allows administrators to enforce data quality and integrity by preventing users from saving records that do not meet certain criteria or conditions. For example, a validation rule can display an error message if a user enters an invalid value in a field. In this case, the administrator can create a validation rule on the account object that displays an error if the account annual revenue field is below 0 or greater than 100 billion. Reference:"}, {"id": "q40", "module": "service_support", "question": "Cloud Kicks want to have consistency when communication with customers on cases. The company has requested messages to be sent in an email channel with categories to help search for the proper message. Which Solution Should be administrator suggest to meet this requirement?", "options": [{"key": "A", "text": "Prebuilt Quick Texts"}, {"key": "B", "text": "Prebuilt Email Templates."}, {"key": "C", "text": "Prebuilt Flow Templates."}, {"key": "D", "text": "Prebuilt Auto-Responses."}], "answer": ["B"], "explanation": "Prebuilt email templates are email templates that have been created and provided by Salesforce for common use cases such as sending welcome messages, confirmation emails, etc. They can be used by Cloud Kicks to have consistency when communicating with customers on cases via email channel with categories to help search for the proper message. Prebuilt email templates can be accessed from the email action in the case feed or from the email composer in Lightning Experience. They can also be filtered by category to find the most relevant template for each case. Prebuilt quick texts, prebuilt flow templates, and prebuilt auto-responses are not solutions for having consistency when communicating with customers on cases via email channel; they are used for different purposes such as inserting common phrases, creating guided processes, or sending automated replies. Reference: - Best Exam Practice Materials"}, {"id": "q41", "module": "sales_marketing", "question": "The Marketing team at Cloud Kicks uses campaigns to generate product interest. They want custom picklist values for the campaign member Status field for each campaign they run, currently, they ask the administrator to add or delete values, but this is very time consuming. Which two user permission should allow the Marketing team to customize the campaign member status picklist values themselves? Choose 2 answers", "options": [{"key": "A", "text": "Create and Edit for Campaign Member"}, {"key": "B", "text": "Marketing user feature license"}, {"key": "C", "text": "Customize Application permission"}, {"key": "D", "text": "Edit permission for campaigns"}], "answer": ["B", "D"], "explanation": "To customize the campaign member status picklist values themselves, marketing users need two things: a marketing user feature license and edit permission for campaigns. A marketing user feature license enables users to create, edit, and delete campaigns; manage campaign members; and update campaign history via the import wizards or API. Edit permission for campaigns allows users to modify existing campaigns and their related records such as campaign members and campaign member statuses. Reference:"}, {"id": "q42", "module": "object_manager", "question": "Cloud kicks wants to track shoe designs by products. Shoe designs should be unable to be deleted, and there can be multiple design for one product across various stages. Which two steps should the administration configure to meet this requirement? Choose 2 answers", "options": [{"key": "A", "text": "Create a Custom Object for shoe design."}, {"key": "B", "text": "Configure a Custom Lookup Field for shoe design on the product object."}, {"key": "C", "text": "Add a custom master detail field for shoe design on the Product Object."}, {"key": "D", "text": "Use the Standard Object for designs."}], "answer": ["A", "C"], "explanation": "Custom object and master detail field are two steps that should be configured to meet this requirement. Custom object can be used to create a new object for shoe design that can store information about different designs and stages. Master detail field can be used to create a relationship between Product and Shoe Design that prevents deletion of Shoe Design records and allows multiple designs for one product. Reference:"}, {"id": "q43", "module": "automation", "question": "The administrator at Cloud Kicks has been asked to replace two old workflow rules that are doing simple field updated when a lead is created to improve processing time. What tool should the administrator use to replace the workflow rules?", "options": [{"key": "A", "text": "Quick Action Flow"}, {"key": "B", "text": "Before Save Flow"}, {"key": "C", "text": "Scheduled Flow IT Certification Guaranteed, The Easy Way! 6 Free Exam/Cram Practice Materials - Best Exam Practice Materials Get Latest & Valid CRT-101 Exam's Question and Answers from Freecram.net. 5 https://www.freecram.net/exam/CRT-101-certification-preparation-for-administrator-exam-e12002.html"}, {"key": "D", "text": "Screen Flow"}], "answer": ["B"], "explanation": "Before Save Flows are a type of record-triggered flow that run before a record is saved and can update fields on that record without any additional actions or DML operations. They are faster and more efficient than workflow rules or process builder for simple field updates when a record is created or updated. Reference:"}, {"id": "q44", "module": "service_support", "question": "The administrator at Cloud Kicks writes an assignment rule to send all cases created via email or the web to the Automated Cases Queue Any manually created cases should be owned by the agent creating them, however, the manually created cases now show the administrator as the owner . What will the administrator find when troubleshooting this issue?", "options": [{"key": "A", "text": "An escalation rule is changing the case owner on case creation"}, {"key": "B", "text": "The Assignment Rule checkbox is selected by default."}, {"key": "C", "text": "Another assignment rule is giving ownership to the administrator"}, {"key": "D", "text": "The Owner field is missing on the webform and email template."}], "answer": ["B"], "explanation": "The Assignment Rule checkbox is a checkbox that appears on manual case creation pages when assignment rules are defined for cases. The Assignment Rule checkbox determines whether or not to apply assignment rules to manually created cases. If the Assignment Rule checkbox is selected by default, then any manually created cases will be assigned according to assignment rules instead of being owned by the agent creating them. To prevent this from happening, an administrator can either deselect the Assignment Rule checkbox when creating cases manually; or change the default setting for this checkbox under setup by selecting or deselecting Use active assignment rules by default. Reference:"}, {"id": "q45", "module": "service_support", "question": "Universal Containers introduced a new product and wants to track all associated cases that get logged. They are looking for an automated solution that would give the product's two lead engineers read/write access to all new cases that reference the new product. What should an administrator do to satisfy this requirement?", "options": [{"key": "A", "text": "Create a queue and a criteria-based sharing rule."}, {"key": "B", "text": "Create a predefined case team and an assignment rule."}, {"key": "C", "text": "Create a user-based sharing rule and an ad-hoc case team."}, {"key": "D", "text": "Create an auto-response rule and a public group."}], "answer": ["A"], "explanation": "To track all cases that reference the new product and give read/write access to the product's two lead engineers, the administrator should create a queue and a criteria-based sharing rule. The queue will allow assigning cases that meet certain criteria, such as having a specific value in the Product field, to a group of users. The criteria-based sharing rule will grant read/write access to the queue members for cases that match the same criteria. Reference: - Best Exam Practice Materials"}, {"id": "q46", "module": "config_setup", "question": "Which setting on a profile makes a tab hidden in the All App Launcher or viable in arty app, but still allows a user to view records that would normally be found under this tab?", "options": [{"key": "A", "text": "Object Permissions"}, {"key": "B", "text": "App Permissions"}, {"key": "C", "text": "Pig wide Defaults"}, {"key": "D", "text": "Tab Settings"}], "answer": ["D"], "explanation": "To make a tab hidden in the All App Launcher or visible in any app, but still allow a user to view records that would normally be found under this tab, the administrator should use Tab Settings on a profile. Tab Settings control the visibility and default behavior of tabs for each app in an org. The administrator can set a tab to Hidden, which means it will not appear in any app or in the All App Launcher, but users can still access records via other means such as search or reports. Object Permissions, App Permissions, and Org-Wide Defaults are not related to tab visibility. Reference:"}, {"id": "q47", "module": "object_manager", "question": "What are two considerations an administrator should keep in mind when working with Salesforce objects? Choose 2 answers", "options": [{"key": "A", "text": "Custom and standard objects have standard fields."}, {"key": "B", "text": "Standard objects are included with Salesforce."}, {"key": "C", "text": "A new standard object can be created."}, {"key": "D", "text": "Only standard objects support master-detail relationships."}], "answer": ["B", "C"], "explanation": "Standard objects are objects that are included with Salesforce by default, such as Account, Contact, Lead, Opportunity, etc. They have predefined fields and functionality that support common business processes. Custom objects are objects that you create to store information that is specific to your organization or industry. You can create new standard objects using the Object Manager in Setup. Reference: objects"}, {"id": "q48", "module": "automation", "question": "Clod Kicks has a screen flow with two questions on the same screen, but only one is necessary at a time. The administrator has been asked to show only the questions that is needed. How should an administrator complete this?", "options": [{"key": "A", "text": "Use a new version of the flow for each scenario."}, {"key": "B", "text": "Use a decision element and a new screen to show the proper question"}, {"key": "C", "text": "Use a conditional visibility to hide the unnecessary question"}, {"key": "D", "text": "Use branching in the flow screen to show the proper scenario"}], "answer": ["C"], "explanation": "- Best Exam Practice Materials Conditional visibility is a feature that allows administrators to show or hide screen components in a flow based on certain conditions or criteria. For example, conditional visibility can show only one question on a screen depending on the value of another field or variable. Conditional visibility consists of one or more rules that define when to show or hide a component based on an expression that evaluates to true or false. In this case, the administrator can use conditional visibility to hide the unnecessary question on the screen flow based on the scenario. Reference:"}, {"id": "q49", "module": "config_setup", "question": "An administrator installed a managed package that contains a permission set group. The permission set group that was installed includes Delete access on several objects, and the administrator needs to prevent users in the permission set group from being able to delete records. What should the administrator do to control Delete access?", "options": [{"key": "A", "text": "Use a muting permission set with a permission set group to mute selected permissions."}, {"key": "B", "text": "Create a new permission set that has Delete access deselected for the objects."}, {"key": "C", "text": "Create a new role that prevents Delete permissions from rolling up to the users."}, {"key": "D", "text": "Edit the profile for the users to remove Delete access from the objects."}], "answer": ["A"], "explanation": "Muting permission sets allow you to remove permissions that are granted by a permission set group."}, {"id": "q50", "module": "config_setup", "question": "Cloud Kicks want its reports to show a Fiscal Year that starts on February 1 and has 12 months. How Should the Administrator Address this requirement?", "options": [{"key": "A", "text": "Set the Fiscal Year to Custom and the starting month as February."}, {"key": "B", "text": "Set the Fiscal Year to Custom and the duration to 4 quarters."}, {"key": "C", "text": "Set the Fiscal Year to Standard and the starting month as February."}, {"key": "D", "text": "Set the Fiscal Year to Standard and the duration to 12 months."}], "answer": ["A"], "explanation": "A standard fiscal year starts on January 1 and ends on December 31. A custom fiscal year can be set to start on any month and end on any month. In this case, Cloud Kicks wants its fiscal year to start on February 1 and end on January 31. This can be achieved by setting the fiscal year to Custom and the starting month to February. Setting the fiscal year to Standard and the starting month to February will not work, as the standard fiscal year starts on January 1. Setting the fiscal year to Custom and the duration to 4 quarters will not work, as the duration of a fiscal year is 12 months. Setting the fiscal year to Standard and the duration to 12 months will not work, as the standard fiscal year starts on January 1. Custom fiscal years are fiscal years that follow a custom-defined structure that differs from the Gregorian calendar. They can be used by organizations that have fiscal years that start on a different month than January or have fiscal years that are divided into custom periods such as quarters or weeks. To set up a custom fiscal year that starts on February 1 and has 12 months, an administrator needs to set the fiscal year to custom and the starting month as February in the fiscal year settings. Setting the fiscal year to standard or the duration to 4 quarters does not meet the requirement of having a custom fiscal year that starts on February 1. Reference: - Best Exam Practice Materials"}, {"id": "q51", "module": "service_support", "question": "The administrator at DreamHouse Realty added an email quick action to the Case page layout and is unable to see the action on the case feed. Which feature must be enabled to ensure the quick action will be displayed as expected?", "options": [{"key": "A", "text": "Email Notifications"}, {"key": "B", "text": "Email-to-Case"}, {"key": "C", "text": "Email Alerts"}, {"key": "D", "text": "Email Templates"}], "answer": ["B"], "explanation": "Email-to-Case allows you to create cases from incoming emails. You need to enable this feature and set up routing addresses and case creation settings."}, {"id": "q52", "module": "automation", "question": "An administrator has been asked to update a flow that was created as part of a recent update. When the administrator opens the flow for editing, the Flow toolbox offers only four elements: Assignment, Decision, Get Records, and Loop. What would cause this?", "options": [{"key": "A", "text": "The flow is a screen flow."}, {"key": "B", "text": "The version of the flow is inactive."}, {"key": "C", "text": "The flow is a before save flow."}, {"key": "D", "text": "The version of the flow is activated."}], "answer": ["C"], "explanation": "Before save flows only support four elements: Assignment, Decision, Get Records, and Loop."}, {"id": "q53", "module": "object_manager", "question": "Cloud Kicks generates leads for its different product categories (shoes, apparel, and accessories) through many different sources. While some lead sources are used for all three categories, other lead sources are specific to a single category. The VP of marketing requests that only the proper lead sources be displayed based on the product category chosen. How should the administrator configure Salesforce to meet this requirement?", "options": [{"key": "A", "text": "Create a page layout for each category and filter the Lead Source field based on category."}, {"key": "B", "text": "Create a dependency between the Product Category field and Lead Source field."}, {"key": "C", "text": "Create business processes and record types for each of the three product categories."}, {"key": "D", "text": "Create a single business process, then create record types for each product category."}], "answer": ["B"], "explanation": "To display only the proper lead sources based on the product category chosen, an administrator should create a dependency between the Product Category field and Lead Source field on Lead object. A dependency is a relationship between two picklist fields that restricts the values available in one picklist based on the value selected in another picklist. For example, an administrator can create a dependency that shows only Online Store and Social Media as lead sources if Product Category is Shoes, but shows only Trade Show and Magazine as lead sources if Product Category is Apparel. Creating a page layout for each category, creating business processes and record types for each category, or creating a single business process with record types for each category will not display - Best Exam Practice Materials only the proper lead sources based on the product category chosen. Reference:"}, {"id": "q54", "module": "data_analytics", "question": "DreamHouse Realty requires that house showings be scheduled within the current year to prevent too many future showings from stacking up. How can they make sure Showing Date is only populated with a date this years?", "options": [{"key": "A", "text": "Sync the users' Showing Calendar to Salesforce and filter it to only look at this year."}, {"key": "B", "text": "Create a report that shows any Showing Dates not scheduled in the current year to the updated."}, {"key": "C", "text": "Add Help Text so the user knows to only add a Showing Date within the current year."}, {"key": "D", "text": "Create a validation rule that ensures Showing Date contains a date within the current year."}], "answer": ["D"], "explanation": "A validation rule is a feature that allows administrators to define criteria for data entry or import operations and display an error message when those criteria are not met. For example, a validation rule can ensure that house showings are scheduled within the current year by comparing the showing date field with a formula that returns the current year. If the showing date field contains a date outside of the current year, then the validation rule will prevent users from saving or importing records with an error message. Reference: - Best Exam Practice Materials"}, {"id": "q55", "module": "productivity", "question": "Cloud Kicks wants a reports to categorize accounts into small, medium, and large based on the dollar value found in the Contract Value Field. What feature should an administrator use to meet this request?", "options": [{"key": "A", "text": "Detail Column"}, {"key": "B", "text": "Bucket Column"}, {"key": "C", "text": "Group Rows"}, {"key": "D", "text": "Filter Logic"}], "answer": ["B"], "explanation": "Bucket column allows you to categorize report data into groups without creating a formula or custom field. You can create buckets for different ranges of values and assign labels to them. References: id=sf.reports_bucketing_overview.htm&type=5"}, {"id": "q56", "module": "data_analytics", "question": "A sales rep has a list of 300 accounts with contacts that they want to load at one time. Which tool should the administrator utilize to import the records to salesforce?", "options": [{"key": "A", "text": "Dataloader.io"}, {"key": "B", "text": "Data Loader"}, {"key": "C", "text": "Manual Import"}, {"key": "D", "text": "Data Import Wizard"}], "answer": ["D"], "explanation": "Data Import Wizard allows you to import up to 50,000 records at a time. References:"}, {"id": "q57", "module": "automation", "question": "An administrator at Universal Container needs an automated way to delete records based on field values. What automatedsolution should the administrator use?", "options": [{"key": "A", "text": "Workflow"}, {"key": "B", "text": "Process Builder"}, {"key": "C", "text": "Flow Builder"}, {"key": "D", "text": "Automation Studio"}], "answer": ["C"], "explanation": "Flow Builder is a tool that can be used to create an automated way to delete records based on field values. Flow Builder can createflows that define the logic and actions for deleting records, such as finding records that match certain criteria and deleting them in bulk. Flows can be scheduled to run at regular intervals or triggered by other events or processes. References: flow_builder.htm&type=5 id=sf.flow_concepts_delete.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (150 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q58", "module": "sales_marketing", "question": "At Universal Containers, there is a custom field on the Lead named Product Category. Management wants this information to be part of the Opportunity upon leadconversion. What action should the administrator take to satisfy the request?", "options": [{"key": "A", "text": "Map the lead custom field to the product's product category field."}, {"key": "B", "text": "Create a workflow to update Opportunity fields based on the lead."}, {"key": "C", "text": "Create a custom field on the Opportunity and map the two fields."}, {"key": "D", "text": "Configure the product categories picklist field on the product."}], "answer": ["C"], "explanation": "To transfer data from a lead custom field to an opportunity field upon lead conversion, an administrator needs to create a custom field on the opportunity object that matches the data type and length of the lead custom field, and then map the two fields using the lead field mapping tool under setup. This will ensure that the value of the product category field on the lead is copied to the correspondingfield on the opportunity when the lead is converted. References:"}, {"id": "q59", "module": "object_manager", "question": "Cloud Kicks is working on a better way to track its product shipments utilizing Salesforce. Which field type should an administrator use to capture coordinates?", "options": [{"key": "A", "text": "Geolocation"}, {"key": "B", "text": "Geofence"}, {"key": "C", "text": "Custom address"}, {"key": "D", "text": "External lookup"}], "answer": ["A"], "explanation": "Geolocation fields allow you to store the latitude and longitude coordinates of a location. They can be used to calculate distances between records and display maps of accounts, contacts, leads, or other custom objects. References:"}, {"id": "q60", "module": "data_analytics", "question": "An administrator is planning to use Data Loader to mass import new records to a custom object from a new API. What will the administrator need to do to use the Data Loader?", "options": [{"key": "A", "text": "Add a permission set that allows them to import data."}, {"key": "B", "text": "Append their security token at the end of their password to login."}, {"key": "C", "text": "Use the Data Import Tool to mass import custom object records."}, {"key": "D", "text": "Reset their password and their security token."}], "answer": ["B"], "explanation": "To use Data Loader to mass import new records to a custom object from a new API, the administrator will need to append their security token at the end of their password to login. The security token is an alphanumeric code that is required for API access when logging in from an IP address that is not trusted by Salesforce. The security token can be obtained from the user's personal settings or by resetting it via email. Adding a permission set, resetting the password and the security token, or using the Data Import Tool are not necessary for using Data Loader. References: id=sf.data_loader. htm&type=5"}, {"id": "q61", "module": "automation", "question": "Dreamhouse realty wants to offer a form on its experience cloud site where inspectors will submit findings from a property inspection. Which featureshould an administrator place on the page to fulfill this requirement?", "options": [{"key": "A", "text": "Related List"}, {"key": "B", "text": "Autolaunched Flow"}, {"key": "C", "text": "Record Detail"}, {"key": "D", "text": "Screen Flow"}], "answer": ["D"], "explanation": "Screen flow allows you to create a form that collects user input and performs actions based on that input.You can use screen components to display questions and instructions, and use flow logic to update records or send notifications. References:"}, {"id": "q62", "module": "service_support", "question": "Ursa Major Solar wants to automatically notify a manager about any cases awaiting a response from an agent for more than 2 hours after case creation. Which feature should a Platform Administrator use to fulfill this requirement?", "options": [{"key": "A", "text": "Assignment Rule"}, {"key": "B", "text": "Case Escalation Rule"}, {"key": "C", "text": "Formula field"}, {"key": "D", "text": "Omni-Channel Supervisor"}], "answer": ["B"], "explanation": "Case Escalation Rules are the dedicated tool for time-based notifications and reassignments in Service Cloud. The Platform Administrator can set an escalation rule entry that triggers when a case is \"Older than 2 hours\" and meets specific status criteria (e.g., Status = New). The rule can then be configured to send an Email Notification to a manager or a specific distribution list. This ensures that management is alerted to potential SLA breaches. Assignment Rules (Option A) only run when a case is first created. Formula fields (Option C) can calculate time but cannot send notifications. Omni-Channel Supervisor (Option D) allows for real-time monitoring but does not provide automated email alerting based on specific time-elapsed thresholds."}, {"id": "q63", "module": "data_analytics", "question": "Cloud Kicks has decided to delete a custom field. What will happen to the data in the field when it is deleted?", "options": [{"key": "A", "text": "The data in the field is stored for 20 days."}, {"key": "B", "text": "The data is permanently deleted."}, {"key": "C", "text": "The data associated with the field is required."}, {"key": "D", "text": "The data is restorable from the recycle bin."}], "answer": ["A"], "explanation": "When you delete a custom field, the data in that field is stored for 20 days before it is permanently deleted. During this time, you can restore the field and its data from the Recycle Bin or use Data Loader to export the data.References: id=sf.customize_del_field.htm&type=5"}, {"id": "q64", "module": "automation", "question": "An administrator at Ursa Major Solar needs to send information to an external accounting system What workflow action should the administrator use to accomplish this?", "options": [{"key": "A", "text": "Assign Task"}, {"key": "B", "text": "Outbound Message"}, {"key": "C", "text": "Create Record"}, {"key": "D", "text": "Custom Notification"}], "answer": ["B"], "explanation": "Outbound message allows you to send information to an external system as part of a workflow rule or approval process. You can use outbound message to specify which fields to send and which endpoint URL to send them to. References: id=sf.workflow_om_considerations.htm&type=5"}, {"id": "q65", "module": "sales_marketing", "question": "The marketing director at Northern Trail Outfitters has requested that the budget field is populated in order for the Lead Status field to be marked as qualified. What tool should the administrator use to fulfill this request?", "options": [{"key": "A", "text": "Lead Conversion."}, {"ke
