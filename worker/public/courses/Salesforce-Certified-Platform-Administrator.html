</script>
<style>
:root{
  --ink:#182338;
  --ink-soft:#414f68;
  --paper:#F3F1EA;
  --paper-2:#EAE6DA;
  --panel:#FFFFFF;
  --line:#D8D2C1;
  --brass:#B8862E;
  --brass-soft:#E9D9B4;
  --brass-deep:#8C6420;
  --teal:#2E6E62;
  --teal-soft:#DCEAE6;
  --red:#A8422C;
  --red-soft:#F3DCD4;
  --radius:2px;
  --shadow: 0 1px 2px rgba(24,35,56,.06), 0 8px 24px -12px rgba(24,35,56,.18);
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    linear-gradient(var(--paper) 1px, transparent 1px) 0 0/100% 32px,
    linear-gradient(90deg, var(--paper) 1px, transparent 1px) 0 0/32px 100%,
    var(--paper);
  background-color:var(--paper);
  background-image:
    linear-gradient(rgba(24,35,56,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(24,35,56,.035) 1px, transparent 1px);
  background-size: 28px 28px;
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
}
a{color:var(--brass-deep);}
::selection{background:var(--brass-soft);}

/* ---------- Topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(243,241,234,.92);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1100px;margin:0 auto;padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
.brand-mark{
  font-family:var(--font-mono);font-weight:700;font-size:12px;
  background:var(--ink);color:var(--paper);padding:3px 7px;letter-spacing:.06em;
}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:.01em;}
.brand-sub{font-size:12px;color:var(--ink-soft);font-family:var(--font-mono);}
.topbar-progress{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);}
.topbar-progress .bar{width:120px;height:6px;background:var(--paper-2);border:1px solid var(--line);position:relative;}
.topbar-progress .bar > span{position:absolute;inset:0;background:var(--brass);width:0%;transition:width .4s;}

.wrap{max-width:1100px;margin:0 auto;padding:36px 24px 96px;}

/* ---------- Weight rail (signature element) ---------- */
.weightbar{display:flex;height:34px;border:1px solid var(--ink);width:100%;overflow:hidden;margin-bottom:10px;}
.weightbar .seg{
  height:100%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--paper);
  border-right:1px solid rgba(243,241,234,.35);cursor:pointer;position:relative;
  transition:filter .15s;
}
.weightbar .seg:last-child{border-right:none;}
.weightbar .seg:hover{filter:brightness(1.12);}
.weightbar .seg.done::after{
  content:"✓"; position:absolute; top:2px; right:4px; font-size:9px;
}
.weightbar-caption{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
  display:flex;justify-content:space-between;margin-bottom:40px;
}

/* ---------- Hero ---------- */
.hero{margin-bottom:8px;}
.eyebrow{
  font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--brass-deep);margin-bottom:10px;
}
h1.hero-title{
  font-family:var(--font-display);font-weight:600;font-size:44px;line-height:1.06;
  margin:0 0 14px;letter-spacing:-.01em;
}
.hero-lede{font-size:16px;color:var(--ink-soft);max-width:640px;line-height:1.55;margin-bottom:28px;}

/* ---------- Timeline (course overview) ---------- */
.timeline{position:relative;margin-top:12px;}
.timeline::before{
  content:"";position:absolute;left:27px;top:10px;bottom:10px;width:2px;
  background:repeating-linear-gradient(var(--line),var(--line) 4px,transparent 4px,transparent 9px);
}
.tl-item{
  position:relative;display:grid;grid-template-columns:56px 1fr;gap:0;margin-bottom:14px;
}
.tl-node{
  width:56px;height:56px;border-radius:50%;background:var(--panel);border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;
  font-size:15px;z-index:2;
}
.tl-node.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.tl-node.exam{background:var(--ink);border-color:var(--ink);color:var(--paper);}
.tl-card{
  background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);
  margin-left:18px;padding:18px 20px;cursor:pointer;transition:transform .12s, box-shadow .12s;
  display:flex;justify-content:space-between;align-items:center;gap:14px;
}
.tl-card:hover{transform:translateX(2px);box-shadow:0 2px 4px rgba(24,35,56,.08), 0 14px 28px -14px rgba(24,35,56,.28);}
.tl-card-title{font-family:var(--font-display);font-weight:600;font-size:19px;margin:0 0 4px;}
.tl-card-meta{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);display:flex;gap:14px;flex-wrap:wrap;}
.tl-card-right{text-align:right;flex-shrink:0;}
.pct-pill{
  font-family:var(--font-mono);font-weight:700;font-size:13px;padding:4px 10px;
  border:1px solid var(--line);background:var(--paper);white-space:nowrap;
}
.pct-pill.good{background:var(--teal-soft);border-color:var(--teal);color:var(--teal);}
.pct-pill.bad{background:var(--red-soft);border-color:var(--red);color:var(--red);}
.tl-card-cta{font-size:12px;color:var(--ink-soft);margin-top:4px;}

/* ---------- Module page ---------- */
.backlink{
  display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;
  color:var(--ink-soft);cursor:pointer;margin-bottom:22px;border:none;background:none;padding:0;
}
.backlink:hover{color:var(--ink);}
.module-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:26px;border-bottom:2px solid var(--ink);padding-bottom:18px;}
.module-num{font-family:var(--font-mono);color:var(--brass-deep);font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
h1.module-title{font-family:var(--font-display);font-weight:600;font-size:36px;margin:0;line-height:1.08;}
.module-tabs{display:flex;gap:0;border:1px solid var(--ink);}
.module-tab{
  padding:9px 18px;font-family:var(--font-mono);font-size:12.5px;font-weight:600;background:var(--panel);
  cursor:pointer;border-right:1px solid var(--ink);color:var(--ink-soft);
}
.module-tab:last-child{border-right:none;}
.module-tab.active{background:var(--ink);color:var(--paper);}

.article{
  background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);
  padding:44px 52px;max-width:780px;
}
.article h1{font-family:var(--font-display);font-size:26px;}
.article h2{font-family:var(--font-display);font-weight:600;font-size:21px;margin-top:38px;border-bottom:1px solid var(--line);padding-bottom:8px;}
.article h3{font-family:var(--font-display);font-weight:600;font-size:17px;margin-top:24px;}
.article p, .article li{font-size:15px;line-height:1.68;color:#26324a;}
.article blockquote{
  margin:0 0 26px;padding:12px 18px;background:var(--brass-soft);border-left:3px solid var(--brass);
  font-size:13.5px;color:var(--brass-deep);font-family:var(--font-mono);
}
.article blockquote p{color:var(--brass-deep);margin:0;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;}
.article table{border-collapse:collapse;width:100%;margin:20px 0;font-size:13.5px;}
.article th,.article td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
.article th{background:var(--paper-2);font-family:var(--font-mono);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
.article code{font-family:var(--font-mono);background:var(--paper-2);padding:1px 5px;font-size:13px;}
.article strong{color:var(--ink);}
.article ul,.article ol{padding-left:22px;}
.article-footer{
  margin-top:40px;padding-top:22px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
.btn{
  font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.03em;
  padding:11px 22px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);
  cursor:pointer;transition:background .15s, color .15s;
}
.btn:hover{background:var(--brass-deep);border-color:var(--brass-deep);}
.btn.secondary{background:var(--panel);color:var(--ink);}
.btn.secondary:hover{background:var(--paper-2);color:var(--ink);}
.btn.wide{width:100%;text-align:center;padding:14px;font-size:14px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.mark-read-note{font-family:var(--font-mono);font-size:11.5px;color:var(--teal);display:flex;align-items:center;gap:6px;}

/* ---------- Quiz settings ---------- */
.settings-card{
  background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);
  padding:36px 40px;max-width:560px;
}
.settings-card h2{font-family:var(--font-display);font-size:22px;margin:0 0 6px;}
.settings-card .desc{color:var(--ink-soft);font-size:13.5px;margin-bottom:26px;}
.field-row{margin-bottom:22px;}
.field-label{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:10px;display:block;}
.count-row{display:flex;align-items:center;gap:14px;}
input[type=range]{flex:1;accent-color:var(--brass);}
.count-value{font-family:var(--font-mono);font-weight:700;font-size:18px;width:44px;text-align:right;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);}
.toggle-row:last-child{border-bottom:none;}
.toggle-row .lbl{font-size:14px;}
.toggle-row .lbl small{display:block;color:var(--ink-soft);font-size:12px;margin-top:2px;}
.switch{position:relative;width:40px;height:22px;background:var(--paper-2);border:1px solid var(--line);cursor:pointer;flex-shrink:0;}
.switch.on{background:var(--brass);border-color:var(--brass-deep);}
.switch::after{content:"";position:absolute;top:1px;left:1px;width:18px;height:18px;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3);}
.switch.on::after{left:19px;}

/* ---------- Quiz runtime ---------- */
.quiz-hud{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;
  font-family:var(--font-mono);font-size:12.5px;
}
.quiz-hud .stat{display:flex;gap:18px;}
.quiz-hud .stat span b{font-size:16px;display:block;}
.quiz-hud .stat .correct b{color:var(--teal);}
.quiz-hud .stat .wrong b{color:var(--red);}
.progress-track{height:6px;background:var(--paper-2);border:1px solid var(--line);margin-bottom:30px;}
.progress-track > span{display:block;height:100%;background:var(--ink);transition:width .3s;}

.q-card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);padding:36px 40px;max-width:760px;}
.q-eyebrow{font-family:var(--font-mono);font-size:11.5px;color:var(--brass-deep);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.q-text{font-family:var(--font-display);font-size:20px;line-height:1.42;font-weight:500;margin-bottom:26px;}
.q-multi-hint{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin:-16px 0 18px;}
.opt{
  display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border:1px solid var(--line);
  margin-bottom:10px;cursor:pointer;background:var(--panel);transition:border-color .12s, background .12s;
}
.opt:hover{border-color:var(--ink);}
.opt .k{
  font-family:var(--font-mono);font-weight:700;font-size:12px;width:22px;height:22px;flex-shrink:0;
  border:1px solid var(--ink-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.opt .t{font-size:14.5px;line-height:1.5;padding-top:1px;}
.opt.selected{border-color:var(--ink);background:var(--paper-2);}
.opt.selected .k{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.opt.correct{border-color:var(--teal);background:var(--teal-soft);}
.opt.correct .k{background:var(--teal);color:#fff;border-color:var(--teal);}
.opt.incorrect{border-color:var(--red);background:var(--red-soft);}
.opt.incorrect .k{background:var(--red);color:#fff;border-color:var(--red);}
.opt.disabled{cursor:default;}

.explain{
  margin-top:22px;padding:18px 20px;border-left:3px solid var(--ink);background:var(--paper-2);
  font-size:14px;line-height:1.6;color:#2b3550;
}
.explain .verdict{font-family:var(--font-mono);font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block;}
.explain .verdict.ok{color:var(--teal);}
.explain .verdict.no{color:var(--red);}
.q-actions{display:flex;justify-content:space-between;margin-top:26px;align-items:center;}

/* ---------- Results ---------- */
.results-card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);padding:44px 48px;max-width:640px;text-align:center;}
.results-score{font-family:var(--font-display);font-weight:700;font-size:64px;line-height:1;margin:8px 0 4px;}
.results-score.good{color:var(--teal);}
.results-score.bad{color:var(--red);}
.results-sub{color:var(--ink-soft);font-family:var(--font-mono);font-size:13px;margin-bottom:30px;}
.results-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--line);margin-bottom:30px;}
.results-grid div{padding:16px;border-right:1px solid var(--line);}
.results-grid div:last-child{border-right:none;}
.results-grid .n{font-family:var(--font-mono);font-weight:700;font-size:22px;}
.results-grid .l{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.05em;margin-top:2px;}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.review-list{text-align:left;margin-top:36px;border-top:1px solid var(--line);padding-top:24px;}
.review-item{padding:12px 0;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;gap:10px;}
.review-item .icon{flex-shrink:0;font-family:var(--font-mono);font-weight:700;}
.review-item .icon.ok{color:var(--teal);}
.review-item .icon.no{color:var(--red);}

footer.app-footer{max-width:1100px;margin:0 auto;padding:0 24px 60px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);}

@media (max-width:720px){
  .article{padding:28px 22px;}

<script id="course-data" type="application/json">{"modules": [{"id": "config_setup", "order": 1, "title": "Configuration and Setup", "weight": 15, "article": "# Module 1: Configuration and Setup\n\n> **Exam weight: 15%** — this is one of the two heaviest sections on the ADM-201 exam, together with Object Manager & Lightning App Builder. Expect a large number of scenario-based questions here.\n\n## 1. Company Settings\n\nEvery Salesforce org has a set of global settings configured under **Setup → Company Settings → Company Information**. As a Platform Administrator you must know what lives here and why it matters operationally:\n\n- **Fiscal Year** — By default the fiscal year matches the calendar year (Jan–Dec). Under *Setup → Company Settings → Fiscal Year* you can define a **Standard Fiscal Year** (starts in any month, still uses standard quarters) or a **Custom Fiscal Year** (variable-length periods, e.g. 4-4-5 retail calendars). Custom Fiscal Year is irreversible once enabled and requires Salesforce Support to activate — remember this \"cannot be undone\" detail, it is a favorite exam trap.\n- **Business Hours** — Defined under *Setup → Business Hours*. These are used by Entitlement Processes, Milestones, and Case escalation rules to calculate time-based automation (e.g., \"escalate if no response within 4 business hours\"). You can mark one Business Hours record as the organization default and activate/deactivate others per time zone.\n- **Currency Management** — A single-currency org has one fixed corporate currency. Enabling **Multiple Currencies** (irreversible) lets you add currency types with conversion rates managed manually under *Setup → Manage Currencies*. **Advanced Currency Management** additionally supports dated exchange rates so opportunities use the exchange rate in effect on their close date instead of today's static rate.\n- **Default settings** — Company Information also stores the org's default locale, language, and time zone, primary contact, org ID, and storage limits. These act as the *fallback* defaults applied to brand-new users unless overridden at the user record.\n\n## 2. Declarative Configuration of the User Interface (UI/UX)\n\nAdministrators are expected to know every no-code lever for shaping what users see:\n\n- **App Menu** — Configured under *Setup → App Manager*. Lightning Apps bundle a navigation bar, a set of tabs, branding (utility bar, logo, color), and a **User Profile/Permission Set visibility** setting that restricts which users see which app.\n- **List Views** — Standard or custom, filterable by \"All\", \"My\", or custom criteria; can be filtered further with **List View filter logic**, made available **Kanban**-style, and shared with specific users, roles, or public groups (in Lightning). *Mass Update* via inline editing on a list view is a common exam scenario.\n- **Global Actions vs. Object-Specific Quick Actions** — Global Actions (e.g., \"Log a Call\", \"New Case\") live in the Global Actions section of Setup and can create records not tied contextually to a specific parent, or log activities. Object-specific Quick Actions appear on a record's Lightning page and can pre-populate field values with **Predefined Field Values**.\n- **Lightning App Builder** — The drag-and-drop tool for building Lightning Record Pages, App Pages, and Home Pages using standard/custom/Lightning Web Components. Activation controls (App, Record Type, Profile) decide which combination of users see a given custom Lightning page. This overlaps heavily with Module 2.\n\n## 3. Setting Up and Maintaining Users\n\nThis is consistently one of the most tested areas of the whole exam.\n\n**Uniqueness & format rules**\n- The **Username** must be unique *across all Salesforce orgs globally* (not just your org) and is formatted like an email address, but does not have to be a real email. This is why \"username already in use\" errors can occur even in a brand-new org — someone else already claimed that exact string somewhere in the world.\n- The **Email** field does not need to be unique and is where notifications/resets are sent.\n\n**Locale, language, and working hours**\n- **Locale** controls date, time, and number formatting (e.g., dd/mm/yyyy vs mm/dd/yyyy) and the first day of the week.\n- **Language** controls the translated labels the user sees.\n- Both can be set per-user, independent of the org default — a French-speaking user in a US org can have their own locale/language without affecting anyone else.\n\n**Licenses**\n- A **User License** (e.g., Salesforce, Salesforce Platform, Chatter Free, Chatter External, Experience Cloud licenses) determines the baseline set of features/objects a user can be granted access to, and is selected once when the user is created (generally cannot be changed after creation in most orgs without special handling).\n- **Feature Licenses** (e.g., Marketing User, Knowledge User, Service Cloud User, Sales Console User) are *add-ons* layered on top of a User License to unlock specific features. They're assigned via checkboxes on the user record or through Permission Set Licenses.\n- **Permission Set Licenses** allow you to grant access to a feature (like a specific Salesforce add-on product) without consuming a full user license.\n- Distributing licenses: track usage under *Setup → Company Information* (shows licenses used/available) so you never attempt to create more users than your contract allows.\n\n**Never delete a user**\n- Salesforce does not allow hard-deletion of User records (data integrity — audit trails, record ownership history, and created/modified-by fields must always resolve to someone). Instead, admins **deactivate (\"Freeze\" or uncheck \"Active\")** users who leave the company.\n- **Implications of deactivation**: a deactivated user's records remain, their name still appears as owner unless reassigned, they can no longer log in, and they stop consuming a license (freeing it up for someone else). Deactivated users can still be referenced in the role hierarchy, in fact you often need to keep them in the hierarchy briefly while records are reassigned. You cannot deactivate a user who is still selected as the sole \"Case Escalation\" or \"Default Workflow User\" owner elsewhere without first reassigning that role.\n\n**Overrides & delegation**\n- **Delegated Administration** lets you grant specific non-admin users limited rights to create/edit/reset-password/freeze users within selected roles/permission sets — without giving them the full System Administrator profile.\n- Login access **override**: an admin can grant \"Login As\" access to troubleshoot as a user (subject to the org's \"Administrators Can Log in as Any User\" setting).\n\n**Login methods**\n- Users can authenticate via username/password, **Single Sign-On (SSO)** (SAML/OpenID Connect), **Social Sign-On**, or delegated authentication. Administrators manage multiple simultaneous login methods per org, and must understand **My Domain** is a prerequisite for most SSO and branding configurations.\n\n## 4. Organization Security Controls\n\n- **Identity Verification** — Multi-Factor Authentication (MFA) is required by Salesforce for all direct UI logins. Verification methods include the Salesforce Authenticator app, third-party TOTP apps, security keys, and built-in authenticators. As of recent policy, admins should always steer scenario answers toward enabling MFA rather than disabling it.\n- **Setup Audit Trail** — A read-only log (retained for a limited rolling window, extendable/exportable) of configuration changes made by admins: profile edits, permission changes, workflow rule edits, etc. It does **not** log record data changes — for that, use **Field History Tracking** or **Field Audit Trail**.\n- **Login Hours** — Set per profile; restrict the days/hours during which a profile's users may authenticate. If a user is logged in when their allowed window ends, they're not kicked out immediately but can no longer take further actions until the window reopens (in practice they lose access).\n- **Session Settings** — Configured under *Setup → Session Settings*: session timeout value, \"Lock sessions to the IP address from which they originated,\" \"Force logout on session timeout,\" and Session security levels used for High Assurance requirements (e.g., requiring MFA step-up before exporting reports).\n- **Agent/API access** — Controls like **Login IP Ranges** (per profile — logins outside the range require additional identity verification instead of being blocked outright, unless \"Enforce login IP ranges on every request\" applies at the org level), **Connected Apps** (govern OAuth access for external integrations/agents), and API-enabled permission gate machine access.\n\n## 5. The Salesforce Sharing Model\n\nThe exam loves layered \"who can see what\" scenarios. Know the full toolkit and the order in which access is evaluated:\n\n1. **Organization-Wide Defaults (OWD)** set the *baseline/most restrictive* access level per object: Private, Public Read Only, Public Read/Write (and Controlled by Parent for detail objects in master-detail relationships). OWD is the floor — everything else *adds* access on top of it, never removes it.\n2. **Role Hierarchy** — Grants managers automatic visibility into the records owned by their subordinates (assuming \"Grant Access Using Hierarchies\" is checked for that object — this checkbox is only shown/relevant when OWD is Private or Public Read Only).\n3. **Sharing Rules** — Automatically extend access to records beyond the role hierarchy/OWD, based on record **ownership** or **criteria**, targeting public groups, roles, or roles-and-subordinates.\n4. **Public Groups** — Reusable bundles of users, roles, and/or other groups, used as the target of sharing rules and as folder/report access boundaries.\n5. **Manual Sharing / Apex Managed Sharing** — One-off or programmatic sharing for exceptions the declarative model can't express.\n6. **Teams** — **Account Teams**, **Opportunity Teams**, and **Case Teams** let a record owner explicitly add colleagues (with a chosen access level) to a *specific* record for as long as that person needs it, independent of role hierarchy.\n7. **Report and Dashboard Folders** — Access to a *report* is separate from access to the *underlying records*: a user can see a report but if OWD blocks them from a given row, that row simply won't display totals/details (or the report returns fewer rows) even though the folder itself is shared with them.\n\n**Golden exam rule**: sharing tools can only *grant* additional access on top of OWD; profiles/permission sets can restrict what *object and field* a user can interact with, but never below what OWD + sharing computed for record-level visibility on an object the user otherwise has access to.\n\n## 6. Profiles vs. Permission Sets vs. Permission Set Groups\n\n- A **Profile** is mandatory — every user has exactly one. It sets baseline Object/Field permissions, page layout assignment, record type assignment, login hours, login IP ranges, and app visibility. Best practice in modern orgs is to keep profiles minimal (often one profile per license type) and grant most access via Permission Sets.\n- A **Permission Set** grants *additional* access on top of a profile — it can never take away access the profile already denies... actually it *can* extend beyond what the profile normally allows (permission sets are additive only; they cannot restrict). A user can have any number of permission sets.\n- A **Permission Set Group** bundles several permission sets into a single assignable unit — useful for job functions that require many individual permission sets bundled together (e.g., \"Senior Support Agent\" = 5 different permission sets).\n- **Muting Permission Sets** let you take a Permission Set Group and selectively \"mute\" (turn off) specific permissions granted by one of its member permission sets, without having to remove that member set from the group or edit the original permission set.\n- **When to use a custom Profile vs. Permission Set**: use a profile difference only when the difference is about *login/session-level* settings (login hours, IP ranges) or when you need an entirely different record type/page layout default; otherwise, prefer permission sets/groups for functional access, since they scale far more cleanly across a growing user base and avoid \"profile sprawl.\"\n\n## Key takeaways for exam day\n\n- OWD is the ceiling of restriction, not the ceiling of access — sharing tools only add.\n- Never plan to delete a user; always deactivate and reassign ownership first.\n- Username uniqueness is global, not org-specific.\n- Multi-Factor Authentication is a mandatory Salesforce login requirement.\n- Setup Audit Trail = configuration changes; Field History/Field Audit Trail = data changes.\n- Permission Sets/Groups add access; Profiles set the mandatory baseline and login-level restrictions.\n", "questionIds": ["q2", "q11", "q14", "q21", "q28", "q32", "q34", "q46", "q49", "q50", "q66", "q68", "q71", "q75", "q85", "q88", "q89", "q93", "q102", "q106", "q107", "q120", "q129"]}, {"id": "object_manager", "order": 2, "title": "Object Manager and Lightning App Builder", "weight": 15, "article": "# Module 2: Object Manager and Lightning App Builder\n\n> **Exam weight: 15%** — tied for the highest weighting on the exam. This module is heavily scenario-based: \"given a business requirement, which relationship/field/layout/record-type configuration solves it?\"\n\n## 1. Standard Object Architecture and Relationship Model\n\n**Standard vs. Custom Objects**\n- Standard objects (Account, Contact, Opportunity, Lead, Case, Campaign, etc.) ship pre-built with Salesforce and cannot be deleted, though many of their fields can be customized.\n- Custom objects (API name ends in `__c`) are built by admins/developers for org-specific data.\n\n**Relationship types — know the differences cold, this is tested constantly:**\n\n| Relationship | Cardinality | Deletion behavior | Sharing | Required? | Reparenting |\n|---|---|---|---|---|---|\n| **Lookup** | 1:many (loose) | Deleting parent does NOT delete children (field is cleared unless \"restrict deletion\" is set) | Independent — child's sharing is not tied to parent | Optional | Always allowed |\n| **Master-Detail** | 1:many (tight) | Deleting parent CASCADE-deletes all children | Child inherits parent's sharing (\"Controlled by Parent\") — child has no own OWD | Required — every child must have a parent | Only if \"Allow reparenting\" is enabled |\n| **Many-to-Many (Junction Object)** | many:many | Achieved via a custom object with two Master-Detail relationships | — | — | — |\n| **Hierarchical** | Self-referencing lookup (User object only) | — | — | — | — |\n\n- A **junction object** is how you model many-to-many: e.g., a \"Course Enrollment\" object with a master-detail to Course and a master-detail to Student.\n- **Roll-Up Summary fields** (COUNT, SUM, MIN, MAX) can only be created on the *parent* side of a Master-Detail relationship, and only summarize child records connected via that master-detail (this is why converting a lookup to master-detail is sometimes required specifically to unlock roll-up summaries).\n- **Record Types** let a single object support multiple business processes, each with its own **picklist value sets** and (optionally) its own **page layout** assignment per profile. Record Types are also how the **Path** and **Sales/Support processes** differ per record type (e.g., separate Sales Processes drive separate Opportunity stage picklists per Record Type).\n- **Schema Builder** is the visual, drag-and-drop tool for viewing and building the org's object model and relationships graphically — useful for both design and documentation.\n\n## 2. Creating, Deleting, and Customizing Fields and Page Layouts\n\n**Field creation considerations**\n- Every custom field needs a **Field-Level Security (FLS)** setting per profile/permission set (Visible/Read-Only/Hidden) — a field can be on a page layout and still be invisible to a user if FLS blocks it. Page layout ≠ security.\n- **Picklists**: single-select, multi-select, or **Global Value Sets** (a reusable list of values shared across multiple picklist fields on different objects, edited in one place).\n- **Dependent Picklists**: a \"controlling\" field (picklist or checkbox) filters which values are available on a \"dependent\" picklist. Controlling fields cannot themselves be dependent on another field (no chaining beyond one level in the same relationship, though multiple independent dependent fields can share a controller).\n\n**Implications of deleting fields — a frequent exam trap**\n- Deleting a field moves it to the **Recycle Bin** for 15 days, during which it can be restored with its data intact; after 15 days it (and its historical data) is gone permanently.\n- Deleting a field that is referenced in a **Roll-Up Summary** calculation, a **Cross-Object Formula**, an **Apex class/trigger**, a **flow**, a **validation rule**, a **report**, or a **picklist dependency** will either be blocked outright or will break/remove that dependency — Salesforce warns you and lists dependencies before allowing deletion in most cases, but formulas referencing the field will show `#ERROR!` if the deletion is forced through unexpected paths.\n- Deleting a picklist value that's used as a *controlling* value in a dependent picklist relationship removes that dependency mapping.\n- Deleting a **Master-Detail relationship field** is only possible after first deleting all child records or converting the relationship to a lookup (and only if there's no roll-up summary depending on it, which must be removed first too).\n\n## 3. Page Layouts, Lightning Pages, Record Types, and Business Processes\n\n**Page Layouts**\n- Control which fields, related lists, buttons, and Quick Actions appear, and their read-only/required overrides *for a given Profile + Record Type combination* (Page Layout Assignment matrix).\n- Note: Page Layouts cannot make a field visible if FLS hides it, and cannot make a field editable if FLS marks it read-only — FLS always wins as the more restrictive setting.\n\n**Lightning Record Pages (via Lightning App Builder)**\n- Unlike classic page layouts, Lightning pages are assigned via **Activation**: choose an **App**, **Record Type**, and **Profile** combination (the \"App, Record Type, and Profile\" assignment screen) so different audiences can see entirely different component arrangements even on the exact same record.\n- Component visibility can be further filtered *within* a single Lightning page using **Dynamic Forms** (field-level visibility rules) and **Component Visibility Filters** (show/hide a whole component based on field values, device type, or user profile).\n- The default org-wide fallback is the **\"Org Default\"** Lightning page if no more specific assignment matches.\n\n**Business Processes**\n- Sales Processes, Support Processes, and Lead Processes each define a subset+order of the master picklist values (Stage, Status) available to a given Record Type. Multiple business processes let, e.g., a \"Renewal\" Opportunity Record Type present a different Stage picklist than a \"New Business\" Record Type.\n\n**Quick Actions and Global Actions**\n- **Object-specific Quick Actions** (Create a Record, Log a Call, Update a Record, Send Email) live on that object's Lightning page/layout and can use **Predefined Field Values** to auto-populate hidden or default fields.\n- **Global Actions** aren't tied to a specific object context; they typically appear in the utility bar or a global \"+\"/action menu and are used for things like universally logging a call or creating a case from anywhere in the app.\n\n## Common exam scenario patterns to recognize\n\n- *\"Fields are missing from the page for a specific group of users but present for others\"* → check page layout assignment (profile/record type) first, then FLS.\n- *\"A roll-up summary field option isn't available\"* → the relationship is a Lookup, not Master-Detail; you may need to convert it (only possible if the child has ≤ a small number of related records limit and other prerequisites are met, and Master-Detail requires the field to not be blank on any existing record).\n- *\"Deleting a custom field breaks a report/formula\"* → this is expected behavior; recommend checking field dependencies before deletion, or restoring from Recycle Bin within 15 days.\n- *\"Different users need to see a different layout/arrangement of the same record\"* → Lightning App Builder activation matrix (App + Record Type + Profile), not just classic Page Layout assignment.\n- *\"A custom object can't have Tasks/Events related to it\"* → enable **Allow Activities** on the custom object definition.\n\n## Key takeaways for exam day\n\n- Master-Detail = cascade delete + inherited sharing + required parent; Lookup = independent and optional.\n- Roll-up summaries require Master-Detail on the parent side.\n- FLS is always more restrictive than (and independent of) page layout field visibility.\n- Lightning pages activate by App + Record Type + Profile; classic page layouts assign by Profile + Record Type.\n- Deleting a field is recoverable for 15 days via the Recycle Bin, but breaks anything referencing it.\n", "questionIds": ["q6", "q15", "q22", "q25", "q30", "q37", "q42", "q47", "q53", "q59", "q67", "q69", "q72", "q82", "q110", "q112", "q113", "q114", "q115", "q125", "q135", "q136"]}, {"id": "sales_marketing", "order": 3, "title": "Sales and Marketing Applications", "weight": 10, "article": "# Module 3: Sales and Marketing Applications\n\n> **Exam weight: 10%**\n\n## 1. The Sales Process: Leads, Opportunities, and Path\n\n**Leads**\n- A Lead represents an unqualified prospect (person + company data in one record). Leads have their own **Lead Status** picklist and their own **Lead Process** (which subset/order of statuses applies to a given Lead Record Type).\n- **Lead Conversion** turns a Lead into an **Account**, **Contact**, and (optionally) an **Opportunity**. During conversion:\n  - Standard fields map automatically.\n  - **Custom fields must be explicitly mapped** using *Setup → Object Manager → Lead → Fields & Relationships → Map Lead Fields* — this does not happen automatically, and is a very common exam scenario (\"custom lead field values disappear after conversion\").\n  - You can choose not to create an Opportunity at conversion (useful if the deal isn't ready to be tracked yet).\n  - Conversion is permanent — a converted Lead cannot be \"un-converted,\" though the original Lead record is retained (marked Converted) for audit/history purposes.\n\n**Opportunities**\n- Represent a specific deal in progress. Driven by **Sales Path** (Stage-based guidance banner showing key fields and optional Path guidance text per stage) and the **Sales Process** picklist (Stage values, each mapped to a Forecast Category and a probability %).\n- **Opportunity Teams**: individuals added to a specific deal (with an access level and role) independent of the role hierarchy, useful for cross-functional deal support.\n- **Big Deal Alerts** notify Chatter followers when a large opportunity closes or reaches a milestone value.\n\n## 2. Sales Productivity Features\n\n- **Dashboards** — visual summaries of report data; sales managers commonly use opportunity pipeline dashboards filtered by owner/team/stage.\n- **Lead Scoring / Opportunity Scoring (Einstein)** — Einstein automatically evaluates historical won/lost patterns and assigns a predictive score to leads and opportunities, helping reps prioritize where to spend time. This requires Sales Cloud Einstein and sufficient historical data to train the model.\n- **Einstein for Sales** (an umbrella of generative + predictive features) includes tools such as **Deal Change Highlights** (colored arrows/badges in list views and Kanban view showing recent Amount/Close Date changes for 7 days), **Einstein Activity Capture** (auto-logs emails/events from connected calendar/email), **Conversation Insights**, and **Relationship Intelligence**.\n- **Grading** in the context of Lead Scoring can refer to letter-grade assessments (A–D) of lead fit based on firmographic criteria, distinct from the numeric behavioral \"score.\"\n- **Home Page Assistant** — a component on the Lightning Sales Console home page that surfaces AI-recommended next-best-actions (follow-ups, stale deals, etc.) for a rep's day.\n- **Forecasting** — lets sales leadership project revenue across upcoming periods using Forecast Categories (Pipeline, Best Case, Commit, Omitted, Closed) derived from Opportunity Stage; supports **collaborative forecasting** with adjustments at each management level of the role hierarchy.\n- **Territory Management** — assigns Accounts (and their Opportunities) to sales territories using rule-based or manual assignment, letting reps and managers see pipeline organized geographically or by named-account logic rather than strictly by ownership.\n\n## 3. Lead Automation and Campaign Management\n\n- **Lead Assignment Rules** — an ordered set of criteria-based rules that automatically route new/edited Leads to the correct owner or queue (e.g., by Lead Source, State, or Product Interest). Only one Lead Assignment Rule can be active at a time, but it can contain many ordered entries.\n- **Campaigns** — track marketing initiatives (events, webinars, email blasts). **Campaign Members** link Leads or Contacts to a Campaign with a **Member Status** (Sent, Responded, Attended, etc.) that can be configured per campaign and used to calculate response rates.\n- **Campaign Influence / Campaign ROI** — reports that tie Opportunity revenue back to the campaigns that influenced it, using standard fields like Amount, Budgeted Cost, and Expected Revenue on the Campaign object, or advanced multi-touch Campaign Influence models.\n- Recall from Module 2: custom Lead fields need explicit **Map Lead Fields** configuration before conversion carries their values to the resulting Contact/Account/Opportunity.\n\n## Common exam scenario patterns to recognize\n\n- *\"A custom Lead field's value disappears after conversion\"* → missing entry in Map Lead Fields.\n- *\"Sales reps want to see which deals changed recently in list/Kanban view\"* → Deal Change Highlights.\n- *\"Sales director wants to predict revenue across future quarters\"* → Forecasting (Collaborative Forecasts), not just an Opportunity report.\n- *\"Reps need to prioritize which deals to work on first\"* → Einstein Opportunity Scoring (deals) vs. Einstein Lead Scoring (leads) — pick the object that matches the scenario's noun.\n- *\"Give teammates credit for a shared deal based on effort\"* → Opportunity **Splits**.\n- *\"New leads must route to the right rep based on territory/address\"* → Lead Assignment Rule.\n\n## Key takeaways for exam day\n\n- Lead conversion requires explicit custom field mapping; standard fields map automatically.\n- Distinguish Lead Scoring (which leads to call) from Opportunity Scoring (which deals to prioritize) from Forecasting (how much revenue is coming).\n- Only one Lead Assignment Rule is active at a time, but it holds many ordered rule entries.\n- Territory Management changes *how Opportunities/Accounts are organized and shared*, layered on top of (not replacing) the standard sharing model.\n", "questionIds": ["q3", "q4", "q26", "q29", "q33", "q41", "q58", "q65", "q74", "q81", "q84", "q87", "q91", "q92", "q96", "q98", "q104", "q105", "q111", "q121", "q128", "q130", "q133", "q134"]}, {"id": "service_support", "order": 4, "title": "Service and Support Applications", "weight": 10, "article": "# Module 4: Service and Support Applications\n\n> **Exam weight: 10%**\n\n## 1. Case Management\n\n- A **Case** tracks a customer question, issue, or feedback item. Cases can be created manually, via **Web-to-Case** (a generated HTML form embedded on a public website), **Email-to-Case** (routing inbound emails to an address into new Cases, with an attachment/thread history), or through Omni-Channel routing from chat/messaging channels.\n- **Case Assignment Rules** — an ordered, criteria-based rule set (similar in structure to Lead Assignment Rules) that routes new/edited Cases to the correct owner or **Queue** automatically, based on fields like Case Origin, Type, or Priority.\n- **Queues** — a holding area owned by a group of users (not one individual); any queue member (or anyone above them in the role hierarchy with access) can pick up and accept a case from the queue. Queues are essential for **round-robin/first-come support models** and are a common target for both assignment rules and Omni-Channel routing.\n- **Case Teams** — similar to Opportunity Teams: a defined, reusable set of users (with roles like \"Tier 2 Support\") that can be added to a case to collaborate, independent of the role hierarchy.\n\n## 2. Automating Case Management\n\n- **Support Process** — like Sales/Lead Processes, defines which subset/order of **Case Status** values apply to a given Case Record Type (e.g., a \"Bug\" record type might not expose \"Escalated\" as a status, while a \"General Inquiry\" type does).\n- **Case Auto-Response Rules** — automatically send an acknowledgment email to the customer based on criteria (e.g., Case Origin = Web) the moment a case is created; distinct from Case Assignment Rules, which route ownership rather than send a customer-facing message. Both rule types can fire off the same incoming case, and both are strictly criteria + ordered-entry based (only one rule set active at a time per type).\n- **Case Escalation Rules** — a time-based rule engine that reassigns and/or notifies based on **Business Hours** (Module 1) if a case hasn't been resolved within a defined window; distinct from **Milestones/Entitlement Processes**, which are the more modern, flexible SLA engine that can trigger flows and support multiple time-based checkpoints (e.g., \"First Response,\" \"Resolution\") rather than a single escalation step.\n- **Einstein for Service** includes generative and predictive tools such as **Einstein Case Classification** (auto-populates fields like Case Reason/Type based on the case description), **Einstein Reply Recommendations**, **Einstein Article Recommendations** (surfaces relevant Knowledge articles to agents in real time), and **Service Replies/Case Summaries** (generative AI drafts).\n- **Knowledge** — the article-management feature (requires the Knowledge User feature license) that lets support teams author, categorize (via **Data Categories**), and publish troubleshooting articles; hugely relevant to reducing agent handle time and is frequently the correct answer for \"agents need faster access to solutions/documentation.\"\n- **Omni-Channel** — routes work items (Cases, Chats, Messaging conversations, or any Omni-Channel-enabled object) to the *most available and best-skilled* agent using **Routing Configurations**, **Presence Statuses**, and optionally **Skills-Based Routing** or **Queue-Based Routing**.\n\n## Common exam scenario patterns to recognize\n\n- *\"Customers should be able to submit their own cases from the public website\"* → Web-to-Case.\n- *\"An automatic acknowledgment email should go out the moment a case is logged\"* → Case Auto-Response Rules (not Assignment Rules — assignment routes ownership, auto-response sends the customer message).\n- *\"Cases must be reassigned/escalated if not resolved within X business hours\"* → Case Escalation Rules driven by Business Hours; for more sophisticated multi-step SLA tracking, Entitlements/Milestones.\n- *\"Agents spend too much time hunting for documentation/similar past cases\"* → Knowledge with Data Categories (or Einstein Article Recommendations for a smarter, AI-assisted spin on the same need).\n- *\"A group of agents should share ownership of incoming support requests rather than one individual\"* → Queue.\n\n## Key takeaways for exam day\n\n- Assignment Rules decide **who owns** the case; Auto-Response Rules decide **what message goes to the customer**; both are separate, criteria-based, ordered rule sets.\n- Escalation Rules are time + Business-Hours driven; Entitlements/Milestones are the more advanced SLA framework.\n- Support Process (picklist values available per record type) is conceptually identical to Sales/Lead Process — just for Case Status.\n- Knowledge is almost always the right answer whenever a scenario is about agents/customers self-solving with documented solutions.\n", "questionIds": ["q7", "q8", "q27", "q31", "q35", "q36", "q40", "q44", "q45", "q51", "q62", "q78", "q83", "q94", "q95", "q108", "q122", "q127"]}, {"id": "productivity", "order": 5, "title": "Productivity and Collaboration", "weight": 10, "article": "# Module 5: Productivity and Collaboration\n\n> **Exam weight: 10%**\n\n## 1. Activity Management: Tasks and Events\n\n- **Tasks** are discrete to-dos (calls to make, follow-ups) with a Status, Priority, and Due Date; they can be assigned to a single user and related to a parent record via **WhatId** (related-to record, e.g., an Account or custom object) and **WhoId** (a Lead or Contact).\n- **Events** are calendar items with a Start/End time, can be single or recurring, and support **Multi-Person Events** (inviting several Users/Leads/Contacts, with each invitee getting the meeting on their own calendar and an RSVP field).\n- For a **custom object** to have Tasks/Events related to it at all, the object definition must have **Allow Activities** enabled (unchecked by default on new custom objects) — a frequently tested configuration step.\n- **Activity Settings** (*Setup → Activity Settings*) control org-wide behavior such as allowing users to relate multiple contacts to one Task/Event (\"Shared Activities\"), and enabling Recurring Events/Tasks.\n\n## 2. Chatter\n\n- Chatter is Salesforce's internal enterprise social/collaboration layer: **Feeds**, **Posts**, **@mentions**, **Files**, and **Groups**.\n- **Group visibility types**:\n  - **Public Group** — anyone in the org can see the group and its content, and can join without an invitation.\n  - **Private Group** — visible in search/lists, but only members can see posts/files; joining requires an invitation or an approved request.\n  - **Unlisted Group** — the most restrictive: the group's *existence itself* is hidden from non-members (doesn't show in search), members must be added directly by an owner/manager/admin. This is the correct answer whenever a scenario says the group's existence must stay confidential (e.g., discussing sensitive records).\n- Chatter Groups can include **internal users** and, if enabled, **external users** (partners/customers via Experience Cloud) as **Customer Groups**, giving a controlled channel for external collaboration without exposing the whole org.\n- Chatter feed tracking can be enabled per object/field so that field changes automatically post to the record's feed for visibility.\n\n## 3. The Salesforce Mobile App\n\n- The mobile app automatically reflects each user's assigned **Lightning App** and its navigation, but the **Mobile Navigation Menu** can be customized separately from desktop (reorder items, add/remove items) under *Setup → Salesforce Navigation*.\n- **Compact Layouts** (not full page layouts) control the summary of key fields shown at the top of a record in mobile/highlights panel — configure a compact layout per object and assign it per record type for the fields that matter most at a glance on a small screen.\n- The app menu, branding (logo, color), and org-level mobile settings live under *Setup → Salesforce Mobile App*; you can also point users to a browser-based experience instead of the native app if required.\n- **Visibility**: which users get the mobile app is governed by their user license/permission, not a separate mobile-specific license in most modern orgs — practically, if they can log in to Salesforce, they can use the mobile app unless explicitly restricted.\n- The **Mobile Publisher/Launchpad** capability lets an org build and distribute a fully custom-branded mobile app (its own icon/name in the App Store) built on the Salesforce Mobile App framework — the exam mostly wants you to recognize this as the tool for *branding a bespoke mobile experience*.\n\n## 4. AppExchange\n\n- **AppExchange** is Salesforce's marketplace for third-party apps/components. Key distinctions:\n  - **Managed Packages** — the code/metadata is locked (not directly editable), supports **upgrades** pushed by the publisher, and is the standard distribution format for apps sold/published by ISV partners. Only Salesforce Partners (via the Partner Program) are typically allowed to publish managed packages to AppExchange.\n  - **Unmanaged Packages** — fully open/editable after install (like a one-time code template); typically used for open-source samples, templates, and \"starter kit\" style distributions since there's no ongoing vendor support/upgrade path.\n- **Publishing rights** — only registered Salesforce partners can list apps for sale/distribution on AppExchange; regular admins can only *install*, they cannot publish org-specific customizations to the public marketplace.\n- **Prompts on AgentExchange** — the equivalent marketplace concept for Agentforce: pre-built, installable **Agent Actions**, **Topics**, and prompt templates that can be installed and then customized for an org's specific Agentforce implementation, much like installing and then modifying a package.\n- **Flows on AppExchange** — pre-built Flow Solutions/templates can also be distributed and installed from AppExchange and then customized to fit specific business requirements, rather than building automation completely from scratch.\n\n## Common exam scenario patterns to recognize\n\n- *\"A group's existence must be hidden from everyone except its members\"* → Chatter Unlisted Group.\n- *\"Tasks can't be related to a custom object\"* → enable Allow Activities on the object.\n- *\"Company wants a document merge/e-signature/other add-on capability\"* → look to AppExchange (typically \"download/install a package from AppExchange\" rather than trying to build it from scratch declaratively).\n- *\"Company wants its own fully custom-branded native mobile app\"* → Mobile Publisher / Launchpad.\n- *\"Which fields display in the mobile highlights panel?\"* → Compact Layouts, not standard Page Layouts.\n\n## Key takeaways for exam day\n\n- Group visibility ladder from most to least discoverable: Public → Private → Unlisted.\n- Allow Activities is the specific checkbox that unlocks Task/Event relationships on custom objects.\n- Managed packages = locked + upgradeable + partner-published; Unmanaged packages = fully editable, one-time, no vendor upgrade path.\n- Compact Layouts (not Page Layouts) drive the mobile highlights panel and quick-glance summaries.\n", "questionIds": ["q5", "q12", "q17", "q18", "q55", "q97", "q109", "q116", "q118", "q119"]}, {"id": "data_analytics", "order": 6, "title": "Data and Analytics Management", "weight": 17, "article": "# Module 6: Data and Analytics Management\n\n> **Exam weight: 17%** — the single heaviest section on the entire exam. Study this module the hardest.\n\n## 1. Importing, Updating, Transferring, Mass Deleting, Exporting, and Backing Up Data\n\n**Data loading tools — know exactly when to use which:**\n\n| Tool | Record volume | Objects supported | Interface | Notes |\n|---|---|---|---|---|\n| **Data Import Wizard** | Up to 50,000 records/session | Leads, Accounts, Contacts, Opportunities, Custom Objects, Solutions | Point-and-click in-browser wizard | Best for simple imports by non-technical admins; includes basic duplicate-matching before insert |\n| **Data Loader** | Up to 5 million records | Any standard/custom object | Desktop client (or CLI) | Supports insert, update, upsert, delete, hard delete, and export/export-all; required for bulk operations and objects the Wizard doesn't support |\n| **Data Loader (Bulk API mode)** | Very large volumes | Any object | Same client, different API under the hood | Faster for huge datasets by batching asynchronously |\n| **Third-party ETL tools (e.g., Dataloader.io)** | Varies | Varies | Cloud-based | Schedulable, recurring jobs — useful when recurring/automated imports are the actual requirement rather than a one-off load |\n\n- **Mass Transfer** (*Setup → Mass Transfer Records*) reassigns ownership of many Leads/Accounts/etc. at once — typically used when an employee leaves and their records must move to a new owner without exporting/reimporting data.\n- **Mass Delete** (*Setup → Mass Delete Records*) removes many records of a type at once (sent to the Recycle Bin like any delete, recoverable for 15 days, subject to storage-limit considerations).\n- **Export** — Data Loader \"Export\" pulls active records only; **\"Export All\"** additionally includes records in the Recycle Bin. The manual **Data Export Service** (*Setup → Data Export*) generates a full CSV export of the org on a schedule (weekly on Enterprise+/monthly minimum), the traditional path for org-wide **backups**, alongside third-party AppExchange backup solutions and the newer **Backup and Restore** product.\n- **Archival** — automated data archiving (Salesforce's Big Objects or third-party archiving tools) moves aging records out of primary storage to control storage costs while retaining access for reporting/compliance.\n\n## 2. Data Validation Tools\n\n- **Duplicate Rules + Matching Rules** work together: a **Matching Rule** defines the algorithm/fields used to detect a likely duplicate (exact or fuzzy matching on fields like Email, Company Name, Phone); a **Duplicate Rule** decides what happens when a match is found (Block, or Allow-but-Alert) and which matching rule(s) it uses, and whether the check runs on create, edit, or via a Bulk API/import.\n- **Validation Rules** enforce data-quality/business logic at save time using a formula that evaluates to TRUE when the data is *invalid* (a common conceptual trap — the formula describes the bad condition, not the good one) and displays a custom Error Message, optionally tied to a specific field.\n- Common validation rule functions on the exam: `ISPICKVAL()` (compare picklist values — required instead of `=` for picklists), `ISBLANK()`/`ISNULL()`, `PRIORVALUE()` (compare current vs. previous saved value), and `AND()/OR()/NOT()` for combining conditions.\n\n## 3. Reports and Report Types\n\n- A **Report Type** defines which object(s) and fields are available when building a report — **Standard Report Types** are auto-generated per object/relationship; **Custom Report Types** let you join up to 4 objects (via existing relationships) and control exactly which fields and \"with/without related records\" behavior is available (e.g., \"Accounts with or without Opportunities\").\n- **Join Reports** let you combine multiple, otherwise-unrelated report blocks side-by-side in one report (e.g., comparing Cases and Opportunities data in the same view) using different Report Types per block.\n- **Formulas in reports**: standard **Row-Level Formulas**, **Summary Formulas** (aggregate math across grouped rows, available in Summary/Matrix reports), and **Bucket Fields/Bucket Columns** (on-the-fly grouping of values into custom categories without needing a new formula field on the object, e.g., bucketing Amount into \"Small/Medium/Large\").\n- **Renaming fields** in a report is possible at the column-header level for display purposes without altering the underlying field.\n- **Chart settings** — reports can render as a chart (bar, line, donut, funnel, etc.) attached to the report itself, distinct from a dashboard component chart.\n- **Hide Details** — a Summary/Matrix report can be collapsed to show only grouping totals (\"Hide Details\") for an at-a-glance rollup.\n- **Grouping and totals** — Summary and Matrix report formats support up to 3 levels of row/column grouping with subtotal and grand-total rows; Tabular reports support no grouping (flat list) and cannot be used as dashboard source components requiring grouped data.\n- **Troubleshooting fields at a high level** — if an expected field/record doesn't appear on a report, check (in order): is the field on the Report Type's field list, does the user have FLS access to it, and does the report's \"with/without related records\" join setting exclude the row.\n\n## 4. Sharing Model Impact on Reports\n\n- Reports respect the underlying **record-level sharing model** — a user only sees rows for records they have access to (via OWD + role hierarchy + sharing rules), even if the report itself is shared with them. This means two different users running the exact same report can see different totals/row counts.\n- **Report Folders** have their own **access levels** (Viewer, Editor, Manager) assignable to public groups, roles, or roles-and-subordinates — folder access controls who can *find/run/edit the report definition*, which is a separate axis from row-level data visibility.\n- Fields with restrictive **Field-Level Security** simply won't appear as report columns/filters for a user who lacks access, regardless of folder sharing.\n\n## 5. Dashboards\n\n- **Dashboard Components** (chart types: bar, line, donut, gauge, metric, table, funnel) each pull from one underlying report as their **data source**.\n- **Dynamic Dashboards** (\"View dashboard as: Logged-in User\") run each component using the *viewer's own record access*, so every viewer sees only the data they're personally entitled to — versus the alternative \"Run as specified user,\" where every viewer sees data filtered by one fixed user's access (a security-sensitive choice, since that could over- or under-expose data depending on who is picked).\n- **Dashboard filters** let a viewer interactively slice all components on the page without editing the underlying reports.\n- **Subscribing** to a dashboard delivers a scheduled snapshot (daily/weekly/monthly) via email/Slack to the subscriber, without them needing to log in and check manually.\n- **Scheduled Refresh** controls how often the dashboard's cached data updates; **org licensing limits** cap how many Dynamic Dashboards / dashboard refreshes and how many components-per-dashboard (typically 20) are allowed, and these limits vary by edition.\n\n## Common exam scenario patterns to recognize\n\n- *\"Load 300 records with contacts in one go, no coding involved\"* → Data Import Wizard (small volume, point-and-click) — bigger and more complex jobs point to Data Loader instead.\n- *\"A sales manager needs to see a report across their whole team's records despite OWD = Private\"* → this is governed by role hierarchy / sharing rules / report folder access working together, not by the report itself.\n- *\"Calculate revenue generated per campaign\"* → Roll-up summary field from Opportunity to Campaign (if directly related) or a custom report type joining Campaign to Opportunity.\n- *\"Every dashboard viewer should see only their own data\"* → Dynamic Dashboard, \"View dashboard as: Logged-in User.\"\n- *\"Track assigned licenses/permission sets instead of a spreadsheet\"* → a custom report using the appropriate Setup/User-related report type (e.g., a User report or Permission Set Assignment report).\n\n## Key takeaways for exam day\n\n- Validation rule formulas describe the *bad* condition (evaluate TRUE = block save).\n- Matching Rules find duplicates; Duplicate Rules decide the resulting action.\n- Custom Report Types join up to 4 related objects and define \"with/without\" join behavior.\n- Report row-level visibility always follows the sharing model, independent of folder access.\n- Dynamic Dashboards personalize data per viewer; static \"Run as\" dashboards do not.\n", "questionIds": ["q23", "q38", "q39", "q54", "q56", "q60", "q63", "q79", "q99", "q103", "q132"]}, {"id": "automation", "order": 7, "title": "Automation", "weight": 15, "article": "# Module 7: Automation\n\n> **Exam weight: 15%**\n\n## 1. Choosing the Right Automation Tool\n\nSalesforce gives admins several overlapping automation tools; the exam consistently tests *choosing the right tool for the scenario*:\n\n- **Escalation Rules** — time-based, Case-specific, driven by Business Hours (Module 4/1); reassign/notify when a case sits unresolved too long.\n- **Case Assignment Rules / Lead Assignment Rules** — criteria-based routing of ownership at record creation/edit; ordered rule entries, only one rule set active at a time per object.\n- **Default Automation User** — a dedicated system user (often licensed as a lightweight/integration user) that automated processes (Flows, Assignment Rules, Approval steps) can run as, instead of consuming a real person's context — used to avoid unexpected \"modified by\" attribution and to ensure automation keeps working even if the human admin who built it leaves or is deactivated.\n- **AI-assisted automation** — Einstein/Agentforce-driven suggestions (e.g., Einstein Case Classification auto-populating fields before a Flow even runs) can feed into and reduce the need for some traditional rule-based automation.\n\n**General decision framework for the exam:**\n1. Is it a simple, single-object field update or record creation with no complex logic? → **Flow** (or, on legacy content, Workflow Rule — but Workflow Rules and the older Process Builder are being retired/migrated to Flow, and Flow is always the recommended, exam-preferred answer for new automation).\n2. Does it need a human decision/sign-off step? → **Approval Process**.\n3. Does it need to route ownership of a new/edited record based on criteria? → **Assignment Rule** (Lead or Case).\n4. Does it need to escalate based on elapsed business time? → **Escalation Rule** (Case) or **Entitlement Process/Milestones** for more complex SLAs.\n5. Does it need to notify an external system? → **Outbound Message** (simple, admin-configurable SOAP callout) or a Flow with an HTTP callout / Apex-invoked action for more complex integration needs.\n\n## 2. Flow: Capabilities, Use Cases, and Configuration\n\n**Flow types**\n- **Screen Flow** — a guided, multi-step wizard with user-facing screens; launched from a Quick Action, a Lightning page, a utility bar item, a Community page, or a chat/Agentforce action. The only Flow type that can pause and wait for user input mid-run.\n- **Record-Triggered Flow** — fires automatically when a record is created, updated, or deleted, entirely in the background (no user interaction). Can run **before-save** (fast, in-memory field updates on the *same* record — much more efficient than an after-save update, since it avoids a second database write/trigger cycle) or **after-save** (needed when you must create/update *other* records, send emails, or make callouts).\n- **Autolaunched Flow (No Trigger)** — invoked by Apex, another Flow (Subflow), a Process/Flow Builder action, a REST API call, or a Platform Event — no direct end-user screen and no automatic record trigger; it runs only when explicitly called.\n- **Scheduled-Triggered Flow / Schedule-Triggered Flow** — runs in batch on a recurring schedule (daily/weekly/etc.) against a set of records matching entry criteria, useful for time-based \"sweep\" logic like \"flag opportunities that have had no activity in 30 days.\"\n- **Platform Event–Triggered Flow** — fires when a Platform Event message is received, useful for near-real-time integration scenarios.\n\n**Order of Execution — a heavily tested sequence.** When a record is saved, Salesforce processes automation in roughly this order:\n1. System validation (required fields, field types).\n2. **Before-save record-triggered Flows** and before-save Apex triggers (in undetermined relative order with each other, but before the next steps).\n3. Custom **Validation Rules**.\n4. **Duplicate Rules**.\n5. The record is saved to the database (but not yet committed).\n6. **After-save record-triggered Flows**, after-save Apex triggers, and any legacy Workflow Rules — including their field updates, which can trigger a second save cycle.\n7. **Assignment Rules**, **Auto-Response Rules**, **Escalation Rules** (Case/Lead-specific).\n8. Roll-up summary field recalculations and cross-object workflow field updates cascade upward as needed.\n9. Post-commit logic: outbound messages, Platform Events published after commit, Entitlement/Milestone processing, and (for Cases especially) the various case-specific automations.\n\nThe practical exam takeaway: **before-save Flow field updates on the triggering record are faster and preferred** whenever you don't need to touch other records or perform a callout, since they avoid a second full save cycle.\n\n## 3. Approval Processes\n\n- An **Approval Process** routes a record through one or more **Approval Steps**, each with its own **Entry Criteria** and a defined **Approver** (a specific user, the record owner's manager, a queue, or a relate-user-field lookup).\n- **Initial Submission Actions**, **Approval Actions**, **Rejection Actions**, and **Recall Actions** — each stage can trigger Field Updates, Email Alerts, Tasks, or Outbound Messages.\n- A **Delegated Approver** lets an approver temporarily hand off their approval responsibility to someone else for a defined period (e.g., during vacation) — distinct from simply reassigning the approval permanently.\n- Common troubleshooting: if a manager can't approve a record and gets an error, check whether the **next approver in the chain is inactive or missing** — a broken approver chain (deactivated user, blank manager field) is the most common cause of approval-process errors on the exam.\n- **Criteria for approvers** can be dynamically determined via a **related user field** (e.g., route to whoever is in the \"Regional Director\" lookup field on the record) rather than being hardcoded, making the process reusable across regions/teams.\n- Approval Processes pair naturally with **Outbound Messages** when the business requirement includes notifying an external system (e.g., an HR platform) once a multi-step internal review completes.\n\n## Common exam scenario patterns to recognize\n\n- *\"An approver gets an error trying to approve a record\"* → check for an inactive/missing next approver.\n- *\"Simple field update needed with no other side effects\"* → prefer a before-save Record-Triggered Flow.\n- *\"A multi-step human sign-off is required before a deal can be finalized\"* → Approval Process.\n- *\"An approver is going on vacation and needs someone to cover for a limited time\"* → Delegated Approver.\n- *\"Automation should keep running even if the admin who built it is deactivated\"* → assign a Default Automation User / dedicated running user to the automation.\n- *\"Reduce a second save cycle for a same-record field update\"* → convert an after-save Flow field update to before-save.\n\n## Key takeaways for exam day\n\n- Flow is the modern, exam-preferred automation tool; Workflow Rules/Process Builder are considered legacy.\n- Before-save Flow updates are faster for same-record field changes; after-save is required for cross-record/callout work.\n- Order of execution: validation rules run before the record is committed to the database; assignment/escalation rules and most workflow-style automation run after.\n- Approval Process errors are most often caused by a broken/missing approver in the chain.\n- Delegated Approver ≠ permanent reassignment — it's a temporary hand-off.\n", "questionIds": ["q1", "q9", "q19", "q24", "q43", "q48", "q52", "q57", "q61", "q64", "q70", "q73", "q76", "q77", "q80", "q86", "q90", "q100", "q101", "q117", "q123", "q124", "q126", "q131"]}, {"id": "agentforce", "order": 8, "title": "Agentforce", "weight": 8, "article": "# Module 8: Agentforce\n\n> **Exam weight: 8%** — the smallest section, but a growing focus area on newer versions of the exam. Expect scenario questions about when AI agents are (and are not) appropriate, plus practical Agent Builder configuration.\n\n## 1. Capabilities and Use Cases of Agentforce\n\n- **Agentforce** is Salesforce's platform for building autonomous and conversational **AI Agents** that can converse with users (internal employees or external customers) and *take action* inside Salesforce — not just answer questions, but actually execute steps like updating a shipping address, creating a case, or summarizing a record, by invoking **Actions**.\n- An **Agent** is composed of:\n  - **Topics** — a scoped area of responsibility (e.g., \"Order Management\") that groups related actions and instructions, keeping the agent focused and preventing it from wandering into unrelated tasks.\n  - **Actions** — discrete, invokable capabilities the agent can call (a Flow, an Apex class, a standard/OOTB action, or a prompt template) to actually do something, such as `updateShippingAddress` or `createCase`.\n  - **Instructions** — natural-language guidance telling the agent *when* and *how* to use each action/topic.\n- **When it's appropriate to use AI**: Agentforce fits scenarios with high-volume, repetitive, well-defined interactions where responses can be grounded in trusted company data (Knowledge articles, CRM records) and where guardrails can clearly bound the action space — e.g., routine order-status lookups, address updates, FAQ-style support, or drafting/summarizing content for an internal rep. It is a poor fit for highly ambiguous, high-stakes decisions without a human in the loop, or for tasks lacking any grounded data source to check against.\n- **Security**: Agent access follows the same permission model as everything else in Salesforce — an agent (running as a specific Agent User license/context) can only see and act on data/objects the underlying permissions allow. Actions should be scoped with the **principle of least privilege**: only grant the specific object/field access and specific Action permissions truly required for the agent's job.\n- **Troubleshooting agent permissions** — if an agent can't complete an action, the first things to check are: does the running user/agent context have the necessary object/field-level permissions for that action, is the Action itself correctly configured with valid input/output parameters, and is the Topic's instruction clear enough that the agent reliably selects the right action for the request.\n\n## 2. Maintaining, Updating, and Installing Prompts and Instructions in Agent Builder\n\n- **Agent Builder** is the point-and-click workspace for assembling Topics, Actions, and Instructions into a working agent, and for testing it before deployment.\n- **Prompt Templates** are reusable, parameterized generative-AI prompts (built in **Prompt Builder**) that can be referenced by an Action — for example, a prompt template that summarizes a case's history for an agent to relay to a customer. Best-practice prompt design is specific about three things: the **action's purpose** (what it does), the **goal** (the intended outcome), and any **constraints/guardrails** (when it should or shouldn't be used) — vague, generic instructions lead to unreliable or unsafe agent behavior.\n- **Action Instructions best practice**: the strongest instructions clearly state (1) what the action does, (2) the goal/intended outcome, and (3) explicit guardrails for when to trigger it (e.g., \"only use this when the customer explicitly requests an address change\") — this prevents the agent from firing a data-changing action off a vague or ambiguous customer message.\n- **Light testing / Conversation Preview** — Agent Builder includes a built-in conversation simulator so an admin can test sample utterances against the agent *before* publishing, checking whether the agent picks the right Topic/Action and produces a grounded, on-brand response. This is the recommended, lowest-effort validation step prior to full deployment, and should be repeated any time a Topic, Action, or Instruction is updated.\n- **Maintaining and updating** an agent is an iterative process: as new edge cases or failure patterns surface (an agent picking the wrong action, or failing to trigger at all), admins refine the wording of Instructions, tighten guardrails, or add new Topics/Actions — then re-run Conversation Preview to confirm the fix before publishing changes to production users.\n- **Installing prompts/agents from AgentExchange**: similar to installing a package from AppExchange (Module 5), pre-built agent Topics, Actions, and prompt templates can be installed from AgentExchange and then customized to fit the org's specific business needs rather than building everything from a blank canvas.\n\n## Common exam scenario patterns to recognize\n\n- *\"An agent needs clear instructions for when to trigger a data-changing action\"* → the best-instruction option is always the one that defines the action's purpose, the goal, and an explicit guardrail/constraint on when to use it.\n- *\"How should an admin validate an agent works correctly before rolling it out?\"* → Conversation Preview / light testing in Agent Builder.\n- *\"An agent can't complete a requested action for a specific user\"* → check the agent/running user's object and field-level permissions for that action first.\n- *\"The company wants a jump-start instead of building an agent from scratch\"* → install and customize a pre-built agent/prompt from AgentExchange.\n\n## Key takeaways for exam day\n\n- Structure of an Agentforce agent: Topics (scope) → Actions (what it can do) → Instructions (when/how to do it).\n- Well-written Action Instructions always specify purpose + goal + guardrail.\n- Agentforce security follows the standard Salesforce permission model — least privilege applies to agents just like human users.\n- Always validate with Conversation Preview/light testing before publishing agent changes.\n", "questionIds": ["q10", "q13", "q16", "q20"]}], "questions": [{"id": "q1", "module": "automation", "question": "In an approval process, which feature allows a user to temporarily assign their approval responsibilities to another user for a predefined time period?", "options": [{"key": "A", "text": "Approval Rule"}, {"key": "B", "text": "Queue"}, {"key": "C", "text": "Delegated Approver"}, {"key": "D", "text": "Manager"}], "answer": ["C"], "explanation": "A Delegated Approver is a user designated by an individual or an administrator to act on their behalf when an approval request is received. This is particularly useful for planned absences, such as vacations. While the delegated approver has the power to approve or reject a record, they cannot reassign the request to someone else. This is a temporary manual assignment and is different from a Manager (Option D), who is part of the permanent role hierarchy, or a Queue (Option B), which allows a group of people to share approval tasks. There is no feature called an \"Approval Rule\" (Option A) that handles temporary user reassignment in this manner."}, {"id": "q2", "module": "config_setup", "question": "The VP of sales at Cloud Kicks has a standard sales profile and is receiving an error message that prevents them from saving an opportunity. A Platform Administrator attempted the same edit without receiving an error. How should the administrator troubleshoot this issue?", "options": [{"key": "A", "text": "Log in as a system administrator to troubleshoot."}, {"key": "B", "text": "Use 'Login as' to log in as the user."}, {"key": "C", "text": "Use an AppExchange product to troubleshoot."}, {"key": "D", "text": "Ask the user for their password so the admin can log in as the user."}], "answer": ["B"], "explanation": "When a specific user encounters an error that an administrator cannot replicate, the most effective troubleshooting technique is to \"Login as\" that user. This feature, which must be enabled in the organization's login policies, allows the admin
