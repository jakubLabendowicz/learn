y": "B", "text": "Require Field."}, {"key": "C", "text": "Workflow Rule"}, {"key": "D", "text": "Validation Rule"}], "answer": ["D"], "explanation": "Validation rule is a tool that can be used to enforce data quality and business logic by preventing users from saving records that do not meet certain criteria. In this case, a validation rule can be created on the Lead object to display an error message if the Lead Status field is marked as qualified and the Budget field is blank. References: Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (256 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q66", "module": "config_setup", "question": "Universal Container wants to prevent its service team from accessing deal records. While service users are unable to access deal list views; they are able to find the deal records via a search. What options should the administrator adjust to fully restrict access?", "options": [{"key": "A", "text": "Record setting and search index"}, {"key": "B", "text": "Permissions and tab visibility"}, {"key": "C", "text": "App permissions and search terms"}, {"key": "D", "text": "Page layouts and field- level security"}], "answer": ["B"], "explanation": "Permissions and tab visibility are two options that administrators can adjust to fully restrict access to records for certain users or profiles. Permissions determine what users can do with records, such as create, read, edit, delete, view all, or modify all. Tab visibility determines whether users can see a specific object tab in their app launcher or navigation bar. By setting permissions and tab visibility to none or hidden for deal records for service users or profiles, administrators can prevent them from accessing deal records via search or other methods. References: htm&type=5"}, {"id": "q67", "module": "object_manager", "question": "Ursa Major Solar provides a 1-year warranty on all of the panels it installs. Installation details, along with the warranty information, a captured on a custom object called Installation. The installation record is created by the installer from the mobile app. Customers son receive a longer warranty as a way of increasing customer satisfaction when an installation gets delayed or has issues. How should the administrator configure Salesforce to capture the expiration date of the warranty?", "options": [{"key": "A", "text": "Use a formula as the default value of the warranty Expiration Date field."}, {"key": "B", "text": "Create a formula field to display l year from the warranty purchased."}, {"key": "C", "text": "Add a validation rule to ensure the Expiration Date field is populated."}, {"key": "D", "text": "Include the warranty Expiration Date field on the mobile page layout."}], "answer": ["A"], "explanation": "To capture the expiration date of warranty based on installation date and warranty length (1 year by default), the administrator should use a formula as the default value of Warranty Expiration Date field on Installation object. The formula can calculate one year from installation date using DATE function or DATEVALUE function. For example, DATE(YEAR(Installation_Date__c) + 1 , MONTH(Installation_Date__c) , DAY (Installation_Date__c)) will return one year from installation date. Creating a formula field, adding a validation rule, or including Warranty Expiration Date field on mobile page layout will not capture expiration date based on installation date and warranty length. References: id=sf.formula_using_date_datetime.htm&type=5"}, {"id": "q68", "module": "config_setup", "question": "Northern Trail Outfitters is using one profile for all of its marketing users, providing read-only access to the Campaign object. A few marketing users now require comprehensive edit access on Campaigns. How should an administrator fulfil this request?", "options": [{"key": "A", "text": "Permission sets"}, {"key": "B", "text": "Organization-wide defaults"}, {"key": "C", "text": "Marketing user checkbox"}, {"key": "D", "text": "Field-level security"}], "answer": ["A"], "explanation": "Permission sets are used to grant additional permissions and access settings to individual users without changing their profiles or requiring a new profile to be created. You can use permission sets to extend users' functional access without changing their existing profiles. To meet the request of giving comprehensive edit access on Campaigns to a few marketing users who have read-only access by default, you need to create a permission set with edit access on Campaigns and assign it to those users. References: com/s/articleView?id=sf.perm_sets_overview.htm&type=5"}, {"id": "q69", "module": "object_manager", "question": "The DreamHouse Realty team has a master-detail relationship set up with open house as the parent object and visitors as the child object. What type of field should the administrator add to the open house object to track number of visitors?", "options": [{"key": "A", "text": "Roll-up Summary."}, {"key": "B", "text": "Multi-select Picklist"}, {"key": "C", "text": "Cross-object formula field"}, {"key": "D", "text": "Indirect lookup"}], "answer": ["A"], "explanation": "A roll-up summary field is a type of field that calculates values from related records, such as the count of child records or the sum of a field on child records. In this case, the administrator can add a roll-up summary field to the open house object to track the number of visitors by counting the child records on the visitors object. References: id=sf.fields_about_roll_up_summary_fields. htm&type=5"}, {"id": "q70", "module": "automation", "question": "The business development team at Cloud Kicks thinks the account creation process has too many fields to fill out and the page feels cluttered. They have requested the administrator to simplify the process. Which automation tool should an administrator use?", "options": [{"key": "A", "text": "Approval process"}, {"key": "B", "text": "Workflow rule"}, {"key": "C", "text": "Flow builder"}, {"key": "D", "text": "Validation rule"}], "answer": ["C"], "explanation": "Flow builder is an automation tool that allows administrators to create flows that guide users through screens, collect data, and perform actions on records. It can be used to simplify the account creation process by creating a screen flow that shows only the essential fields for creating an account and hides any unnecessary fields or sections from the page layout. Approval process, workflow rule, and validation rule are not automation tools that can simplify the account creation process; they are used fordifferent purposes such as approving records,updating fields, or enforcing data quality.References: /articleView?id=sf.flow_builder.htm&type=5"}, {"id": "q71", "module": "config_setup", "question": "The administrator for AW Computing is working with a user who is having trouble togging in to Salesforce. What should the administrator do to identify why the user Is unable to log in?", "options": [{"key": "A", "text": "Review the login history for the user."}, {"key": "B", "text": "Check the attempted logins by running the setup audit trail."}, {"key": "C", "text": "Pull the password history to ensure the password policy was followed."}, {"key": "D", "text": "Reset the security token for the profile."}], "answer": ["A"], "explanation": "To identify why a user is unable to log in to Salesforce, the administrator should review the login history for the user. The login history shows the date and time of each login attempt, the source IP address, the browser and platform used, the login type (such as username and password or single sign-on), and the status (such as success or failure). The login history can help troubleshoot common login issues such as incorrect username or password, invalid security token, IP restrictions, or login hours violations. Checking the attempted logins by running the setup audit trail, pulling the password history, or resetting the security token for the profile will not help identify why a user is unable to log in. References: monitoring_login_history.htm&type=5"}, {"id": "q72", "module": "object_manager", "question": "The administrator at Universal Container has created two objects: Containers_c Purchase_c, Management has requested that all container records display on purchase records in Salesforce. Which type of relationship between Containers_c and Purchase_c should satisfy the requirement?", "options": [{"key": "A", "text": "Roll-Up Summary field"}, {"key": "B", "text": "Formula field"}, {"key": "C", "text": "Master-detail field"}, {"key": "D", "text": "Lookup field"}], "answer": ["D"], "explanation": "A lookup field is a type of field that allows administrators to create a relationship between two objects by linking records from one object to another object. For example, a lookup field can link an account record to a purchase record by storing the account ID on the purchase record. A lookup field allows users to select an existing record from a pop-up window or create a new record from the same window. References: salesforce.com/s/articleView?id=sf.relationships_lookup.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (256 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q73", "module": "automation", "question": "When a Sales rep clicks a button on an opportunity, a simple discount calculator screen should be launched. Which automation tool should an administrator use to build this discount calculator screen?", "options": [{"key": "A", "text": "Flow Builder"}, {"key": "B", "text": "Workflow Rule"}, {"key": "C", "text": "Platform Event"}, {"key": "D", "text": "Process Builder"}], "answer": ["A"], "explanation": "Flow Builder supports creating a screen that can launch a simple discount calculator when a button is clicked on an opportunity. References: salesforce.com/s/articleView?id=sf.flow_distribute_button.htm&type=5"}, {"id": "q74", "module": "sales_marketing", "question": "Northern Trail Outfitters has hired interns to enter Leads Into Salesforce and has requested a way to identify these new records from existing Leads. What approach should an administrator take to meet this requirement?", "options": [{"key": "A", "text": "Create a separate Lead Lightning App."}, {"key": "B", "text": "Define a record type and assign it to the interns."}, {"key": "C", "text": "Set up Web-to-Lead for the interns' use."}, {"key": "D", "text": "Update the active Lead Assignment Rules."}], "answer": ["B"], "explanation": "To identify new leads entered by interns from existing leads, the administrator should define a record type and assign it to the interns. This will allow them to select a different record type when creating leads, and distinguish them from other leads based on record type. Creating a separate Lead Lightning App or updating the active Lead Assignment Rules will not affect lead identification. Setting up Web-to-Lead form will not work if the interns are entering leads manually in Salesforce.References: /articleView?id=sf.customize_recordtype.htm&type=5"}, {"id": "q75", "module": "config_setup", "question": "The IT manager at universal Containers is doing an audit of the systems security. Mow should the administrator provide a summary of the org's security health?", "options": [{"key": "A", "text": "Change theOrganization-Wide Default to private to restrict visibility."}, {"key": "B", "text": "Turn on Event Monitoring to track user events."}, {"key": "C", "text": "Download the last six months of user login data."}, {"key": "D", "text": "Run a Health Check to identify vulnerabilities."}], "answer": ["D"], "explanation": "To provide a summary of org's security health, an administrator should run a Health Check that compares org's settings against baseline settings defined by Salesforce Security Baseline Standard or industry standards such as CIS (Center for Internet Security) Benchmark Standard. Health Check generates an overall health score based on how org's settings match with baseline settings for various security categories such as Password Policies, Network Access, Session Settings etc. Health Check also provides recommendations for improving org's security health score by adjusting settings that do not match with baseline settings. Changing Org-Wide Default to private, turning on Event Monitoring, or downloading user login data will not provide a summary of org's security health. References:"}, {"id": "q76", "module": "automation", "question": "The administrator for Cloud Kicks has created a screen flow to help service reps ask the same set of questions when customers call in with issues. This screen should be visible from cases. How should the screen flow be distributed?", "options": [{"key": "A", "text": "Page Layout"}, {"key": "B", "text": "Component Filter"}, {"key": "C", "text": "Lightning page"}, {"key": "D", "text": "Home page"}], "answer": ["C"], "explanation": "Lightning page allows you to customize a record page and add a screen flow as a component. You can use the Lightning App Builder to drag and drop the Flow component onto the page and select the screen flow you want to display. References: id=sf.flow_distribute_lightning_page.htm&type=5"}, {"id": "q77", "module": "automation", "question": "DreamHouse Realty (DHR) wants a templated process with a mortgage calculator that generated leads for loans. DHR needs to complete the project within 30 days and has maxed out its budget for the year. Which AppExchange item should help the administrator to meet the request?", "options": [{"key": "A", "text": "Lightning Data"}, {"key": "B", "text": "Lightning Community"}, {"key": "C", "text": "Flow Solutions"}, {"key": "D", "text": "Bolt Solutions"}], "answer": ["C"], "explanation": "Flow Solutions are pre-built flows ortemplates that can be installed from AppExchange and customized to meet specific business needs. For example, Flow Solutions can provide common use cases such as lead generation, document generation, payment processing, and more. In this case, the administrator can use a Flow Solution that provides a mortgage calculator and generates leads for loans. Flow Solutions are easy to install and configure, and can help save time and budget for projects.References: /articleView?id=sf.flow_solutions.htm&type=5"}, {"id": "q78", "module": "service_support", "question": "Cloud Kicks needs to change the owner of a case when it has been open for more than 7 days. How should the administrator complete this requirement?", "options": [{"key": "A", "text": "Auto - Response Rules"}, {"key": "B", "text": "Validation Rule"}, {"key": "C", "text": "Escalation Rule"}, {"key": "D", "text": "Assignment Rule"}], "answer": ["C"], "explanation": "An escalation rule is a tool that allows administrators to automatically escalate cases based on certain criteria and time triggers. For example, an escalation rule can change the owner of a case, send an email notification, or update a field value when a case has been open for more than 7 days. An escalation rule consists of multiple rule entries that define the criteria and actions for each escalation scenario.References: salesforce.com/s/articleView?id=sf.case_escalation.htm&type=5"}, {"id": "q79", "module": "data_analytics", "question": "A sales rep has left the company and an administrator has been asked to re-assign all their accounts and opportunities to a new salesrep and keep the teams as is. Which tool should an administrator use to accomplish this?", "options": [{"key": "A", "text": "Data Loader"}, {"key": "B", "text": "Mass Transfer Tool"}, {"key": "C", "text": "Data Import Wizard"}, {"key": "D", "text": "Dataloader.io"}], "answer": ["B"], "explanation": "The mass transfer tool allows you to transfer up to 250 records at a time from one user to another user while keeping the existing team members intact. You can access this tool from Setup by entering Mass Transfer Records in the Quick Find box. References: id=sf.mass_transfer_overview.htm&type=5"}, {"id": "q80", "module": "automation", "question": "The sales team at Ursa Major Solar has asked the administrator to automate an outbound message. What should the administrator utilize to satisfy the request?", "options": [{"key": "A", "text": "Process builder"}, {"key": "B", "text": "Task assignment"}, {"key": "C", "text": "Workflow rule"}, {"key": "D", "text": "Flow builder"}], "answer": ["C"], "explanation": "To automate an outbound message, the administrator should use a workflow rule that defines the criteria for sending the message and the actions to perform when those criteria are met. One of the actions available for workflow rules is sending an outbound message to a designated endpoint URL with specified fields as parameters. Process builder, task assignment, and flow builder are not able to send outbound messages directly. References: id=sf.workflow_define.htm&type=5"}, {"id": "q81", "module": "sales_marketing", "question": "The administrator at universal containers has a screen flow that helps users create new leads. When lead source is \"Search Engine\", the administrator needs to require the user to choose a specific a search engine from a picklist. If lead source is not \"Search Engine\", this picklist should be hidden. How should the administrator complete this requirement?", "options": [{"key": "A", "text": "Assign a decision element to direct the user to a second screen to hold specific search engine only when a lead source is \"Search Engine\"."}, {"key": "B", "text": "Use an assignment element, onefor when lead source is \"Search Engine\" and one for everything else."}, {"key": "C", "text": "Create a picklist for specific search engine, and set conditional visibility so that is only shown when lead source is \"Search Engine\"."}, {"key": "D", "text": "Configure a picklist for specific search engine, and use a validation rule to conditionally show only when lead source is \"Search Engine\""}], "answer": ["C"], "explanation": "To require users to choose a specific search engine from a picklist when lead source is \"Search Engine\", and hide it otherwise, the administrator shouldcreate a picklist for specific search engine on the same screen as lead source, and set conditional visibility so that it is only shown when lead source is \"Search Engine\". This will make sure that users see only relevant fields based on their input. A decision element will create an extra screen that may disrupt user experience. An assignment element will not affect field visibility. A validation rule will not hide fields but only show errors when values are invalid. References: id=sf.flow_ref_elements_screen_components_picklist.htm&type=5http Valid Salesforce-Certified-Administrator Dumps shared by ExamDiscuss.com for Helping Passing Salesforce-Certified-Administrator Exam! ExamDiscuss.com now offer the newest Salesforce-Certified-Administrator exam dumps, the ExamDiscuss.com Salesforce\u0002Certified-Administrator exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com Salesforce-Certified-Administrator dumps with Test Engine here: (248 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q82", "module": "object_manager", "question": "Ursa Major Solar has a path on Case. The Company wants to require its users to follow the status values as they are on the path. Agents should be prohibited from preventing the case back to a previous status. Which Feature Should an administrator use to fulfill this request?", "options": [{"key": "A", "text": "Validation rules."}, {"key": "B", "text": "Global Value Picklists"}, {"key": "C", "text": "Predefined field Values."}, {"key": "D", "text": "Dependent Picklists."}], "answer": ["A"], "explanation": "Validation rules are a way to enforce data quality and business logic by preventing users from saving records that do not meet certain criteria. They can be used to require users tofollow the status values as they are on the path and prevent them from reverting the case back to a previous status by using formulas that compare the old and new values of the status field. Global value picklists are a way to create and maintain picklist values that can be shared across multiple fields, but they do not enforce any logic or order on the values. Predefined field values are a way to set default values for fields on path settings, but they do not prevent users from changing them later. Dependent picklists are a way to filter the values of one picklist based on the value of another picklist, but they do not prevent users from going back to a previous value.References: salesforce.com/s/articleView?id=sf.validation_rules.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (255 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q83", "module": "service_support", "question": "Thesupport manager at Cloud Kicks wants to respond to customers as quickly as possible. They have requested that the response include the top five troubleshooting tips that could help solve the customer's issue. What should the administrator suggest to meet these requirement?", "options": [{"key": "A", "text": "Auto-Response Rules"}, {"key": "B", "text": "Email Alerts"}, {"key": "C", "text": "Knowledge Articles"}, {"key": "D", "text": "Assignment Rules"}], "answer": ["C"], "explanation": "Knowledge articles are documents that provide information or solutions about products, services, or processes in Salesforce. You can use knowledgearticles to respond to customers quickly and consistently with accurate information. You can create different types of articles with different templates and fields, such as FAQ articles, troubleshooting articles, how-to articles, etc. To meet the requirement of responding to customers with the top five troubleshooting tips that could help solve their issue, you need to create knowledge articles with those tips and attach them to your email responses or case comments. References: id=sf.knowledge_article_types.htm&type=5"}, {"id": "q84", "module": "sales_marketing", "question": "Universal Containers has enabled Data Protection and Privacy for its org. Which page layouts will have the Individual field available for tracking data privacy information?", "options": [{"key": "A", "text": "Case and Opportunity"}, {"key": "B", "text": "Account and User"}, {"key": "C", "text": "Contact, Lead, and Person Account"}, {"key": "D", "text": "Individual, User, and Account"}], "answer": ["C"], "explanation": "Contact, lead, and person account are three objects that will have the individual field available for tracking data privacy information when data protection and privacy is enabled for an org. The individual object is an object that stores data privacy preferences and requests for customers who are subject to privacy regulations such as GDPR; it can be linked to contact, lead, or person account records using the individual field. Case and opportunity, account and user, or individual, user, and account are not combinations of objects that will have the individual field available for tracking data privacy information; they either do not store customer data or do not support individual object relationships. References: individual_object.htm&type=5"}, {"id": "q85", "module": "config_setup", "question": "The Support team at Ursa Major Solar prefersusing split list views on the case homepage. Occasionally, the team views shipments from another support application. What should the administrator configure to allow the team to use the split list view?", "options": [{"key": "A", "text": "Filter by a single shipment record type in the list view."}, {"key": "B", "text": "Include the Shipments tab on the app's navigation bar."}, {"key": "C", "text": "Split views are only available on standard objects."}, {"key": "D", "text": "Add the Manage List Views permission for support users."}], "answer": ["C"], "explanation": "Split views are a feature that allows users to view records as asplit list on object home pages in Lightning Experience apps that use console navigation. Split views show records in two panes: a list view pane on the left and a record detail pane on the right. Users can switch between different list views and records without losing context or scrolling. However, split views are only available on standard objects such as accounts, contacts, leads, opportunities, cases, etc., and not on custom objects such as shipments. References:"}, {"id": "q86", "module": "automation", "question": "The administrator at AW Computing wants to send off client welcome tasks and a welcome email to the primary contact automatically when an Opportunity is Closed won. What automation tool best accomplishes this?", "options": [{"key": "A", "text": "Validation Rule"}, {"key": "B", "text": "Outbound Message"}, {"key": "C", "text": "Approval Process"}, {"key": "D", "text": "Process Builder"}], "answer": ["D"], "explanation": "Process Builder is a tool that can be used to automate business processes by creating record\u0002triggered flows that execute actions when certain conditions are met. In this case, Process Builder can be used to create a flow that executes when an opportunity isclosed won and creates a client welcome task and a welcome email for the primary contact. References:"}, {"id": "q87", "module": "sales_marketing", "question": "Sales raps at Ursa Solar are having difficulty managing deals. The leadership team has asked the administrator to help sales reps prioritize and close more deals. What should the administrator and close more deals.", "options": [{"key": "A", "text": "Einstein Lead Scoring"}, {"key": "B", "text": "Einstein Search Personalization"}, {"key": "C", "text": "Einstein Activity Capture"}, {"key": "D", "text": "Einstein Opportunity Scoring"}], "answer": ["D"], "explanation": "Einstein Opportunity Scoring is a feature that helps sales reps prioritize and close more deals by assigning each opportunity a score from 1 to 99 based on how likely it is to be won. The score is calculated using artificial intelligence and machine learning based on historical data and patterns from similar opportunities. Sales reps can use the score to focus on high-value opportunities and take actions to improve low-scoring ones. References: id=sf.einstein_sales_oppty_scoring.htm&type=5"}, {"id": "q88", "module": "config_setup", "question": "Universal Containers has a private sharing model for Opportunities and uses Opportunity teams. Criteria-based sharing rules a sales rep at Universal Containers leaves the company and their user record is deactivated. The rep is later rehired in V administrator activates the old user record. The user is added to the same default Opportunity teams but h no longer able records the user worked on before leaving the company. What is the likely cause?", "options": [{"key": "A", "text": "The stage of the Opportunity records was changed to closed lost."}, {"key": "B", "text": "Permission sets were removed when the user was deactivated."}, {"key": "C", "text": "The record type of the Opportunity records was changed."}, {"key": "D", "text": "The records were manual shared with the user."}], "answer": ["D"], "explanation": "The likely cause for why a rehired user is no longer able to access records they worked on before leaving the company is that the records were manually shared with the user. Manual sharing allows granting access to individual records to specific users or groups. However, manual sharing is removed when a record owner changes or when a user's role changes. When a user is deactivated, their role is removed and any manual sharing involving that user is deleted. When a user is reactivated, their role is restored but manual sharing is not. Therefore, the rehired user will not have access to records that were manually shared with them before deactivation. The stage of Opportunity records, permission sets, or record type of Opportunity records are not likely causes for why a rehired user is no longer able to access records they worked on before leaving the company. References: id=sf.sharing_manual.htm&type=5"}, {"id": "q89", "module": "config_setup", "question": "The administrator at Northern Trail Outfitters has been using a spreadsheet to track assigned licenses and permission sets. What feature can be used to track this in Salesforce?", "options": [{"key": "A", "text": "Login History"}, {"key": "B", "text": "Lightning Usage App"}, {"key": "C", "text": "User Report"}, {"key": "D", "text": "Permission Set Groups"}], "answer": ["C"], "explanation": "To track assigned licenses and permission sets in Salesforce instead of using a spreadsheet, an administrator should use User Report type on Report object. User Report type allows creating reports that show information about users such as their profile, role, license type, active status, login history etc. It also allows adding fields related to permission sets such as Permission Set Assignments or Permission Set License Assignments. For example, an administrator can create a User Report that shows user name, profile name, user license name, permission set assignments count etc. Login History, Lightning Usage App, or Permission Set Groups are not features that can be used to track assigned licenses and permission sets in Salesforce. References: salesforce.com/s/articleView?id=sf.reports_report_types_standard_user.htm&type=5"}, {"id": "q90", "module": "automation", "question": "Northern Trail Outfitters has requested that when the Referral Date field is updated on the custom object Referral Source, the parent object Referral also needs to be updated. Which automation solution should an administrator use to meet this request?", "options": [{"key": "A", "text": "Lightning Web Component"}, {"key": "B", "text": "Approval Process"}, {"key": "C", "text": "Workflow Field Update"}, {"key": "D", "text": "Process Builder"}], "answer": ["D"], "explanation": "Process Builder is an automation tool that allows you to create processes that perform actions based on criteria that you specify. You can use Process Builder to update fields on related records when a record is created or updated. To meet the requirement of updating the parent object Referral when the Referral Date field is updated on the custom object Referral Source, you need to create a process that triggers when a Referral Source record is updated, checks if the Referral Date field has changed, and updates the Referral Date field on the related Referral record. References: process_overview.htm&type=5"}, {"id": "q91", "module": "sales_marketing", "question": "Ursa Major Solar wants to know which of its marketing efforts are helping the team win Opportunities. What should an administrator configure to provide theseinsights?", "options": [{"key": "A", "text": "Campaign Hierarchy."}, {"key": "B", "text": "Campaign Influence"}, {"key": "C", "text": "Map Custom Lead Fields"}, {"key": "D", "text": "List Email Activities"}], "answer": ["B"], "explanation": "Campaign influence is a feature that allows users to track how campaigns have influenced opportunities and measure the return oninvestment (ROI) of marketing efforts. Users can see which campaigns have influenced an opportunity on the related list and assign different attribution models to calculate the campaign influence. References: Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (255 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q92", "module": "sales_marketing", "question": "Which feature gives a sales team the ability to prioritize deals with recent updates in the List view and Kanban view?", "options": [{"key": "A", "text": "Big Deal Alerts"}, {"key": "B", "text": "Report Filters"}, {"key": "C", "text": "Deal Change Highlights"}, {"key": "D", "text": "Opportunity Path"}], "answer": ["C"], "explanation": "Deal Change Highlights is a feature in Lightning Experience that helps sales teams quickly identify recent changes to opportunities. In list views and the Kanban view, changes to the \"Amount\" or \"Close Date\" fields are highlighted with green (for positive changes) or red (for negative changes) arrows and text for seven days. This allows reps and managers to visually prioritize deals that have recently shifted in value or timing without having to open each record. Big Deal Alerts (Option A) send emails for high-value deals. Report Filters (Option B) are for general data analysis. The Opportunity Path (Option D) helps guide users through stages but does not highlight recent field-level data changes in a list format."}, {"id": "q93", "module": "config_setup", "question": "How should a Platform Administrator view Currencies, Fiscal Year settings, and Business Hours in Salesforce?", "options": [{"key": "A", "text": "User Management Settings"}, {"key": "B", "text": "Company Settings"}, {"key": "C", "text": "Custom Settings"}, {"key": "D", "text": "Feature Settings"}], "answer": ["B"], "explanation": "In the Salesforce Setup menu, Company Settings (formerly Company Profile) is the central location where global organizational parameters are managed. This section contains several key settings. Under Company Information, the admin can view the Org ID, default time zone, and primary currency. The Fiscal Year settings allow the admin to define whether the organization follows a standard Gregorian calendar or a custom fiscal cycle. Business Hours are used to define the working times for the organization, which is critical for calculating milestones in Service Cloud or escalation rules. If Multi-Currency is enabled, this is also where exchange rates and active currencies are managed. Viewing and configuring these settings is a foundational task for any Platform Administrator, as they establish the baseline for how data is interpreted and how time- based automation functions across the entire instance. Ensuring these are correct is vital for accurate financial reporting and maintaining service level agreements (SLAs)."}, {"id": "q94", "module": "service_support", "question": "At Cloud Kicks, cases are being assigned a default Case Owner and showing a Created By and Last Modified By that is not expected. The company wants to change this to an integration user to alleviate confusion with the business. What should a Platform Administrator edit to change this in Salesforce?", "options": [{"key": "A", "text": "Process Automation Settings"}, {"key": "B", "text": "Debug Logs"}, {"key": "C", "text": "Support Processes"}, {"key": "D", "text": "Support Settings"}], "answer": ["D"], "explanation": "In Salesforce, Support Settings is the primary configuration page for determining how the Service Cloud handles automated case updates. This section allows a Platform Administrator to define the \"Default Case Owner\" and the \"Automated Case User.\" The Automated Case User is the user listed in the Case History for automated actions, such as those triggered by assignment rules, escalation rules, or Email-to-Case. If the business sees an \"unexpected\" user name in the Created By or Last Modified By fields during these automated processes, it is usually because this setting is pointing to a specific administrator or a system user. By updating the Automated Case User to a dedicated \"Integration User,\" the admin ensures that the audit trail clearly distinguishes between manual edits made by staff and automated updates made by the system. This provides better clarity for the support team and prevents confusion regarding who is responsible for specific record changes."}, {"id": "q95", "module": "service_support", "question": "Universal Containers wants to ensure that cases are routed to the right people at the right time, but there is a growing support organization. The business wants to be able to move people around and adjust the work they get without having to request extra assistance or rely on the administrator teams. Which tool allows the business to control its own assignment of work?", "options": [{"key": "A", "text": "Case Assignment Rules"}, {"key": "B", "text": "Email-to-Case"}, {"key": "C", "text": "Omni-Channel"}, {"key": "D", "text": "Lead Assignment Rules"}], "answer": ["C"], "explanation": "Omni-Channel is a comprehensive service tool designed to route work items (like Cases, Leads, or custom objects) to the most available and qualified support agents in real-time. Unlike Case Assignment Rules, which are often static and require administrative intervention to update complex logic, Omni-Channel allows for more dynamic management through the use of Queues and Presence Statuses. By using Omni-Channel, a support manager or \"Supervisor\" can monitor agent workloads and adjust capacity or move people between service channels without needing to modify the underlying system configuration or involve the Platform Administrator. It supports various routing models, such as \"Least Active\" or \"Most Available,\" ensuring that work is distributed fairly and efficiently. This flexibility is vital for growing organizations that need to scale their support operations quickly while maintaining high service levels. Furthermore, it provides the business with the autonomy to manage its workforce effectively, as managers can see who is logged in and what they are working on, allowing for immediate adjustments to handle spikes in case volume."}, {"id": "q96", "module": "sales_marketing", "question": "Sales reps at Ursa Major Solar are having difficulty managing deals. The leadership team has asked a Platform Administrator to help sales reps prioritize and close more deals. What should the administrator configure to help with these issues?", "options": [{"key": "A", "text": "Einstein Search Personalization"}, {"key": "B", "text": "Einstein Lead Scoring"}, {"key": "C", "text": "Einstein Opportunity Scoring"}, {"key": "D", "text": "Einstein Activity Capture"}], "answer": ["C"], "explanation": "To help sales reps prioritize their pipeline and identify which deals are most likely to close, Einstein Opportunity Scoring is the most effective tool. Part of Salesforce's AI suite, Opportunity Scoring uses machine learning to analyze past won and lost opportunities to assign a score from 1 to 99 to every open deal. The score is accompanied by \"Key Factors\"-both positive and negative-that explain why the score was given (e.g., \"The deal has progressed quickly through stages\" or \"The close date has been pushed three times\"). This allows reps to focus their time on high-scoring deals or take corrective action on deals with low scores. Einstein Lead Scoring (Option B) helps with the intake of new prospects but not with existing deals. Einstein Activity Capture (Option D) automates the logging of emails and events but does not provide prioritization logic. Einstein Search (Option A) improves search results but does not assist in deal management strategy."}, {"id": "q97", "module": "productivity", "question": "Cloud Kicks wants a report to categorize accounts into small, medium, and large based on the dollar value found in the Contract Value field. Which feature should a Platform Administrator use to meet this request?", "options": [{"key": "A", "text": "Group Rows"}, {"key": "B", "text": "Filter Logic"}, {"key": "C", "text": "Detail Column"}, {"key": "D", "text": "Bucket Column"}], "answer": ["D"], "explanation": "In Salesforce reporting, aBucket Columnis the most efficient tool for categorizing records without the need for creating custom fields or complex formula logic. Bucketing allows an administrator to define ranges of values for a field-such as the \"Contract Value\" currency field-and assign a label to each range, such as \"Small,\" \"Medium,\" or \"Large.\" This is particularly useful for grouping data into segments that do not exist natively in the data model. For example, if a \"Small\" account is defined as anything under $50,000 and \"Large\" is over $200,000, the bucket tool allows the admin to visually organize these in the report builder interface. Unlike Grouping Rows, which merely clusters identical values together, a Bucket Column transforms raw data into meaningful categories for visualization. This feature significantly enhances data storytelling by providing a summarized view of account distribution based on specific financial thresholds without impacting the actual Account record or requiring administrative overhead for new fields."}, {"id": "q98", "module": "sales_marketing", "question": "A sales team is having difficulty understanding which stage their opportunity is in and what the company sales process requires of them in that stage. Which feature should a Platform Administrator implement to help the sales team quickly determine where they are in the sales process and what is required of them?", "options": [{"key": "A", "text": "Reports & Dashboards"}, {"key": "B", "text": "Opportunity Sales Path"}, {"key": "C", "text": "Big Deal Alerts"}, {"key": "D", "text": "List Views"}], "answer": ["B"], "explanation": "The Opportunity Sales Path (or simply Path) is a visual representation of the stages in a sales process. It is the best tool for this requirement because it not only shows the current stage prominently at the top of the record but also allows administrators to define Key Fields and Guidance for Success for every stage. This guidance can include specific steps, tips, and links to company resources that explain exactly what a rep needs to do to move the deal to the next phase. Reports (Option A), List Views (Option D), and Big Deal Alerts (Option C) provide data and notifications but do not offer the contextual, stage-by-stage guidance that the Path provides."}, {"id": "q99", "module": "data_analytics", "question": "Northern Trail Outfitters has the Case object set to private. The support manager raised a concern that reps have a broader view of data than expected and can see all cases on their group's dashboards. What is causing reps to have inappropriate access to data on dashboards?", "options": [{"key": "A", "text": "Dashboard Filters"}, {"key": "B", "text": "Public Dashboards"}, {"key": "C", "text": "Dashboard's running user"}, {"key": "D", "text": "Dashboard Subscriptions"}], "answer": ["C"], "explanation": "In Salesforce, a dashboard's running user determines which data is displayed to anyone viewing the dashboard. If a dashboard is configured with a \"Static\" running user (e.g., a Support Manager who has \"View All\" permissions), every user who views that dashboard will see the manager's level of data, regardless of their own personal sharing permissions. This bypasses the Organization-Wide Default (OWD) of \"Private\" for the Case object. When the support manager observes that reps can see all cases on a group dashboard, it is almost certainly because the dashboard is \"running\" as a user with high-level access. To correct this and ensure users only see data they are entitled to, the Platform Administrator should convert it into a Dynamic Dashboard. A dynamic dashboard is set to \"Run as the logged-in user,\" meaning the data reflected in the components will automatically filter based on the individual viewer's specific sharing rules and record ownership. This ensures that the dashboard remains a useful tool for the team while strictly adhering to the company's data privacy and security requirements."}, {"id": "q100", "module": "automation", "question": "A Platform Administrator at Universal Containers needs an automated way to delete records based on field values. Which automated solution should the administrator use?", "options": [{"key": "A", "text": "Flow Builder"}, {"key": "B", "text": "Automation Studio"}, {"key": "C", "text": "Mass Delete Records"}, {"key": "D", "text": "Flow Orchestration"}], "answer": ["A"], "explanation": "Flow Builder is the standard and most versatile tool for performing automated data maintenance, including the deletion of records. A \"Schedule-Triggered Flow\" can be configured to run at specific intervals (e.g., daily at midnight) to find records that meet certain criteria-such as Leads that have been \"Unqualified\" for over a year-and use the \"Delete Records\" element to remove them from the system. While the \"Mass Delete Records\" tool (Option C) exists in the Setup menu, it is a manual administrative tool and cannot be scheduled or fully automated based on complex field-level logic. Automation Studio (Option B) is a Marketing Cloud tool, not a core Salesforce platform feature for record management. Flow Orchestration (Option D) is used for complex, multi-user business processes rather than simple data cleanup tasks. Therefore, for recurring, criteria- based record deletion, Flow Builder is the recommended solution."}, {"id": "q101", "module": "automation", "question": "The sales manager at cloud Kicks approves time off for their employees. They asked the administrator to ensure these requests are seen and responded to by a backup manager while the sales manager is out on vacation. What should administrator use to fulfill the requirement?", "options": [{"key": "A", "text": "Delegated approver"}, {"key": "B", "text": "Two step Approval process"}, {"key": "C", "text": "Approval history related list"}, {"key": "D", "text": "Delegated Administrator"}], "answer": ["A"], "explanation": "Delegated approver is a feature that should be used to fulfill this requirement. Delegated approver allows users to delegate their approval authority to another user for a specified period of time, such as when they are out on vacation. Users can specify which approval requests they want to delegate and who they want to delegate them to. References:"}, {"id": "q102", "module": "config_setup", "question": "Northern trail Outfitter wants to use contract hierarchy in its or to display contact association. What should the administrator take into consideration regarding the contact hierarchy?", "options": [{"key": "A", "text": "Contacts displays in the contact hierarchy are limited to record-level access by User."}, {"key": "B", "text": "Contact Hierarchy is limited to only 3,000 contacts at one time."}, {"key": "C", "text": "Customizing hierarchy columns changes the recently viewed Contacts list view."}, {"key": "D", "text": "Sharing setting are ignored by contacts displayed in the Contact Hierarchy."}], "answer": ["B"], "explanation": "The contact hierarchy is a feature that allows users to view contacts related to an account in a hierarchical tree structure based on their role or position within the account. The contact hierarchy respects record-level access by user, meaning that users can see only those contacts that they have access to based on their profile permissions and sharing settings. The other options are incorrect because contact hierarchy is not limited to 3,000 contacts at one time (it can display up to 5,000 contacts), customizing hierarchy columns does not change the recently viewed contacts list view (it only affects how contacts are displayed in the hierarchy), and sharing settings are not ignored by contacts displayed in the contact hierarchy (they determine which contacts are visible to users). References: id=sf.contacts_hierarchy. htm&type=5"}, {"id": "q103", "module": "data_analytics", "question": "What should an administrator use as an identifier when importing and updating records from a separate financial system?", "options": [{"key": "A", "text": "Auto-Number field?"}, {"key": "B", "text": "External ID"}, {"key": "C", "text": "Rich text field"}, {"key": "D", "text": "Record ID"}], "answer": ["B"], "explanation": "An external ID is a custom field that has the external ID attribute enabled, which means it can beused as an identifier when importing and updating records from an external system. It allows administrators to match records based on a unique ID value from another system instead of using Salesforce record IDs, which may not be available or consistent across systems. An auto\u0002number field is a custom field that automatically assigns a unique numeric value to each record, but it cannot be used as an identifier when importing and updating records from an external system because it is generated by Salesforceand may not match with the external system's IDs. A rich text field is a custom field that allows users to enter formatted text, images, and links, but it cannot be used as an identifier when importing and updating records from an external system because it is not unique or consistent across systems. A record ID is an internal ID assigned by Salesforce to each record, but it cannot be used as an identifier when importing and updating records from an external system because it may not be available or consistent across systems. References:"}, {"id": "q104", "module": "sales_marketing", "question": "At cloud kicks sales reps use discounts on the opportunity record to help win sales on products. When an opportunity is won, they then have to manually apply the discount up the related opportunity products. The sales manager has asked if three is a way to automate this time consuming task. What should theadministrator use to deliver this requirement?", "options": [{"key": "A", "text": "Flow Builder"}, {"key": "B", "text": "Approval Process"}, {"key": "C", "text": "Prebuild Macro."}, {"key": "D", "text": "Formula field"}], "answer": ["A"], "explanation": "To automate applying discounts on opportunity products when an opportunity is won, the administrator should use Flow Builder,which is a tool that allows creating complex business processes with clicks. The administrator can create an autolaunched flow that runs when an opportunity is updated, checks if its stage is \"Closed Won\", and updates its related opportunity products withdiscounts from a formula or variable. Approval Process, Prebuilt Macro, and Formula Field are not able to update related records based on criteria. References:"}, {"id": "q105", "module": "sales_marketing", "question": "Sales reps at Ursa Major Solar are having difficulty managing deals. The leadership team has asked administrator to help sales reps prioritize and close more deals. the administrator configure to help with these issues?", "options": [{"key": "A", "text": "Einstein Activity Capture"}, {"key": "B", "text": "Einstein Opportunity Scoring"}, {"key": "C", "text": "Einstein Search Personalization Einstein Lead Scoring"}], "answer": ["B"], "explanation": "To help sales reps prioritize and close more deals, theadministrator should use Einstein Opportunity Scoring, which is a feature that assigns each opportunity a score from 1 to 99 based on how likely it is to be won. The score is calculated using historical data and machine learning models, and can help reps focus on the most promising opportunities and take actions to improve their chances of winning. Einstein Activity Capture, Einstein Search Personalization, and Einstein Lead Scoring are not related to opportunity management. References: id=sf.einstein_sales_oppty_scoring.htm&type=5"}, {"id": "q106", "module": "config_setup", "question": "Cloud Kicks (CK) has new administrator who is asked to put together a memo detailing salesforce uses to budget for upcoming license purchases. Where Should the administrator go to find out what type of licenses CK Has purchased and how many are available.", "options": [{"key": "A", "text": "Search for licenses types in setup."}, {"key": "B", "text": "User Licenses Related List in Company information."}, {"key": "C", "text": "User Management settings in setup."}, {"key": "D", "text": "Usage based entitlement related list in company information."}], "answer": ["B"], "explanation": "The User Licenses related list in Company Information shows the types of licenses that have been purchased for an org and how many are available orused. It also shows the expiration date of each license type if applicable. This information can help administrators plan for license purchases and manage user access. Searching for license types in setup does not show how many licenses have been purchased or how many are available or used. User Management settings in setup does not show license information either, but rather settings related to user login, session, identity, etc. Usage-based entitlement related list in company information shows information about usage-based licenses such as API requests or sandboxes, but not user licenses. References: id=sf.users_understanding_license_types.htm&type=5"}, {"id": "q107", "module": "config_setup", "question": "Once an opportunity reaches the negotiation stage at cloud kicks, The Amount fields becomes required for sales users. Sales managers need to be able to move opportunities inti this stage without knowing the amount. How should the administrator require this field during the negotiation stage for sales users but allow their managers to make changes?", "options": [{"key": "A", "text": "Make the field required for all users."}, {"key": "B", "text": "Create to formula field to fill in the field formanagers."}, {"key": "C", "text": "Assign the administrator profile to the managers."}, {"key": "D", "text": "Configure a validation rule to meet the criteria."}], "answer": ["D"], "explanation": "To require the Amount field during the negotiation stage for sales users but allow their managers to make changes, the administrator should configure a validation rule that checks if the user profile is not a sales manager, the stage is negotiation, and the amount is blank. This will prevent sales users from saving the record without entering an amount, but allow sales managers to doso. Making the field required for all users will not meet the requirement. Creating a formula field or assigning the administrator profile to the managers will not affect field requirement. References: id=sf.validation_rules_overview.htm&type=5"}, {"id": "q108", "module": "service_support", "question": "Ursa Major classifies its accounts as Silver, Gold, or Platinum Level. When a new case is created for a Silver or Gold partner, it should to the Regular Support Queue. When an account is Platinum Level, it should automatically go to the Priority Support Queue. What should the administrator use to achieve this?", "options": [{"key": "A", "text": "Assignment Rules"}, {"key": "B", "text": "Case Rules"}, {"key": "C", "text": "Workflow Rules"}, {"key": "D", "text": "Escalation Rules"}], "answer": ["A"], "explanation": "Assignment rules are tools that allow administrators to automatically route records to users or queues based on certain criteria. For example, an assignment rule can assign cases to different queues based on case priority, origin, type, or other fields. Assignment rules can be triggered when records are created manually, via email, web, or API. Assignment rules consist of multiple rule entries that define the criteria and actions for each assignment scenario. References: id=sf.customize_leadrules.htm&type=5"}, {"id": "q109", "module": "productivity", "question": "Dreamhouse Realty agents are double-booking open house event nights. The evet manager wants to event submission process to help agents fill in event details and request dates. How should an administrator accomplish the request?", "options": [{"key": "A", "text": "Create a workflow role to update the Event Date Field."}, {"key": "B", "text": "Create an approval process on the Campaign object."}, {"key": "C", "text": "Create a sharing rule so that other agents can view events."}, {"key": "D", "text": "Create a campaign for agents to request event dates."}], "answer": ["B"], "explanation": "To help agents fill in event details and request dates for open house events without double-booking them, the administrator should create an approval process on the Campaign object, which is used to manage marketing events in Salesforce. The approval process can define entry criteria based on campaign fields such as type or status, specify initial submission actions such as sending email alerts or updating fields, assign approvers who can review and approve event requests, and specify final approval actions such as creating tasks or updating fields. Creating a workflow rule, a sharing rule, or a campaign will not help agents request event dates or prevent double-booking. References: htm&type=5"}, {"id": "q110", "module": "object_manager", "question": "Sales and Customer Care at Ursa Major Solar need to see different fields on the Case related list from the Account record. Sales users want to see Case created date and statuswhile Customer Care would like to see owner, status, and contact. What should the administrator use to achieve this?", "options": [{"key": "A", "text": "Related Lookup Filters"}, {"key": "B", "text": "Compact Layout Editor"}, {"key": "C", "text": "Page Layout editor"}, {"key": "D", "text": "Search Layout Editor"}], "answer": ["C"], "explanation": "Page layout editor is a tool that allows you to customize the layout and organization of detail and edit pages for a specific object and record type combination. You can also use page layout editor to customize related lists on detail pages by adding or removing fields, changing column order, sorting records, etc. To meet the requirement of showing different fields on the Case related list from the Account record for Sales and Customer Care users, you need to use page layout editor to modify the related list properties for each page layout assigned to those users. References: id=sf.customize_layoutrelatedlists.htm&type=5"}, {"id": "q111", "module": "sales_marketing", "question": "Cloud Kicks is Introducing a new shoe model and wants to advertise on TV, radio, print, and social under the banner of a called New Runners. In addition, total statistics for this marketing effort need to be aggregated and visible. Which feature should the administrator use to implement this functionality?", "options": [{"key": "A", "text": "Junction object"}, {"key": "B", "text": "Parent campaign field"}, {"key": "C", "text": "Lookup relationship"}, {"key": "D", "text": "Master-detail relationship"}], "answer": ["B"], "explanation": "To advertise on TV, radio, print, and social under one banner called New Runners and aggregate total statistics for this marketing effort, an administrator should use Parent campaign field on Campaign object. This field allows creating hierarchical relationships between campaigns by specifying one campaign as parent of another campaign. Parent campaigns roll up statistics from child campaigns such as number of leads generated, amount of revenue won etc. For example, an administrator can create four child campaigns for TV, radio, print and social ads respectively and link them to one parent campaign called New Runners using Parent campaign field. Junction object, lookuprelationship, and master-detail relationship are not features related to Campaign object or hierarchy. References:"}, {"id": "q112", "module": "object_manager", "question": "The Clientservices and customer support teams share the same profile but have different permission sets. The Custom Object Retention related list needs to be restricted to the client services teamon the Lightning record page layout. What should the administrator useto fulfil this request?", "options": [{"key": "A", "text": "Sharing settings"}, {"key": "B", "text": "Page Layout Assignment"}, {"key": "C", "text": "Component Visibility"}, {"key": "D", "text": "Record Type Assignment"}], "answer": ["C"], "explanation": "Component visibility allows you to restrict the visibility of a related list based on a permission set. References: id=sf.dynamic_forms_component_visibility.htm&type=5"}, {"id": "q113", "module": "object_manager", "question": "The administrator at AW Consulting has created a custom picklist field. Business users have requested that it be a text field. The administrator attempts to change the field type but, is unable to because it is referenced by other functionalities. Which functionality is preventing the field type from being changed?", "options": [{"key": "A", "text": "Formula fields"}, {"key": "B", "text": "Record types"}, {"key": "C", "text": "Visualforce"}, {"key": "D", "text": "Javascript"}], "answer": ["A"], "explanation": "Formula fields are types of fieldsthat calculate a value based on an expression or formula that references other fields or constants. Formula fields prevent administrators from changing their field type once they are created because they may be referenced by other functionalities such as reports, validation rules, workflow rules, etc., that depend on their data type and value. If a formula field is referenced by other functionalities, then changing its field type may cause errors or unexpected results. References:"}, {"id": "q114", "module": "object_manager", "question": "The administrator at Ursa Major Solar has been asked to change the work Item and Project Custom Object Relationship from a master detail to a Lookup. Which Scenario Could prevent theadministrator from fulfilling this requirement?", "options": [{"key": "A", "text": "A junction object is required to support the lookup."}, {"key": "B", "text": "The lookup field in all the records contains a value."}, {"key": "C", "text": "The Look-Up field is required for Saving Records."}, {"key": "D", "text": "Roll-Up summary field sexist on the master object."}], "answer": ["D"], "explanation": "One scenario that could prevent an administrator from changing the relationship between work item and project custom objects from master-detail to lookup is that roll-up summary fields exist on the master object (project). Roll-up summary fields are fields that calculate values from related records in a master-detail relationship; they cannot be used in a lookup relationship. If roll-up summary fields exist on the project object, they would prevent the administrator from changing the relationship type unless they are deleted first. A junction object is not required to support a lookup relationship; it is only used when creating many-to-many relationships between two objects using two master-detail relationships. The lookup field in allthe records containing a value or the lookup field being required for saving records are not scenarios that would prevent changing the relationship type; they are scenarios that would allow changing the relationship type without losing data or functionality. References: id=sf.fields_about_roll_up_summary_fields.htm&type=5"}, {"id": "q115", "module": "object_manager", "question": "An administrator needs to create a one-to-many relationship between two objects with limited access to child records. What type of field should the administrator use?", "options": [{"key": "A", "text": "Roll-up summary"}, {"key": "B", "text": "Master-detail field"}, {"key": "C", "text": "Cross Object formula"}, {"key": "D", "text": "Lookup field"}], "answer": ["D"], "explanation": "A lookup field is a type of field that creates a relationship between two objects and allows users to select a record from one object as a value for another object. A lookup relationship creates a one-to-many relationship between two objects, where each parent record can have many child records but each child record can have only one parent record. A lookup relationship also allows limited access to child records, meaning that users can see only those child records that they have access to based on their profile permissions and sharing settings. References:"}, {"id": "q116", "module": "productivity", "question": "An administrator is on a tight deadline to create dashboards for the sales and marketing teams at AW Computing. What should the administrator do to meetthe deadline without increasing the budget?", "options": [{"key": "A", "text": "Train someone on the sales and marketing teams to build dashboards."}, {"key": "B", "text": "Check the AppExchange for prebuilt Solution that can be easily customized."}, {"key": "C", "text": "Hire a Consultant to build the custom dashboards."}, {"key": "D", "text": "Build the dashboards manually to meet the deadline."}], "answer": ["B"], "explanation": "To save time and budget, you can check the AppExchange for prebuilt solutions that can be easily customized for your needs. AppExchange is a marketplace for apps, components, and consulting services that extend Salesforce functionality. References:"}, {"id": "q117", "module": "automation", "question": "An administrator at Cloud Kicks is building a flow that needs to search for records that meet certain conditions and store values from those records in variable for use later in the flow. What flow element should the administrator add?", "options": [{"key": "A", "text": "Assignment"}, {"key": "B", "text": "Get Records"}, {"key": "C", "text": "Create Records"}, {"key": "D", "text": "Update Records"}], "answer": ["B"], "explanation": "Get Records is a flow element that allows you to retrieve one or more records from an object that meet certain conditions and store them in a collection variable or a record variable for use later in the flow. You can also choose which fields from those records you want to store in variables. References: /s/articleView?id=sf.flow_ref_elements_data_getrecords.htm&type=5"}, {"id": "q118", "module": "productivity", "question": "Ursa Major Solar offers amazing experiencesfor all of it employees. The Employee engagement committee wants to post updates while restricting other employees from posting. What should the administrator create to meet this request?", "options": [{"key": "A", "text": "Chatter Stream."}, {"key": "B", "text": "Chatter Broadcast Group"}, {"key": "C", "text": "Chatter Recommendations."}, {"key": "D", "text": "Chatter Unlisted Group"}], "answer": ["B"], "explanation": "Chatter broadcast group is a type of group that should be created to meet this request. Chatter broadcast group is a group where only group owners and managers can create posts, but anyone can comment on posts. This can be useful for sharing important updates or announcements with a large audience without cluttering the feed with other posts. References: Valid Salesforce-Certified-Administrator Dumps shared by ExamDiscuss.com for Helping Passing Salesforce-Certified-Administrator Exam! ExamDiscuss.com now offer the newest Salesforce-Certified-Administrator exam dumps, the ExamDiscuss.com Salesforce\u0002Certified-Administrator exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com Salesforce-Certified-Administrator dumps with Test Engine here: (248 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q119", "module": "productivity", "question": "The administrator at Ursa Major Solar wants to add prepopulated subjects for Tasks and Events. Tasks should have the subjects Schedule Site Visit, and Send Contract, while Events should have the subjects Site Visit and Ride Along. How can this requirement be configured?", "options": [{"key": "A", "text": "Include Schedule Site Visit, Send Contract, Site Visit, and Ride Along picklist values for the Activity subject field."}, {"key": "B", "text": "Add the new values to the predefined held values for the global actions New Event and New Task"}, {"key": "C", "text": "Add Schedule Site Visit and Send Contract picklist values for the Task subject held. Add Site Visit and Elide Along picklist values for Event subject field"}, {"key": "D", "text": "Create a new custom Subject picklist held on Activity and add the held values."}], "answer": ["B"], "explanation": "To add prepopulated subjects for Tasks and Events with the specific subjects as mentioned, the most efficient way is: * Add the new values to the predefined field values for the global actions New Event and New Task: This allows the administrator to define specific subjects for tasks and events directly within the global actions. When a user selects either of these actions, they will see the predefined subjects (such as Schedule Site Visit, Send Contract, Site Visit, and Ride Along) available in the subject field. Options A, C, and D are not as straightforward or effective in achieving this specific requirement. References: * Salesforce Help: Global Actions * Salesforce Trailhead: Customize Standard Global Actions"}, {"id": "q120", "module": "config_setup", "question": "Which tool should an administrator use to review recent configuration changes made in their org?", "options": [{"key": "A", "text": "Critical Updates"}, {"key": "B", "text": "Debug logs"}, {"key": "C", "text": "Setup Audit Trail"}, {"key": "D", "text": "Field History Tracking"}], "answer": ["C"], "explanation": "Setup audit trail is a tool that allows administrators to review recent configuration changes made in their org. It shows a list of up to 180 days of setup changes made by anyone in the org, including the date, time, user, and type of change. It can help administrators track who made what changes and when, and troubleshoot any issues caused by configuration changes. Critical updates are notifications that inform administrators of new features or enhancements that may impact their org; they do not show configuration changes made by users. Debug logs are records of database operations, system processes, and errors that occur when executing a transaction or running unit tests; they do not show configuration changes made by users either. Field history tracking is a feature that allows administrators to track changes to the values of certain fields on records; it does not show configuration changes made in setup. References: id=sf.monitorsetup.htm&type=5"}, {"id": "q121", "module": "sales_marketing", "question": "The VP of sales at Universal Containers wants to prevent members of the sales team from changing an opportunity to a date in the past. What should an administrator configure to meet this requirement?", "options": [{"key": "A", "text": "Assignment Rule"}, {"key": "B", "text": "Validation Rule"}, {"key": "C", "text": "Field-Level Security"}, {"key": "D", "text": "Approval Process"}], "answer": ["B"], "explanation": "Validation rules allow you to prevent users from changing an opportunity close date to a date in the past. References:"}, {"id": "q122", "module": "service_support", "question": "The administrator at Ursa Major Solar need to make sure the unassigned cases from VP customers get transferred to the appropriate service representative within 5 hours. VIP Customers have access to support 24 hours a day. How should this be configured?", "options": [{"key": "A", "text": "Assignment Rules."}, {"key": "B", "text": "Business Hours."}, {"key": "C", "text": "Case Queues"}, {"key": "D", "text": "Escalation Rules"}], "answer": ["D"], "explanation": "Escalation rules allow you to escalate cases based on certain criteria, such as time or priority. You can use escalation rules to transfer unassigned cases to the appropriate service representative within a specified time frame. References:"}, {"id": "q123", "module": "automation", "question": "The administrator has been asked to automate a simple field update on the account. When a support agent changes the status of the account to 'Audited', they would like the system to automatically update the Audited date field on the account with today's date. Which tool should the administrator use to complete this automation?", "options": [{"key": "A", "text": "Approval process"}, {"key": "B", "text": "Formula Field"}, {"key": "C", "text": "Flow Builder"}, {"key": "D", "text": "Validation Rule"}], "answer": ["B"], "explanation": "A formula field is a type of field that calculates a value based on an expression or formula that references other fields or constants. For example, a formula field can display today's date by using the TODAY() function. In this case, the administrator can create a formula field on the account object that updates the audited date field with today's date when the status of the account is changed to 'Audited'. References:"}, {"id": "q124", "module": "automation", "question": "An administration needs to store the ID of record type of later use in a flow. Which kind of variable should the administrator use?", "options": [{"key": "A", "text": "Boolean variable"}, {"key": "B", "text": "Text variable"}, {"key": "C", "text": "ID variable"}, {"key": "D", "text": "Record variable"}], "answer": ["C"], "explanation": "An ID variable is a type of variable that can store an ID value of a record or a record type in a flow. It can be used to store the ID of a record type for later use in a flow, such as assigning it to a record or using it in a condition. A boolean variable is a type of variable that can store a true or false value in a flow. A text variable is a type of variable that can store a text value in a flow. A record variable is a type of variable that can store one or more field values of a record in a flow. References: flow_ref_elements_variables.htm&type=5"}, {"id": "q125", "module": "object_manager", "question": "The administrator at Aw Computing wants Account Details, related list and chatter feeds to each appear on separate tabs when reviewing an account. Which type of page should the administrator create?", "options": [{"key": "A", "text": "Lightning app page."}, {"key": "B", "text": "Lightning page Tab."}, {"key": "C", "text": "Lightning record page."}, {"key": "D", "text": "Lightning page Component."}], "answer": ["C"], "explanation": "Lightning record page is a type of page that should be created to meet this requirement. Lightning record page allows an administrator to customize the layout and components for a specific object record page in Lightning Experience or the Salesforce mobile app. To create tabs for account details, related lists, and chatter feeds, use the Tabs component in the Lightning App Builder and drag the desired components to each tab. References: com/s/articleView?id=sf.app_builder_tabs.htm&type=5"}, {"id": "q126", "module": "automation", "question": "Northern Trail Outfitters has asked an administrator to ensure that when a contact with a title of CEO is created, the contact's account record gets updated with the CEO's name. Which feature should an administrator use to implement this request?", "options": [{"key": "A", "text": "Quick Action"}, {"key": "B", "text": "Workflow Rule"}, {"key": "C", "text": "Process Builder"}, {"key": "D", "text": "Validation Rule"}], "answer": ["C"], "explanation": "Process Builder is a tool that can be used to implement this request. Process Builder can create record- triggered flows that execute actions when certain conditions are met. In this case, Process Builder can create a flow that executes when a contact with a title of CEO is created and updates the contact's account record with the CEO's name. References: id=sf.process_overview.htm&type=5"}, {"id": "q127", "module": "service_support", "question": "An Administrator at DreamHouse Realty wants an easier way to assign an agent capacity and skill set. Which feature should the administrator enable to meet this requirement?", "options": [{"key": "A", "text": "Knowledge Management."}, {"key": "B", "text": "Omni-Channel"}, {"key": "C", "text": "Escalation Rules"}, {"key": "D", "text": "Territory Management"}], "answer": ["B"], "explanation": "To assign agent capacity and skill set, the administrator should enable Omni-Channel, which is a feature that allows agents to work on multiple cases or chats at once based on their availability and expertise. Omni- Channel can route work items to agents based on their predefined capacity and skills, ensuring that they are working on the right tasks at the right time. Knowledge Management, Escalation Rules, and Territory Management are not related to agent capacity and skill set. References: /articleView?id=sf.omnichannel_overview.htm&type=5"}, {"id": "q128", "module": "sales_marketing", "question": "New Leads needs to be routed to the correct sales person based on the lead address. How should the administrator configure this requirement?", "options": [{"key": "A", "text": "Create formula field."}, {"key": "B", "text": "Use lead assignment rules."}, {"key": "C", "text": "Assign with an escalation rule."}, {"key": "D", "text": "Configure a validation rule"}], "answer": ["B"], "explanation": "To route new leads to the correct sales person based on the lead address, the administrator should use lead assignment rules that specify criteria based on lead fields such as City, State/Province, or Country, and assign leads that match those criteria to queues or users. Lead assignment rules can be triggered automatically when leads are created or manually by users. Creating a formula field, assigning with an escalation rule, or configuring a validation rule will not route leads to sales people. References: /articleView?id=sf.leads_assignment_rules.htm&type=5"}, {"id": "q129", "module": "config_setup", "question": "A user at Universal Containers left the company. The administrator needs to create new user for their replacement, but they have assigned all available users licenses. What should the administrator do to free up users licenses for the new users?", "options": [{"key": "A", "text": "Deactivate the former employees user record."}, {"key": "B", "text": "Delete former employees user record."}, {"key": "C", "text": "Freeze former employees user record."}, {"key": "D", "text": "Change the formers users record to the new user."}], "answer": ["A"], "explanation": "To free up user licenses for new users, the administrator should deactivate the former employees user record. This will prevent them from logging in and using Salesforce resources, but preserve their historical activities and data. Deleting or freezing user records will not release user licenses. References: com/s/articleView?id=sf.admin_usermgmt_licensing.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (255 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q130", "module": "sales_marketing", "question": "Cloud kicks want to give credit to Opportunity team members based on the level of effort contributed by each person toward each deal. What feature should the administrator use to meet this requirement?", "options": [{"key": "A", "text": "Stages"}, {"key": "B", "text": "Splits"}, {"key": "C", "text": "Queues"}, {"key": "D", "text": "List Views"}], "answer": ["B"], "explanation": "Splits is a feature that should be used to meet this requirement. Splits allows users to assign credit to opportunity team members based on the level of effort contributed by each person toward each deal. Users can create different types of splits, such as revenue or overlay splits, and specify the percentage or amount of credit for each team member
