.References: forecasts3_splits_overview.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (150 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q131", "module": "automation", "question": "Universal Containers requires that when an Opportunity is closed won, all other open opportunities on the same account must be marked as closed lost. Which automation solution should an administrator use to implement this request?", "options": [{"key": "A", "text": "Quick Action"}, {"key": "B", "text": "Workflow Rule"}, {"key": "C", "text": "Flow Builder"}, {"key": "D", "text": "Outbound Message"}], "answer": ["C"], "explanation": "Flow Builder allows you to create an automated business process that can update records based on certain criteria. You can use a scheduled flow to run once a week and count the number of open cases related to an account. References: salesforce.com/s/articleView?id=sf.flow_concepts_scheduled_start.htm&type=5"}, {"id": "q132", "module": "data_analytics", "question": "The VP of sales at Dreamhouse Realty has requested a dashboard to visualize enterprise sales across the different teams. The key place of data is the total of all sales for the year and the progress to the enterprise sales goal. What dashboard component will effectively show this number and the proximity to the total goal as a single value?", "options": [{"key": "A", "text": "Table"}, {"key": "B", "text": "Stacked Bar"}, {"key": "C", "text": "Donut"}, {"key": "D", "text": "Gauge"}], "answer": ["D"], "explanation": "A gauge component shows a single value along with its percentage of a total value within predefined ranges using colors (red-yellow-green). It is useful for showing key performance indicators (KPIs) such as total sales amount and progress towards sales goal. References: dashboards_gauge_component_type.htm&type=5 Valid ADM-201 Dumps shared by ExamDiscuss.com for Helping Passing ADM-201 Exam! ExamDiscuss.com now offer the newest ADM-201 exam dumps, the ExamDiscuss.com ADM-201 exam questions have been updated and answers have been corrected get the newest ExamDiscuss.com ADM-201 dumps with Test Engine here: (255 Q&As Dumps, 35%OFF Special Discount Code: freecram)"}, {"id": "q133", "module": "sales_marketing", "question": "The events manager at dream house realty has a hot lead from a successful open house that needs to become a contact with an associated opportunity. How should this be accomplished from the campaign keeping the associated campaign member history?", "options": [{"key": "A", "text": "Delete the lead and create a new contact and opportunity."}, {"key": "B", "text": "Clone the lead and convert the cloned record to a contact."}, {"key": "C", "text": "Convert the lead from the campaign member detail page."}, {"key": "D", "text": "Add a contact from a campaign member detail page."}], "answer": ["C"], "explanation": "To create a contact and an opportunity from a lead that is associated with a campaign, and keep the campaign member history, the administrator should convert the lead from the campaign member detail page. This will automatically create a contact, an account, and an opportunity that are linked to the campaign. Deleting, cloning, or adding a contact will not preserve the campaign member history. References: salesforce.com/s/articleView?id=sf.campaigns_leads.htm&type=5"}, {"id": "q134", "module": "sales_marketing", "question": "Northern Trail outfitters has hired interns to enter Leads into Salesforce and has requested a way to is identify these new records from existing Leads. What approach should an administrator take to meet this requirement?", "options": [{"key": "A", "text": "Set up Web-to-Lead form the interns use."}, {"key": "B", "text": "Define a record type and assign it to the interns."}, {"key": "C", "text": "Create a separate Lead Lightning App."}, {"key": "D", "text": "Update the active Leas Assignment Rules."}], "answer": ["B"], "explanation": "To identify new leads entered by interns from existing leads, the administrator should define a record type and assign it to the interns. This will allow them to select a different record type when creating leads, and distinguish them from other leads based on record type. Setting up Web-to\u0002Lead form will not work if the interns are entering leads manually in Salesforce. Creating a separate Lead Lightning App or updating the active Lead Assignment Rules will not affect lead identification. References: /articleView?id=sf.customize_recordtype.htm&type=5"}, {"id": "q135", "module": "object_manager", "question": "Users at Cloud Kicks are reporting different options when uploading a custom picklist on the Opportunity object based on the kind of opportunity. Where Should an administrator update the option in the picklist?", "options": [{"key": "A", "text": "Fields and relationships"}, {"key": "B", "text": "Related lookup filters"}, {"key": "C", "text": "Record Type"}, {"key": "D", "text": "Picklist value sets"}], "answer": ["C"], "explanation": "Record types allow you to update the options in a picklist based on the kind of opportunity. References:"}, {"id": "q136", "module": "object_manager", "question": "Cloud Kicks (CK) stores information about specific customers in Contacts and information about shoes and accessories in a custom Merchandise object. What should the CK administrator use to represent that Contact can be interested in multiple pieces of Merchandies?", "options": [{"key": "A", "text": "Hierarchy column"}, {"key": "B", "text": "Lookup filter"}, {"key": "C", "text": "Formula field"}, {"key": "D", "text": "Junction object"}], "answer": ["D"], "explanation": "A junction object is a type of custom object that allows administrators to create many-to-many relationships between two other objects. A many-to-many relationship means that each record of one object can be related to multiple records of another object, and vice versa. For example, a junction object can represent that a contact can be interested in multiple pieces of merchandise, and a piece of merchandise can be of interest to multiple contacts. A junction object has two master-detail relationships with the two objects it connects. References: id=sf.relationships_manytomany.htm&type=5"}]}</script>
<script>
/* ============================================================
   ADM-201 Course App
   ============================================================ */
const DATA = JSON.parse(document.getElementById('course-data').textContent);
const MODULES = DATA.modules; // ordered
const QUESTIONS = {}; // id -> question
DATA.questions.forEach(q => QUESTIONS[q.id] = q);

const LS_KEY = 'adm201_progress_v1';
function loadProgress(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { articlesRead:{}, quizBest:{}, quizHistory:{}, questionStats:{} };
}
function saveProgress(){ localStorage.setItem(LS_KEY, JSON.stringify(PROGRESS)); }
let PROGRESS = loadProgress();

const MODULE_COLORS = ["#8C6420","#2E6E62","#5A4A8C","#A8422C","#2C6E8C","#6E7F2E","#8C2E5E","#3A3A3A"];
function moduleColor(idx){ return MODULE_COLORS[idx % MODULE_COLORS.length]; }

// ---------------- Router ----------------
let ROUTE = { view:'overview' };

function goOverview(){ ROUTE = { view:'overview' }; render(); window.scrollTo(0,0); }
function goModule(id, tab){ ROUTE = { view:'module', id, tab: tab || 'article' }; render(); window.scrollTo(0,0); }
function goExam(){ ROUTE = { view:'exam-settings' }; render(); window.scrollTo(0,0); }

// ---------------- Helpers ----------------
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pctColorClass(pct){ return pct >= 68 ? 'good':'bad'; }

function overallCompletion(){
  const totalModules = MODULES.length;
  let sum = 0;
  MODULES.forEach(m=>{
    let score = 0;
    if(PROGRESS.articlesRead[m.id]) score += 0.5;
    const best = PROGRESS.quizBest[m.id];
    if(best && best.pct >= 68) score += 0.5;
    sum += score;
  });
  return Math.round((sum/totalModules)*100);
}

function updateTopbar(){
  const pct = overallCompletion();
  document.getElementById('topbarPctLabel').textContent = pct + '% ukończone';
  document.getElementById('topbarPctBar').style.width = pct + '%';
}

// ---------------- Render dispatcher ----------------
function render(){
  const app = document.getElementById('app');
  if(ROUTE.view === 'overview') app.innerHTML = renderOverview();
  else if(ROUTE.view === 'module') app.innerHTML = renderModule(ROUTE.id, ROUTE.tab);
  else if(ROUTE.view === 'quiz-settings') app.innerHTML = renderQuizSettings(ROUTE.id);
  else if(ROUTE.view === 'quiz-run') app.innerHTML = renderQuizRun();
  else if(ROUTE.view === 'quiz-results') app.innerHTML = renderQuizResults();
  else if(ROUTE.view === 'exam-settings') app.innerHTML = renderExamSettings();
  updateTopbar();
  window.scrollTo({top:0});
}

// ---------------- Overview ----------------
function renderOverview(){
  let segs = '';
  MODULES.forEach((m,i)=>{
    const done = PROGRESS.articlesRead[m.id] && PROGRESS.quizBest[m.id] && PROGRESS.quizBest[m.id].pct>=68;
    segs += `<div class="seg ${done?'done':''}" style="width:${m.weight}%;background:${moduleColor(i)}" onclick="goModule('${m.id}')" title="${m.title} — ${m.weight}%">${m.weight}%</div>`;
  });

  let items = '';
  MODULES.forEach((m,i)=>{
    const read = PROGRESS.articlesRead[m.id];
    const best = PROGRESS.quizBest[m.id];
    const nodeClass = (read && best && best.pct>=68) ? 'done' : '';
    items += `
    <div class="tl-item">
      <div class="tl-node ${nodeClass}">${String(i+1).padStart(2,'0')}</div>
      <div class="tl-card" onclick="goModule('${m.id}')">
        <div>
          <p class="tl-card-title">${m.title}</p>
          <div class="tl-card-meta">
            <span>WAGA EGZAMINU: ${m.weight}%</span>
            <span>${m.questionIds.length} PYTAŃ TESTOWYCH</span>
            <span>${read ? 'ARTYKUŁ PRZECZYTANY' : 'ARTYKUŁ NIEPRZECZYTANY'}</span>
          </div>
        </div>
        <div class="tl-card-right">
          ${best ? `<span class="pct-pill ${pctColorClass(best.pct)}">${best.pct}%</span>` : `<span class="pct-pill">— %</span>`}
          <div class="tl-card-cta">${best ? 'najlepszy wynik' : 'quiz nierozpoczęty'}</div>
        </div>
      </div>
    </div>`;
  });

  const examBest = PROGRESS.quizBest['__exam__'];
  items += `
    <div class="tl-item">
      <div class="tl-node exam">EX</div>
      <div class="tl-card" onclick="goExam()">
        <div>
          <p class="tl-card-title">Egzamin końcowy</p>
          <div class="tl-card-meta">
            <span>PYTANIA ZE WSZYSTKICH MODUŁÓW</span>
            <span>SYMULACJA EGZAMINU ADM-201</span>
          </div>
        </div>
        <div class="tl-card-right">
          ${examBest ? `<span class="pct-pill ${pctColorClass(examBest.pct)}">${examBest.pct}%</span>` : `<span class="pct-pill">— %</span>`}
          <div class="tl-card-cta">${examBest ? 'najlepszy wynik' : 'egzamin nierozpoczęty'}</div>
        </div>
      </div>
    </div>`;

  return `
    <div class="hero">
      <div class="eyebrow">Salesforce Certified Platform Administrator · ADM-201</div>
      <h1 class="hero-title">Kurs przygotowawczy do egzaminu</h1>
      <p class="hero-lede">Osiem modułów odzwierciedlających oficjalny Exam Outline, z artykułami opisującymi każde zagadnienie oraz quizami opartymi na zweryfikowanej bazie ${DATA.questions.length} pytań praktycznych. Pasek poniżej odzwierciedla rzeczywistą wagę procentową każdego modułu na egzaminie.</p>
    </div>
    <div class="weightbar">${segs}</div>
    <div class="weightbar-caption"><span>KONFIGURACJA I SETUP → AGENTFORCE</span><span>SUMA: 100% PUNKTACJI EGZAMINU</span></div>
    <div class="timeline">${items}</div>
  `;
}

// ---------------- Module page (article + quiz tab) ----------------
function moduleById(id){ return MODULES.find(m=>m.id===id); }

function renderModule(id, tab){
  const m = moduleById(id);
  const idx = MODULES.indexOf(m);
  const read = PROGRESS.articlesRead[m.id];
  const html = marked.parse(m.article);

  const tabsHtml = `
    <div class="module-tabs">
      <div class="module-tab ${tab==='article'?'active':''}" onclick="goModule('${m.id}','article')">ARTYKUŁ</div>
      <div class="module-tab ${tab==='quiz'?'active':''}" onclick="goModule('${m.id}','quiz')">QUIZ</div>
    </div>`;

  let body = '';
  if(tab === 'article'){
    body = `
      <div class="article">${html}</div>
      <div class="article-footer" style="max-width:780px;">
        <div class="mark-read-note">${read ? '✓ Artykuł oznaczony jako przeczytany' : ''}</div>
        <div style="display:flex;gap:10px;">
          ${!read ? `<button class="btn secondary" onclick="markRead('${m.id}')">Oznacz jako przeczytane</button>`:''}
          <button class="btn" onclick="goModule('${m.id}','quiz')">Przejdź do quizu →</button>
        </div>
      </div>`;
  } else {
    body = renderQuizSettingsInline(m.id);
  }

  return `
    <button class="backlink" onclick="goOverview()">← Wróć do planu kursu</button>
    <div class="module-head">
      <div>
        <div class="module-num">Moduł ${String(idx+1).padStart(2,'0')} / ${MODULES.length} · Waga: ${m.weight}%</div>
        <h1 class="module-title">${m.title}</h1>
      </div>
      ${tabsHtml}
    </div>
    ${body}
  `;
}

function markRead(id){
  PROGRESS.articlesRead[id] = true;
  saveProgress();
  render();
}

// ---------------- Quiz settings ----------------
let QUIZ_CONFIG = { moduleId:null, isExam:false, count:10, shuffleQ:true, shuffleA:true };

function renderQuizSettingsInline(moduleId){
  const m = moduleById(moduleId);
  const max = m.questionIds.length;
  QUIZ_CONFIG.moduleId = moduleId;
  QUIZ_CONFIG.isExam = false;
  if(!QUIZ_CONFIG.count || QUIZ_CONFIG._for !== moduleId) QUIZ_CONFIG.count = Math.min(10, max);
  QUIZ_CONFIG._for = moduleId;
  return buildSettingsCard(max, `Quiz: ${m.title}`, `Bank pytań tego modułu: ${max}. Wybierz liczbę pytań i ustawienia losowania.`);
}

function renderExamSettings(){
  const max = DATA.questions.length;
  QUIZ_CONFIG.moduleId = null;
  QUIZ_CONFIG.isExam = true;
  if(!QUIZ_CONFIG.examCount) QUIZ_CONFIG.examCount = Math.min(60, max);
  return `
    <button class="backlink" onclick="goOverview()">← Wróć do planu kursu</button>
    <div class="hero" style="margin-bottom:24px;">
      <div class="eyebrow">Symulacja egzaminu</div>
      <h1 class="hero-title" style="font-size:34px;">Egzamin końcowy ADM-201</h1>
      <p class="hero-lede">Pytania losowane ze wszystkich ${MODULES.length} modułów (łącznie ${max} pytań w bazie). Prawdziwy egzamin to 60 pytań ocenianych w 105 minut, próg zdawalności 68%.</p>
    </div>
    ${buildSettingsCard(max, 'Ustawienia egzaminu', `Pełna baza pytań: ${max}.`, true)}
  `;
}

function buildSettingsCard(max, title, desc, isExam){
  const count = isExam ? QUIZ_CONFIG.examCount : QUIZ_CONFIG.count;
  return `
    <div class="settings-card">
      <h2>${title}</h2>
      <p class="desc">${desc}</p>
      <div class="field-row">
        <label class="field-label">Liczba pytań</label>
        <div class="count-row">
          <input type="range" min="1" max="${max}" value="${count}" id="rangeCount" oninput="updateCount(this.value)">
          <span class="count-value" id="countValue">${count}</span>
        </div>
      </div>
      <div class="toggle-row">
        <div class="lbl">Losowa kolejność pytań<small>Za każdym podejściem inna kolejność</small></div>
        <div class="switch ${QUIZ_CONFIG.shuffleQ?'on':''}" id="switchShuffleQ" onclick="toggleSwitch('shuffleQ')"></div>
      </div>
      <div class="toggle-row">
        <div class="lbl">Losowa kolejność odpowiedzi<small>Opcje A–D mieszane przy każdym pytaniu</small></div>
        <div class="switch ${QUIZ_CONFIG.shuffleA?'on':''}" id="switchShuffleA" onclick="toggleSwitch('shuffleA')"></div>
      </div>
      <button class="btn wide" style="margin-top:26px;" onclick="startQuiz(${!!isExam})">Rozpocznij quiz →</button>
    </div>
  `;
}
function updateCount(v){
  if(QUIZ_CONFIG.isExam) QUIZ_CONFIG.examCount = parseInt(v);
  else QUIZ_CONFIG.count = parseInt(v);
  document.getElementById('countValue').textContent = v;
}
function toggleSwitch(which){
  QUIZ_CONFIG[which] = !QUIZ_CONFIG[which];
  document.getElementById(which==='shuffleQ'?'switchShuffleQ':'switchShuffleA').classList.toggle('on');
}

// ---------------- Quiz runtime ----------------
let QUIZ_STATE = null;

function startQuiz(isExam){
  let pool;
  if(isExam){
    pool = DATA.questions.map(q=>q.id);
  } else {
    pool = moduleById(QUIZ_CONFIG.moduleId).questionIds.slice();
  }
  const count = isExam ? QUIZ_CONFIG.examCount : QUIZ_CONFIG.count;
  let selected = QUIZ_CONFIG.shuffleQ ? shuffle(pool) : pool.slice();
  selected = selected.slice(0, count);

  QUIZ_STATE = {
    isExam,
    moduleId: isExam ? null : QUIZ_CONFIG.moduleId,
    ids: selected,
    order: isExam ? {} : {},
    index: 0,
    answers: {}, // qid -> array of selected keys
    optionOrder: {}, // qid -> array of keys in display order
    correctCount: 0,
    wrongCount: 0,
    finished: false
  };
  selected.forEach(id=>{
    const q = QUESTIONS[id];
    let keys = q.options.map(o=>o.key);
    if(QUIZ_CONFIG.shuffleA) keys = shuffle(keys);
    QUIZ_STATE.optionOrder[id] = keys;
  });
  ROUTE = { view:'quiz-run' };
  render();
}

function currentQuestion(){
  const id = QUIZ_STATE.ids[QUIZ_STATE.index];
  return QUESTIONS[id];
}

function renderQuizRun(){
  const q = currentQuestion();
  const total = QUIZ_STATE.ids.length;
  const idx = QUIZ_STATE.index;
  const answered = QUIZ_STATE.answers[q.id];
  const isMulti = q.answer.length > 1;
  const keys = QUIZ_STATE.optionOrder[q.id];

  let optsHtml = '';
  keys.forEach(k=>{
    const opt = q.options.find(o=>o.key===k);
    let cls = 'opt';
    const isSelected = answered && answered.includes(k);
    const isCorrectKey = q.answer.includes(k);
    if(answered){
      cls += ' disabled';
      if(isCorrectKey) cls += ' correct';
      else if(isSelected && !isCorrectKey) cls += ' incorrect';
    } else if(isSelected){
      cls += ' selected';
    }
    optsHtml += `
      <div class="${cls}" onclick="${answered ? '' : `selectOption('${k}')`}">
        <div class="k">${k}</div>
        <div class="t">${escapeHtml(opt.text)}</div>
      </div>`;
  });

  let explainHtml = '';
  if(answered){
    const userSet = new Set(answered);
    const correctSet = new Set(q.answer);
    const isCorrect = userSet.size===correctSet.size && [...userSet].every(k=>correctSet.has(k));
    explainHtml = `
      <div class="explain">
        <span class="verdict ${isCorrect?'ok':'no'}">${isCorrect? '✓ Poprawna odpowiedź' : '✗ Niepoprawna odpowiedź — prawidłowa odpowiedź to ' + q.answer.join(', ')}</span>
        ${escapeHtml(q.explanation)}
      </div>`;
  }

  const pct = Math.round((idx/total)*100);
  const correct = QUIZ_STATE.correctCount, wrong = QUIZ_STATE.wrongCount, answeredCount = correct+wrong;
  const scorePct = answeredCount>0 ? Math.round((correct/answeredCount)*100) : 0;

  return `
    <button class="backlink" onclick="confirmExitQuiz()">← Przerwij quiz</button>
    <div class="quiz-hud">
      <div class="stat">
        <span>Pytanie <b>${idx+1} / ${total}</b></span>
      </div>
      <div class="stat">
        <span class="correct">Poprawne <b>${correct}</b></span>
        <span class="wrong">Błędne <b>${wrong}</b></span>
        <span>Wynik <b>${scorePct}%</b></span>
      </div>
    </div>
    <div class="progress-track"><span style="width:${pct}%"></span></div>
    <div class="q-card">
      <div class="q-eyebrow">${q.module ? moduleLabel(q.module) : ''} ${isMulti ? '· WYBIERZ ' + q.answer.length + ' ODPOWIEDZI' : ''}</div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      ${optsHtml}
      ${explainHtml}
      <div class="q-actions">
        <span></span>
        ${answered ? `<button class="btn" onclick="nextQuestion()">${idx+1<total ? 'Następne pytanie →' : 'Zobacz wyniki →'}</button>` : (isMulti ? `<button class="btn secondary" id="confirmMultiBtn" onclick="confirmMulti()" disabled>Zatwierdź odpowiedź</button>` : '')}
      </div>
    </div>
  `;
}

function moduleLabel(id){
  const m = moduleById(id);
  return m ? m.title.toUpperCase() : '';
}

let MULTI_SELECTION = [];
function selectOption(k){
  const q = currentQuestion();
  const isMulti = q.answer.length > 1;
  if(QUIZ_STATE.answers[q.id]) return;

  if(!isMulti){
    submitAnswer(q.id, [k]);
  } else {
    if(!MULTI_SELECTION) MULTI_SELECTION = [];
    const i = MULTI_SELECTION.indexOf(k);
    if(i>-1) MULTI_SELECTION.splice(i,1); else MULTI_SELECTION.push(k);
    render();
    // re-mark selected visually + enable confirm when count matches
    const keys = QUIZ_STATE.optionOrder[q.id];
    document.querySelectorAll('.opt').forEach((el,ix)=>{
      if(MULTI_SELECTION.includes(keys[ix])) el.classList.add('selected');
    });
    const btn = document.getElementById('confirmMultiBtn');
    if(btn) btn.disabled = MULTI_SELECTION.length !== q.answer.length;
  }
}
function confirmMulti(){
  const q = currentQuestion();
  submitAnswer(q.id, MULTI_SELECTION.slice());
  MULTI_SELECTION = [];
}

function submitAnswer(qid, selectedKeys){
  const q = QUESTIONS[qid];
  QUIZ_STATE.answers[qid] = selectedKeys;
  const userSet = new Set(selectedKeys);
  const correctSet = new Set(q.answer);
  const isCorrect = userSet.size===correctSet.size && [...userSet].every(k=>correctSet.has(k));
  if(isCorrect) QUIZ_STATE.correctCount++; else QUIZ_STATE.wrongCount++;

  if(!PROGRESS.questionStats[qid]) PROGRESS.questionStats[qid] = {seen:0, correct:0};
  PROGRESS.questionStats[qid].seen++;
  if(isCorrect) PROGRESS.questionStats[qid].correct++;
  saveProgress();
  render();
}

function nextQuestion(){
  if(QUIZ_STATE.index+1 < QUIZ_STATE.ids.length){
    QUIZ_STATE.index++;
    render();
  } else {
    finishQuiz();
  }
}

function confirmExitQuiz(){
  if(confirm('Czy na pewno chcesz przerwać quiz? Postęp tego podejścia nie zostanie zapisany.')){
    if(QUIZ_STATE.isExam) goExam(); else goModule(QUIZ_STATE.moduleId, 'quiz');
  }
}

function finishQuiz(){
  const total = QUIZ_STATE.ids.length;
  const correct = QUIZ_STATE.correctCount;
  const pct = Math.round((correct/total)*100);
  const key = QUIZ_STATE.isExam ? '__exam__' : QUIZ_STATE.moduleId;
  const prevBest = PROGRESS.quizBest[key];
  if(!prevBest || pct > prevBest.pct){
    PROGRESS.quizBest[key] = { pct, correct, total, date: new Date().toISOString() };
  }
  if(!PROGRESS.quizHistory[key]) PROGRESS.quizHistory[key] = [];
  PROGRESS.quizHistory[key].push({ pct, correct, total, date: new Date().toISOString() });
  saveProgress();
  QUIZ_STATE.finished = true;
  ROUTE = { view:'quiz-results' };
  render();
}

function renderQuizResults(){
  const total = QUIZ_STATE.ids.length;
  const correct = QUIZ_STATE.correctCount;
  const wrong = QUIZ_STATE.wrongCount;
  const pct = Math.round((correct/total)*100);
  const pass = pct >= 68;

  let reviewHtml = '';
  QUIZ_STATE.ids.forEach(id=>{
    const q = QUESTIONS[id];
    const ans = QUIZ_STATE.answers[id] || [];
    const userSet = new Set(ans);
    const correctSet = new Set(q.answer);
    const isCorrect = userSet.size===correctSet.size && [...userSet].every(k=>correctSet.has(k));
    reviewHtml += `<div class="review-item"><span class="icon ${isCorrect?'ok':'no'}">${isCorrect?'✓':'✗'}</span><span>${escapeHtml(q.question)}</span></div>`;
  });

  const backAction = QUIZ_STATE.isExam ? `goExam()` : `goModule('${QUIZ_STATE.moduleId}','quiz')`;
  const retryAction = QUIZ_STATE.isExam ? `startQuiz(true)` : `startQuiz(false)`;

  return `
    <div class="results-card" style="margin:0 auto;">
      <div class="eyebrow">${pass ? 'ZALICZONE — próg 68%' : 'PONIŻEJ PROGU 68%'}</div>
      <div class="results-score ${pass?'good':'bad'}">${pct}%</div>
      <div class="results-sub">${correct} / ${total} poprawnych odpowiedzi</div>
      <div class="results-grid">
        <div><div class="n" style="color:var(--teal)">${correct}</div><div class="l">Poprawne</div></div>
        <div><div class="n" style="color:var(--red)">${wrong}</div><div class="l">Błędne</div></div>
        <div><div class="n">${total}</div><div class="l">Łącznie</div></div>
      </div>
      <div class="results-actions">
        <button class="btn secondary" onclick="${backAction}">Wróć</button>
        <button class="btn" onclick="${retryAction}">Spróbuj ponownie</button>
      </div>
      <div class="review-list">${reviewHtml}</div>
    </div>
  `;
}

function escapeHtml(s){
  if(s===undefined || s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------- boot ----------------
render();

</script>
</body>
</html>
