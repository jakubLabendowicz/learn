<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kursy — learn</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="/">
      <span class="logo-dot"></span>
      learn
    </a>
    <div class="nav-links">
      <a href="/courses">Kursy</a>
      <a href="/profile">Profil</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Dostępne kursy</h1>
    <p>Wybierz kurs, aby rozpocząć naukę, albo wygeneruj i zaimportuj własny.</p>
    <div class="page-header-actions">
      <a class="btn-secondary" href="/courses/generate">✨ Generuj</a>
      <a class="btn-secondary" href="/courses/import">⬆ Importuj</a>
    </div>
  </div>

  <div class="course-grid" id="course-grid">
    <p style="color:var(--text-muted)">Wczytywanie…</p>
  </div>
</main>

<footer class="site-footer">
  learn — platforma kursów
</footer>

<script src="/assets/storage.js"></script>
<script src="/assets/dao.js"></script>
<script src="/assets/repository.js"></script>
<script src="/assets/data/question.js"></script>
<script src="/assets/data/question-set.js"></script>
<script src="/assets/data/quiz-question-set.js"></script>
<script src="/assets/data/article.js"></script>
<script src="/assets/data/quiz.js"></script>
<script src="/assets/data/module.js"></script>
<script src="/assets/data/course.js"></script>
<script src="/assets/data/user.js"></script>
<script src="/assets/data/user-course-activity.js"></script>
<script src="/assets/data/user-module-activity.js"></script>
<script src="/assets/data/user-article-activity.js"></script>
<script src="/assets/data/user-quiz-activity.js"></script>
<script src="/assets/data/user-quiz-attempt.js"></script>
<script src="/assets/seed.js"></script>
<script>
function downloadCourseExport(slug) {
  const data = courseRepository.buildExportData(slug);
  if (!data) { alert('Nie udało się znaleźć kursu do eksportu.'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${slug}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

(async () => {
  await learnEnsureSeeded();
  const user = userRepository.current();
  const all = courseRepository.listSummaries();
  const grid = document.getElementById('course-grid');

  if (!all.length) {
    grid.innerHTML = `<p style="color:var(--text-muted)">Brak kursów. <a href="/courses/generate">Wygeneruj</a> lub <a href="/courses/import">zaimportuj</a> jeden.</p>`;
    return;
  }

  grid.innerHTML = all.map(c => {
    const visited = userCourseActivityRepository.forUserAndCourse(user.id, c.id);
    const pct = visited ? courseRepository.getProgress(user.id, c.id) : 0;
    return `
      <div class="course-card">
        <a class="course-card-link" href="/courses/${c.slug}">
          <div class="course-card-icon">${c.icon || '📘'}</div>
          <h2>${c.shortTitle || c.title}</h2>
          <p>${c.shortDescription || ''}</p>
          ${visited ? `<div style="font-size:0.78rem;font-weight:700;color:var(--accent)">${pct}% ukończone</div>` : ''}
          <span class="course-card-cta">${visited ? 'Kontynuuj kurs →' : 'Rozpocznij kurs →'}</span>
        </a>
        <div class="course-card-footer">
          <button class="course-card-export" onclick="downloadCourseExport('${c.slug}')">⬇ Eksportuj</button>
        </div>
      </div>`;
  }).join('');
})();
</script>

</body>
</html>
