<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kursy — learn</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="/">
      <span class="logo-dot"></span>
      learn
    </a>
    <div class="nav-links">
      <a href="/courses">Kursy</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Dostępne kursy</h1>
    <p>Wybierz kurs, aby rozpocząć naukę, albo wygeneruj i zaimportuj własny.</p>
    <div class="page-header-actions">
      <a class="btn-secondary" href="/courses/generate">✨ Generuj</a>
      <a class="btn-secondary" href="/courses/import">⬆ Importuj</a>
    </div>
  </div>

  <div class="course-grid" id="course-grid">
    <p style="color:var(--text-muted)">Wczytywanie…</p>
  </div>
</main>

<footer class="site-footer">
  learn — platforma kursów
</footer>

<script src="/assets/state.js"></script>
<script src="/assets/imported-courses.js"></script>
<script>
(async () => {
  await learnEnsureSeeded();
  const state = learnLoadState();
  const all = learnListCourses();
  const grid = document.getElementById('course-grid');

  if (!all.length) {
    grid.innerHTML = `<p style="color:var(--text-muted)">Brak kursów. <a href="/courses/generate">Wygeneruj</a> lub <a href="/courses/import">zaimportuj</a> jeden.</p>`;
    return;
  }

  grid.innerHTML = all.map(c => {
    const entry = state.courses[c.id];
    const pct = entry ? learnCourseProgress(entry) : 0;
    return `
      <div class="course-card">
        <a class="course-card-link" href="/courses/${c.slug}">
          <div class="course-card-icon">${c.icon || '📘'}</div>
          <h2>${c.shortTitle || c.title}</h2>
          <p>${c.shortDescription || ''}</p>
          ${entry ? `<div style="font-size:0.78rem;font-weight:700;color:var(--accent)">${pct}% ukończone</div>` : ''}
          <span class="course-card-cta">${entry ? 'Kontynuuj kurs →' : 'Rozpocznij kurs →'}</span>
        </a>
        <div class="course-card-footer">
          <button class="course-card-export" onclick="learnExportCourse('${c.slug}')">⬇ Eksportuj</button>
        </div>
      </div>`;
  }).join('');
})();
</script>

</body>
</html>
