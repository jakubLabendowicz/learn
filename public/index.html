<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>learn — platforma kursów</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="/">
      <span class="logo-dot"></span>
      learn
    </a>
    <div class="nav-links">
      <a href="/courses">Kursy</a>
      <a href="/courses/generate">Generuj</a>
      <a href="/courses/import">Importuj</a>
    </div>
  </div>
</nav>

<main>
  <section class="hero">
    <span class="hero-eyebrow">Platforma kursów</span>
    <h1>Ucz się w swoim tempie.</h1>
    <p>Krótkie, praktyczne kursy przygotowujące do certyfikacji i egzaminów — bez zbędnego balastu.</p>
    <a class="btn" href="/courses">Przeglądaj kursy →</a>
  </section>

  <div id="dashboard"></div>
</main>

<footer class="site-footer">
  learn — platforma kursów
</footer>

<script src="/assets/state.js"></script>
<script>
(function () {
  const state = learnLoadState();
  const dashboard = document.getElementById('dashboard');
  const courses = learnRecentCourses(state, 4);
  if (!courses.length) return; // first-time visitor: keep the page minimal

  const modules = learnRecentModules(state, 5);
  const results = learnRecentResults(state, 5);
  const fmtDate = iso => new Date(iso).toLocaleDateString('pl-PL', { day: 'numeric', month: 'short' });

  const courseCards = courses.map(c => {
    const pct = learnCourseProgress(c);
    return `
      <a class="dash-card" href="/courses/${c.slug}">
        <div class="dash-card-icon">${c.icon || ''}</div>
        <div class="dash-card-body">
          <div class="dash-card-title">${c.title}</div>
          <div class="dash-card-pct">${pct}% ukończone</div>
        </div>
      </a>`;
  }).join('');

  const moduleRows = modules.length ? modules.map(m => `
      <a class="dash-row" href="/courses/${m.courseSlug}">
        <div class="dash-row-body">
          <div class="dash-row-title">${m.itemTitle}</div>
          <div class="dash-row-sub">${m.courseTitle}</div>
        </div>
        <div class="dash-row-date">${fmtDate(m.date)}</div>
      </a>`).join('') : `<p class="dash-empty">Brak jeszcze przeczytanych artykułów.</p>`;

  const resultRows = results.length ? results.map(r => {
    const cls = r.pct >= 70 ? 'good' : (r.pct >= 50 ? '' : 'bad');
    return `
      <a class="dash-row" href="/courses/${r.courseSlug}">
        <div class="dash-row-body">
          <div class="dash-row-title">${r.itemTitle}</div>
          <div class="dash-row-sub">${r.courseTitle}</div>
        </div>
        <span class="pct-pill ${cls}">${r.pct}%</span>
      </a>`;
  }).join('') : `<p class="dash-empty">Brak jeszcze rozwiązanych quizów.</p>`;

  dashboard.innerHTML = `
    <section class="dash-section">
      <h2>Ostatnie kursy</h2>
      <div class="dash-grid">${courseCards}</div>
    </section>
    <section class="dash-section">
      <h2>Ostatnie moduły</h2>
      <div class="dash-list">${moduleRows}</div>
    </section>
    <section class="dash-section">
      <h2>Ostatnie wyniki</h2>
      <div class="dash-list">${resultRows}</div>
    </section>
  `;
})();
</script>

</body>
</html>
