<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista kursów</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 720px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 1.5rem;
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    margin-bottom: 0.75rem;
  }
  a {
    display: block;
    padding: 1rem 1.25rem;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    color: #0176d3;
    text-decoration: none;
    font-weight: 600;
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  a:hover {
    border-color: #0176d3;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
</style>
</head>
<body>
  <h1>Dostępne kursy</h1>
  <ul>
    <li>
      <a href="/courses/Salesforce-Certified-Platform-Administrator">
        ADM-201 — Kurs przygotowawczy do Salesforce Certified Platform Administrator
      </a>
    </li>
  </ul>
</body>
</html>
